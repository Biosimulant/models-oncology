schema_version: '2.0'
title: Talemi2015 - Persistent telomere-associated DNA damage foci (TAF), a measure to predict cancer risks Lab
description: A Robust Model of DNA Damage Dynamics.Rasgou Talemi and Schaber, 12.20.2014. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- cellcycle
- curated
- dna-damage
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
