schema_version: '2.0'
title: Ghaffari2019 - Thrombomodulin Gene Expression after Retinoic Acid Treatment
  for Cancer Patients with Coagulation Disorders
description: Publication includes a mathematical model for how retinoic acid affects
  thrombomodulin gene and mRNA expression as well as a two-compartment pharmacokinetic
  model for retinoic acid. It can be used to explore tumor-related dynamics and compare
  treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Hamed Ghaffari
- Jeffrey D Varner
- Linda R Petzold
upstream:
  id: biomodels_ebi:MODEL1907140001
  source_db: biomodels_ebi
  source_id: MODEL1907140001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1907140001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1907140001?filename=Ghaffari2019_TM_exp.xml
  license: CC0
biosim:
  entrypoint: src.ghaffari2019_thrombomodulin_gene_expression_afte_model1907140001_model:Ghaffari2019ThrombomodulinGeneExpressionAfteModel1907140001Model
  init_kwargs:
    model_path: data/MODEL1907140001.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1907140001.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: initial_stm
    maps_to: sTM
    label: STM
    default: 1.0
    units: native SBML value
    description: Initial STM. Sets the initial value of bundled SBML symbol `sTM`.
  - name: initial_rec1t
    maps_to: REC1t
    label: REC1t
    default: 1.0e-06
    units: native SBML value
    description: Initial REC1t. Sets the initial value of bundled SBML symbol `REC1t`.
  - name: initial_tm_m_rna
    maps_to: TM_mRNA
    label: TM mRNA
    default: 0.0
    units: native SBML value
    description: Initial TM mRNA. Sets the initial value of bundled SBML symbol `TM_mRNA`.
  outputs:
  - name: tm
    maps_to: TM
    label: TM
    description: TM observable. Maps to SBML symbol `TM`.
  - name: ra
    maps_to: RA
    label: RA
    description: RA observable. Maps to SBML symbol `RA`.
  - name: stm
    maps_to: sTM
    label: STM
    description: STM observable. Maps to SBML symbol `sTM`.
  - name: rec1t
    maps_to: REC1t
    label: REC1t
    description: REC1t observable. Maps to SBML symbol `REC1t`.
  - name: tm_m_rna
    maps_to: TM_mRNA
    label: TM mRNA
    description: TM mRNA observable. Maps to SBML symbol `TM_mRNA`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
