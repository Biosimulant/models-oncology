schema_version: '2.0'
title: Jenner2019 - Oncolytic virotherapy for tumours following a Gompertz growth law
description: This is a mathematical model using a Gompertz growth law to describe the in vivo dynamics of a cancer under treatment with an oncolytic virus. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
authors:
- Biosimulant Team
- Adrianne L Jenner
- Peter S Kim
- Federico Frascoli
upstream:
  id: biomodels_ebi:BIOMD0000000850
  source_db: biomodels_ebi
  source_id: BIOMD0000000850
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000850
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000850?filename=Jenner2019.xml
  license: CC0
biosim:
  entrypoint: src.jenner2019_oncolytic_virotherapy_for_tumours_fol_biomd0000000850_model:Jenner2019OncolyticVirotherapyForTumoursFolBiomd0000000850Model
  init_kwargs:
    model_path: data/BIOMD0000000850.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000850.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations. No scientifically safe external input was exposed by the cleanup.
io:
  inputs: []
  outputs:
  - name: model_state_1
    maps_to: U
    label: U
    description: U observable. Maps to SBML symbol `U`.
  - name: model_state_2
    maps_to: I
    label: I
    description: I observable. Maps to SBML symbol `I`.
  - name: model_state_3
    maps_to: V
    label: V
    description: V observable. Maps to SBML symbol `V`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
