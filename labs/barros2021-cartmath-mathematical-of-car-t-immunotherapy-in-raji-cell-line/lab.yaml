schema_version: '2.0'
title: Barros2021 - CARTmath, Mathematical Model of CAR-T Immunotherapy in Raji Cell Line Lab
description: A mathematical model (CART-math) studying the impact of CAR-T cells therapy on haematological cancer cell lines which in this case is RAJI. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- car-t
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- logical-model
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: epsilon_level
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.epsilon_level
    label: Epsilon source parameter
    default: 1.59795
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  - name: raji_ido_positive_cart_19_positive_1mt_level
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.raji_ido_positive_cart_19_positive_1mt_level
    label: Raji IDO+CART 19+1MT source parameter
    default: 0.0
    units: native SBML value
    description: Raji IDO+CART 19+1MT source parameter. Maps to bundled SBML parameter `Raji_IDO_CART_19_1MT`.
  - name: initial_for_raji_ido_positive_cart_19_positive_1mt
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.initial_for_raji_ido_positive_cart_19_positive_1mt
    label: for Raji IDO+CART 19+1MT source parameter
    default: 0.0
    units: native SBML value
    description: Initial for Raji IDO+CART 19+1MT source parameter. Maps to bundled SBML parameter `ModelValue_10`.
  outputs:
  - name: model_state_1
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.model_state_1
    description: T observable. Maps to SBML symbol `T`.
  - name: model_state_2
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.model_state_2
    description: Cm observable. Maps to SBML symbol `Cm`.
  - name: model_state_3
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.model_state_3
    description: Ct observable. Maps to SBML symbol `Ct`.
  - name: state
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.state
  to:
  - visualisation.oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model_state
- from: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.summary
  to:
  - visualisation.oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model_summary
- from: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model.species_labels
  to:
  - visualisation.oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001020_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
