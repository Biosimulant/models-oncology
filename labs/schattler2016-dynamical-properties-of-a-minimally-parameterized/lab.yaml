schema_version: '2.0'
title: Schattler2016 - Dynamical properties of a minimally parameterized mathematical model for metronomic chemotherapy Lab
description: A minimally parameterized mathematical model for low-dose metronomicchemotherapy is formulated that takes into account angiogenic signaling betweenthe tumor and its vasculature and tumor inhibiting ef. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
