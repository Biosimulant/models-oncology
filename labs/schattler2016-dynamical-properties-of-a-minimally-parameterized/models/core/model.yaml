  - name: model_state_2
    maps_to: q
    label: Q
    description: Q observable. Maps to SBML symbol `q`.
  - name: model_state_3
    maps_to: r
    label: R
    description: R observable. Maps to SBML symbol `r`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
