biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Schattler2016 - Dynamical properties of a minimally parameterized mathematical model for metronomic chemotherapy
    question: Which signaling states carry the dominant response in the bundled cancer pathway model?
    answer_focus: Tracks selected pathway species and the largest-changing SBML observable.
    visual_scope: Cancer signaling pathway activity and dominant source states
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_schattler2016_dynamical_properties_of_a_minimall_model2002030001_model
      title: Schattler2016 - Dynamical properties of a minimally parameterized mathematical model for metronomic chemotherapy
      state_observables:
      - p
      - q
      - r
      observables:
      - id: p
        port: model_state_1
        label: P
        group: signaling
      - id: q
        port: model_state_2
        label: Q
        group: signaling
      - id: r
        port: model_state_3
        label: R
        group: signaling
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_schattler2016_dynamical_properties_of_a_minimall_model2002030001_model_state
    schema:
      p: float
      q: float
      r: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_schattler2016_dynamical_properties_of_a_minimall_model2002030001_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_schattler2016_dynamical_properties_of_a_minimall_model2002030001_model_species_labels
    schema:
      p: str
      q: str
      r: str
    description: Display labels for selected source states.
  outputs: []
