schema_version: '2.0'
title: Zeilfelder2025 - Model for human liver cancer cell line HepG2
description: Mathematical multi-compartment model described by sets of coupledordinary differential equations (ODEs) for studying the IL6 and SMAD signaling in HepG2 human cancer cell lines. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Anja Zeilfelder
- Joep Vanlier
- "Christina M\xF6lders"
- Philipp Kastl
- Barbara Helm
upstream:
  id: biomodels_ebi:MODEL2503270001
  source_db: biomodels_ebi
  source_id: MODEL2503270001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2503270001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2503270001?filename=HepG2_model.xml
  license: CC0
biosim:
  entrypoint: src.zeilfelder2025_model_for_human_liver_cancer_cell_model2503270001_model:Zeilfelder2025ModelForHumanLiverCancerCellModel2503270001Model
  init_kwargs:
    model_path: data/MODEL2503270001.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL2503270001.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: input_il6_level
    maps_to: input_il6
    label: Input il6 source parameter
    default: 10.0
    units: native SBML value
    description: Input il6 source parameter. Maps to bundled SBML parameter `input_il6`.
  - name: il6_basal_level
    maps_to: il6_basal
    label: Il6 basal source parameter
    default: 0.00957067090828757
    units: native SBML value
    description: Il6 basal source parameter. Maps to bundled SBML parameter `il6_basal`.
  - name: il6_act_level
    maps_to: il6_act
    label: Il6 act source parameter
    default: 0.0226985677410744
    units: native SBML value
    description: Il6 act source parameter. Maps to bundled SBML parameter `il6_act`.
  - name: dcf_il6_basal_level
    maps_to: dcf_il6_basal
    label: Dcf il6 basal source parameter
    default: 0.835096746625705
    units: native SBML value
    description: Dcf il6 basal source parameter. Maps to bundled SBML parameter `dcf_il6_basal`.
  - name: initial_unphosphorylated_stat3
    maps_to: STAT3
    label: Unphosphorylated STAT3
    default: 1237.76392668883
    units: native SBML value
    description: Initial Unphosphorylated STAT3. Sets the initial value of bundled SBML symbol `STAT3`.
  - name: initial_active_cytoplasmic_stat3
    maps_to: cpSTAT3
    label: Active cytoplasmic STAT3
    default: 24.1373740148803
    units: native SBML value
    description: Initial Active cytoplasmic STAT3. Sets the initial value of bundled SBML symbol `cpSTAT3`.
  outputs:
  - name: unphosphorylated_stat3
    maps_to: STAT3
    label: Unphosphorylated STAT3
    description: Unphosphorylated STAT3 observable. Maps to SBML symbol `STAT3`.
  - name: active_cytoplasmic_stat3
    maps_to: cpSTAT3
    label: Active cytoplasmic STAT3
    description: Active cytoplasmic STAT3 observable. Maps to SBML symbol `cpSTAT3`.
  - name: active_nuclear_stat3
    maps_to: npSTAT3
    label: Active nuclear STAT3
    description: Active nuclear STAT3 observable. Maps to SBML symbol `npSTAT3`.
  - name: total_bmp_receptor
    maps_to: BMPR
    label: Total BMP receptor
    description: Total BMP receptor observable. Maps to SBML symbol `BMPR`.
  - name: cofactor_activated_by_bmp_receptor
    maps_to: BMPR_delay1
    label: Cofactor activated by BMP receptor
    description: Cofactor activated by BMP receptor observable. Maps to SBML symbol `BMPR_delay1`.
  - name: cofactor_activated_by_bmp_receptor_2
    maps_to: BMPR_delay2
    label: Cofactor activated by BMP receptor 2
    description: Cofactor activated by BMP receptor 2 observable. Maps to SBML symbol `BMPR_delay2`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
