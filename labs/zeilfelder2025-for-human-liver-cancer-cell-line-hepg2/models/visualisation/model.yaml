  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Zeilfelder2025 - Model for human liver cancer cell line HepG2
    question: Which signaling states carry the dominant response in the bundled cancer
      pathway model?
    answer_focus: Tracks selected pathway species and the largest-changing SBML observable.
    visual_scope: Cancer signaling pathway activity and dominant source states
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_zeilfelder2025_model_for_human_liver_cancer_cell_model2503270001_model
      title: Zeilfelder2025 - Model for human liver cancer cell line HepG2
      state_observables:
      - BMPR
      - BMPR_delay1
      - BMPR_delay2
      - BMPR_delay3
      - BMPR_delay4
      - BMPR_delay5
      - BMPR_delay6
      - SMAD6RNA1
      - SMAD6RNA2
      - SMAD6RNA
      - ID3RNA
      - JAK1_gp130
      - pJAK1_pgp130
      - STAT3
      - cpSTAT3
      - npSTAT3
      - nSOCS3RNA1
      - nSOCS3RNA2
      - nSOCS3RNA3
      - nSOCS3RNA4
      - nSOCS3RNA5
      - SOCS3RNA
      - SOCS3
      - nHAMPRNA1
      - nHAMPRNA2
      - nHAMPRNA3
      - nHAMPRNA4
      - nHAMPRNA5
      - nHAMPRNA6
      - nHAMPRNA7
      - HAMPRNA
      observables:
      - id: STAT3
        port: unphosphorylated_stat3
        label: Unphosphorylated STAT3
        group: signaling
      - id: cpSTAT3
        port: active_cytoplasmic_stat3
        label: Active cytoplasmic STAT3
        group: signaling
      - id: npSTAT3
        port: active_nuclear_stat3
        label: Active nuclear STAT3
        group: signaling
      - id: BMPR
        port: total_bmp_receptor
        label: Total BMP receptor
        group: signaling
      - id: BMPR_delay1
