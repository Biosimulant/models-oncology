schema_version: '2.0'
title: Kosinsky2018 - Radiation and PD-(L)1 treatment combinations
description: This is a quantitative systems pharmacology (QSP) model that describes key elements of the cancer immunity cycle and the tumor microenvironment, tumor growth, as well as dose-exposure-target modulatio. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- radiotherapy
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Yuri Kosinsky
- Simon J Dovedi
- Kirill Peskov
- Veronika Voronova
- Lulu Chu
upstream:
  id: biomodels_ebi:BIOMD0000000863
  source_db: biomodels_ebi
  source_id: BIOMD0000000863
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000863
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000863?filename=Kosinsky2018.xml
  license: CC0
biosim:
  entrypoint: src.kosinsky2018_radiation_and_pd_l_1_treatment_comb_biomd0000000863_model:Kosinsky2018RadiationAndPdL1TreatmentCombBiomd0000000863Model
  init_kwargs:
    model_path: data/BIOMD0000000863.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000863.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: radiation_dose
    maps_to: radiation_Dose
    label: Radiation Dose source parameter
    default: 0.0
    units: native SBML value
    description: Radiation Dose source parameter. Maps to bundled SBML parameter `radiation_Dose`.
  - name: initial_dsb
    maps_to: U
    label: DSB
    default: 0.0
    units: native SBML value
    description: Initial DSB. Sets the initial value of bundled SBML symbol `U`.
  - name: initial_pdl1
    maps_to: PDL1
    label: PDL1
    default: 0.0
    units: native SBML value
    description: Initial PDL1. Sets the initial value of bundled SBML symbol `PDL1`.
  - name: initial_tvd
    maps_to: TVd
    label: TVD
    default: 0.0
    units: native SBML value
    description: Initial TVD. Sets the initial value of bundled SBML symbol `TVd`.
  - name: initial_tc_nd
    maps_to: nTeff
    label: TC ND
    default: 0.0
    units: native SBML value
    description: Initial TC ND. Sets the initial value of bundled SBML symbol `nTeff`.
  - name: initial_tc_d
    maps_to: dTeff
    label: TC D
    default: 0.0
    units: native SBML value
    description: Initial TC D. Sets the initial value of bundled SBML symbol `dTeff`.
  outputs:
  - name: model_state_1
    maps_to: TV
    label: TV
    description: TV observable. Maps to SBML symbol `TV`.
  - name: dsb
    maps_to: U
    label: DSB
    description: DSB observable. Maps to SBML symbol `U`.
  - name: pdl1
    maps_to: PDL1
    label: PDL1
    description: PDL1 observable. Maps to SBML symbol `PDL1`.
  - name: tvd
    maps_to: TVd
    label: TVD
    description: TVD observable. Maps to SBML symbol `TVd`.
  - name: tc_nd
    maps_to: nTeff
    label: TC ND
    description: TC ND observable. Maps to SBML symbol `nTeff`.
  - name: tc_d
    maps_to: dTeff
    label: TC D
    description: TC D observable. Maps to SBML symbol `dTeff`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
