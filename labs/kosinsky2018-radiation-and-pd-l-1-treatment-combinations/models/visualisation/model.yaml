    description: Core model summary output.
  - name: oncology_sbml_kosinsky2018_radiation_and_pd_l_1_treatment_comb_biomd0000000863_model_species_labels
    schema:
      TV: str
      U: str
      PDL1: str
      TVd: str
      nTeff: str
