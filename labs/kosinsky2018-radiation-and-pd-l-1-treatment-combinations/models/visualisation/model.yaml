        port: dsb
        label: DSB
        group: radiotherapy
      - id: PDL1
        port: pdl1
        label: PDL1
        group: radiotherapy
      - id: TVd
        port: tvd
        label: TVD
        group: radiotherapy
      - id: nTeff
        port: tc_nd
        label: TC ND
        group: radiotherapy
      - id: dTeff
        port: tc_d
