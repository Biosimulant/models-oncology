schema_version: '2.0'
title: Hu2019 - Modeling Pancreatic Cancer Dynamics with Immunotherapy Visualisation
description: Oncology visualisation for Hu2019 - Modeling Pancreatic Cancer Dynamics with Immunotherapy.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Hu2019 - Modeling Pancreatic Cancer Dynamics with Immunotherapy
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_hu2019_modeling_pancreatic_cancer_dynamics_with_biomd0000000792_model
      title: Hu2019 - Modeling Pancreatic Cancer Dynamics with Immunotherapy
      state_observables:
      - x_PCC
      - y_PSC
      - z_Effector_Cells
      - w_TPC
      - v_TSC
      - R_siRNA
      observables:
      - id: z_Effector_Cells
        port: z_effector_cells
        label: Z Effector Cells
        group: drug_response
      - id: x_PCC
        port: x_pcc
        label: X PCC
        group: drug_response
      - id: y_PSC
        port: y_psc
        label: Y PSC
        group: drug_response
      - id: w_TPC
        port: w_tpc
        label: W TPC
        group: drug_response
      - id: v_TSC
        port: v_tsc
        label: V TSC
        group: drug_response
      - id: R_siRNA
        port: r_sirna
        label: R siRNA
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_hu2019_modeling_pancreatic_cancer_dynamics_with_biomd0000000792_model_state
    schema:
      x_PCC: float
      y_PSC: float
      z_Effector_Cells: float
      w_TPC: float
      v_TSC: float
      R_siRNA: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_hu2019_modeling_pancreatic_cancer_dynamics_with_biomd0000000792_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_hu2019_modeling_pancreatic_cancer_dynamics_with_biomd0000000792_model_species_labels
    schema:
      z_Effector_Cells: str
      x_PCC: str
      y_PSC: str
      w_TPC: str
      v_TSC: str
      R_siRNA: str
    description: Display labels for selected source states.
  outputs: []
