- from: oncology_sbml_capuani2015_human_core_catabolic_network_model1506170000_model.state
  to:
  - visualisation.oncology_sbml_capuani2015_human_core_catabolic_network_model1506170000_model_state
- from: oncology_sbml_capuani2015_human_core_catabolic_network_model1506170000_model.summary
  to:
  - visualisation.oncology_sbml_capuani2015_human_core_catabolic_network_model1506170000_model_summary
- from: oncology_sbml_capuani2015_human_core_catabolic_network_model1506170000_model.species_labels
  to:
  - visualisation.oncology_sbml_capuani2015_human_core_catabolic_network_model1506170000_model_species_labels
runtime:
