schema_version: '2.0'
title: Shariatpanahi2018 - Mathematical modeling of tumor-induced immunosuppression
  by myeloid-derived suppressor cells Visualisation
description: Oncology visualisation for Shariatpanahi2018 - Mathematical modeling
  of tumor-induced immunosuppression by myeloid-derived suppressor cells.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Shariatpanahi2018 - Mathematical modeling of tumor-induced immunosuppression
      by myeloid-derived suppressor cells
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_shariatpanahi2018_mathematical_modeling_of_tumor_model1909090003_model
      title: Shariatpanahi2018 - Mathematical modeling of tumor-induced immunosuppression
        by myeloid-derived suppressor cells
      state_observables:
      - C
      - N
      - T
      - M
      observables:
      - id: C
        label: C
        group: drug_response
      - id: N
        label: N
        group: drug_response
      - id: T
        port: tumor_cells
        label: Tumor Cells
        group: drug_response
      - id: M
        port: myeloid_derived_suppressor_cells
        label: Myeloid-Derived Suppressor Cells
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_shariatpanahi2018_mathematical_modeling_of_tumor_model1909090003_model_state
    schema:
      C: float
      N: float
      T: float
      M: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_shariatpanahi2018_mathematical_modeling_of_tumor_model1909090003_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_shariatpanahi2018_mathematical_modeling_of_tumor_model1909090003_model_species_labels
    schema:
      C: str
      N: str
      T: str
      M: str
    description: Display labels for selected source states.
  outputs: []
