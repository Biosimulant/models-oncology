schema_version: '2.0'
title: Shariatpanahi2018 - Mathematical modeling of tumor-induced immunosuppression
  by myeloid-derived suppressor cells
description: This is a ODE-based mathematical model featuring equations describing
  the dynamics of tumor cells, cytotoxic T cells, natural killer cells, and myeloid-derived
  suppressor cells (MDSCs) that together d. It can be used to explore tumor-related
  dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Seyed Peyman Shariatpanahi
- Shariatpanahi SP
- Seyed Pooya Shariatpanahi
- Keivan Madjidzadeh
- Moustapha Hassan
upstream:
  id: biomodels_ebi:MODEL1909090003
  source_db: biomodels_ebi
  source_id: MODEL1909090003
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1909090003
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1909090003?filename=Shariatpanahi2018.xml
  license: CC0
biosim:
  entrypoint: src.shariatpanahi2018_mathematical_modeling_of_tumor_model1909090003_model:Shariatpanahi2018MathematicalModelingOfTumorModel1909090003Model
  init_kwargs:
    model_path: data/MODEL1909090003.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1909090003.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: T
    label: Tumor Cells
    default: 1.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: initial_myeloid_derived_suppressor_cells
    maps_to: M
    label: Myeloid-Derived Suppressor Cells
    default: 5000000.0
    units: native SBML value
    description: Initial Myeloid-Derived Suppressor Cells. Sets the initial value
      of bundled SBML symbol `M`.
  outputs:
  - name: tumor_cells
    maps_to: T
    label: Tumor Cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: myeloid_derived_suppressor_cells
    maps_to: M
    label: Myeloid-Derived Suppressor Cells
    description: Myeloid-Derived Suppressor Cells observable. Maps to SBML symbol
      `M`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
