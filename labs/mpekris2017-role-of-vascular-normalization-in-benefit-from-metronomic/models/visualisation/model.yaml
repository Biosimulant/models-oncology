      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_mpekris2017_role_of_vascular_normalization_in_be_model2001200002_model_species_labels
    schema:
      C: str
      T: str
      Csc: str
      I: str
      N: str
      L: str
