    lab_title: Mpekris2017 - Role of vascular normalization in benefit from metronomic chemotherapy
    question: Does the baseline model indicate vascular or angiogenic support for tumour dynamics?
    answer_focus: Tracks vascular, tumour, and therapy-linked observables where present.
    visual_scope: Tumour vascularization, angiogenesis, and tissue-level response
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_mpekris2017_role_of_vascular_normalization_in_be_model2001200002_model
      title: Mpekris2017 - Role of vascular normalization in benefit from metronomic chemotherapy
      state_observables:
      - C
      - T
      - Csc
      - I
      - N
      - L
      - Treg
      observables:
      - id: C
        port: model_state_1
        label: C
        group: angiogenesis
      - id: T
        port: model_state_2
        label: T
        group: angiogenesis
      - id: Csc
        port: csc
        label: Csc
        group: angiogenesis
      - id: I
        port: model_state_4
        label: I
        group: angiogenesis
      - id: N
        port: model_state_5
        label: N
        group: angiogenesis
      - id: L
        port: model_state_6
        label: L
        group: angiogenesis
