schema_version: '2.0'
title: Rommelfanger2011 - Gompertz model of melanoma tumor therapy with vesicular
  stomatitis virus Lab
description: 'This mathematical model is described by the publication:Rommelfanger
  DM, Offord CP, Dev J, Bajzer Z, Vile RG, Dingli D. ''Dynamics of melanoma tumor
  therapy with vesicular stomatitis virus: explaining.'
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
io:
  inputs:
  - name: initial_injected_virus
    maps_to: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.initial_injected_virus
    label: Injected Virus
    default: 500000000.0
    units: native SBML value
    description: Initial Injected Virus. Sets the initial value of bundled SBML symbol
      `v_i`.
  outputs:
  - name: injected_virus
    maps_to: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.injected_virus
    description: Injected Virus observable. Maps to SBML symbol `v_i`.
  - name: state
    maps_to: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.state
  to:
  - visualisation.oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model_state
- from: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.summary
  to:
  - visualisation.oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model_summary
- from: oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model.species_labels
  to:
  - visualisation.oncology_sbml_rommelfanger2011_gompertz_model_of_melanoma_tumo_model2109110003_model_species_labels
runtime:
  duration: 0.0024
  communication_step: 1.0
  initial_inputs: {}
