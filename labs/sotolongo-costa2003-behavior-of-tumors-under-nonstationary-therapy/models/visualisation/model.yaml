schema_version: '2.0'
title: Sotolongo-Costa2003 - Behavior of tumors under nonstationary therapy Visualisation
description: Oncology visualisation for Sotolongo-Costa2003 - Behavior of tumors under nonstationary therapy.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Sotolongo-Costa2003 - Behavior of tumors under nonstationary therapy
    question: Which signaling states carry the dominant response in the bundled cancer pathway model?
    answer_focus: Tracks selected pathway species and the largest-changing SBML observable.
    visual_scope: Cancer signaling pathway activity and dominant source states
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model
      title: Sotolongo-Costa2003 - Behavior of tumors under nonstationary therapy
      state_observables:
      - x_Malignant_Cells
      - y_Lymphocytes
      observables:
      - id: x_Malignant_Cells
        port: x_malignant_cells
        label: X Malignant Cells
        group: signaling
      - id: y_Lymphocytes
        port: y_lymphocytes
        label: Y Lymphocytes
        group: signaling
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model_state
    schema:
      x_Malignant_Cells: float
      y_Lymphocytes: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model_species_labels
    schema:
      x_Malignant_Cells: str
      y_Lymphocytes: str
    description: Display labels for selected source states.
  outputs: []
