schema_version: '2.0'
package: sotolongo-costa2003-behavior-of-tumors-under-nonstation-045906ed
version: 1.0.0
title: Sotolongo-Costa2003 - Behavior of tumors under nonstationary therapy Lab
description: This model describes the interaction dynamics of a lymphocyte-tumor cell population. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_x_malignant_cells
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.initial_x_malignant_cells
    label: X Malignant Cells
    default: 5.3
    units: native SBML value
    description: Initial X Malignant Cells. Sets the initial value of bundled SBML symbol `x_Malignant_Cells`.
  - name: initial_y_lymphocytes
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.initial_y_lymphocytes
    label: Y Lymphocytes
    default: 6.7
    units: native SBML value
    description: Initial Y Lymphocytes. Sets the initial value of bundled SBML symbol `y_Lymphocytes`.
  outputs:
  - name: x_malignant_cells
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.x_malignant_cells
    description: X Malignant Cells observable. Maps to SBML symbol `x_Malignant_Cells`.
  - name: y_lymphocytes
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.y_lymphocytes
    description: Y Lymphocytes observable. Maps to SBML symbol `y_Lymphocytes`.
  - name: state
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.state
  to:
  - visualisation.oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model_state
- from: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.summary
  to:
  - visualisation.oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model_summary
- from: oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model.species_labels
  to:
  - visualisation.oncology_sbml_sotolongo_costa2003_behavior_of_tumors_under_non_biomd0000000785_model_species_labels
runtime:
