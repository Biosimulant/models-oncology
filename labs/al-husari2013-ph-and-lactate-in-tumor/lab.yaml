schema_version: '2.0'
package: al-husari2013-ph-and-lactate-in-tumor
version: 1.0.0
title: Al-Husari2013 - pH and lactate in tumor Lab
description: 'The paper describes a model of pH control in tumor. Created by COPASI
  4.26 (Build 213) This model is described in the article: Regulation of tumour intracellular
  pH: A mathematical model examining the.'
tags:
- biomodels_ebi
- curated
- faithful
- metabolism
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: intracellular_ph
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.intracellular_ph
    label: Intracellular pH
    default: 7.3
    units: native SBML value
    description: Intracellular pH. Overrides bundled SBML parameter `pHi`.
  - name: extracellular_ph
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.extracellular_ph
    label: Extracellular pH
    default: 7.0
    units: native SBML value
    description: Extracellular pH. Overrides bundled SBML parameter `pHe`.
  outputs:
  - name: intracellular_hydrogen_ion
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.intracellular_hydrogen_ion
    description: Intracellular Hydrogen Ion observable. Maps to SBML symbol `Hi`.
  - name: extracellular_hydrogen_ion
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.extracellular_hydrogen_ion
    description: Extracellular Hydrogen Ion observable. Maps to SBML symbol `He`.
  - name: intracellular_lactate
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.intracellular_lactate
    description: Intracellular Lactate observable. Maps to SBML symbol `Li`.
  - name: extracellular_lactate
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.extracellular_lactate
    description: Extracellular Lactate observable. Maps to SBML symbol `Le`.
  - name: state
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.state
  to:
  - visualisation.oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model_state
- from: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.summary
  to:
  - visualisation.oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model_summary
- from: oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model.species_labels
  to:
  - visualisation.oncology_sbml_al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
