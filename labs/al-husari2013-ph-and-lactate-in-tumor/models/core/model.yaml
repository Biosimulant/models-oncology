schema_version: '2.0'
title: Al-Husari2013 - pH and lactate in tumor
description: 'The paper describes a model of pH control in tumor. Created by COPASI
  4.26 (Build 213) This model is described in the article: Regulation of tumour intracellular
  pH: A mathematical model examining the.'
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- metabolism
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Maymona Al-Husari
- Steven D Webb
upstream:
  id: biomodels_ebi:BIOMD0000000805
  source_db: biomodels_ebi
  source_id: BIOMD0000000805
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000805
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000805?filename=Al-Husari2013.xml
  license: CC0
biosim:
  entrypoint: src.al_husari2013_ph_and_lactate_in_tumor_biomd0000000805_model:AlHusari2013PhAndLactateInTumorBiomd0000000805Model
  init_kwargs:
    model_path: data/BIOMD0000000805.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000805.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: intracellular_ph
    maps_to: pHi
    label: Intracellular pH
    default: 7.3
    units: native SBML value
    description: Intracellular pH. Overrides bundled SBML parameter `pHi`.
  - name: extracellular_ph
    maps_to: pHe
    label: Extracellular pH
    default: 7.0
    units: native SBML value
    description: Extracellular pH. Overrides bundled SBML parameter `pHe`.
  outputs:
  - name: intracellular_hydrogen_ion
    maps_to: Hi
    label: Intracellular Hydrogen Ion
    description: Intracellular Hydrogen Ion observable. Maps to SBML symbol `Hi`.
  - name: extracellular_hydrogen_ion
    maps_to: He
    label: Extracellular Hydrogen Ion
    description: Extracellular Hydrogen Ion observable. Maps to SBML symbol `He`.
  - name: intracellular_lactate
    maps_to: Li
    label: Intracellular Lactate
    description: Intracellular Lactate observable. Maps to SBML symbol `Li`.
  - name: extracellular_lactate
    maps_to: Le
    label: Extracellular Lactate
    description: Extracellular Lactate observable. Maps to SBML symbol `Le`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
