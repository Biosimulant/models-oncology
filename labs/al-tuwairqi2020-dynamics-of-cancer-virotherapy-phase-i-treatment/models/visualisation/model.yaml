schema_version: '2.0'
title: Al-Tuwairqi2020 - Dynamics of cancer virotherapy - Phase I treatment Visualisation
description: Oncology visualisation for Al-Tuwairqi2020 - Dynamics of cancer virotherapy - Phase I treatment.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Al-Tuwairqi2020 - Dynamics of cancer virotherapy - Phase I treatment
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_al_tuwairqi2020_dynamics_of_cancer_virotherapy_p_biomd0000001031_model
      title: Al-Tuwairqi2020 - Dynamics of cancer virotherapy - Phase I treatment
      state_observables:
      - uninfected_cancer_cells
      - infected_cancer_cells
      - free_virus
      observables:
      - id: uninfected_cancer_cells
        port: uninfected_cancer_cells
        label: Uninfected cancer cells
        group: drug_response
      - id: infected_cancer_cells
        port: infected_cancer_cells
        label: Infected cancer cells
        group: drug_response
      - id: free_virus
        port: free_virus
        label: Free virus
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_al_tuwairqi2020_dynamics_of_cancer_virotherapy_p_biomd0000001031_model_state
    schema:
      uninfected_cancer_cells: float
      infected_cancer_cells: float
      free_virus: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_al_tuwairqi2020_dynamics_of_cancer_virotherapy_p_biomd0000001031_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_al_tuwairqi2020_dynamics_of_cancer_virotherapy_p_biomd0000001031_model_species_labels
    schema:
      uninfected_cancer_cells: str
      infected_cancer_cells: str
      free_virus: str
    description: Display labels for selected source states.
  outputs: []
