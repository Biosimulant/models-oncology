title: Malinzi2018 - Enhancement of chemotherapy using oncolytic virotherapy Lab
description: IA spatio-temporal mathematical model, in the form of a moving boundary problem, to explain cancer dormancy is developed. Analysis of the model is carried out for both temporal and spatio-temporal cas.
