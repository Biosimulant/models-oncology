schema_version: '2.0'
title: Coletti2020 - QSP model of prostate cancer immunotherapy Lab
description: This model is based on the publication:Coletti R, Leonardelli L, Parolo S, Marchetti L. A QSP model of prostate cancer immunotherapy to identify effective combination therapies.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: k_antiil_level
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.k_antiil_level
    label: K antiIl source parameter
    default: 0.714
    units: native SBML value
    description: K antiIl source parameter. Maps to bundled SBML parameter `k_antiIl`.
  outputs:
  - name: model_state_1
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.model_state_1
    description: X 1 observable. Maps to SBML symbol `X_1`.
  - name: model_state_2
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.model_state_2
    description: A observable. Maps to SBML symbol `A`.
  - name: model_state_3
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.model_state_3
    description: D m observable. Maps to SBML symbol `D_m`.
  - name: model_state_4
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.model_state_4
    description: C 2 observable. Maps to SBML symbol `C_2`.
  - name: model_state_5
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.model_state_5
    description: I 2 observable. Maps to SBML symbol `I_2`.
  - name: model_state_6
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.model_state_6
    description: N observable. Maps to SBML symbol `N`.
  - name: state
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.state
  to:
  - visualisation.oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model_state
- from: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.summary
  to:
  - visualisation.oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model_summary
- from: oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model.species_labels
  to:
  - visualisation.oncology_sbml_coletti2020_qsp_model_of_prostate_cancer_immunot_model2109110002_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
