schema_version: '2.0'
title: Rouhimoghadam2018 - GPR30/PI3K/MAPK/STAT signaling pathway in normal and cancer
  cells Lab
description: In the current study, we aimed to simulate the GPR30/PI3K/MAPK/STAT signaling
  pathway in normal and cancer cells by the use of ordinary differential equation
  modeling. It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.
