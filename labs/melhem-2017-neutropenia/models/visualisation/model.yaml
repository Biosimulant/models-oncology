schema_version: '2.0'
title: Melhem 2017 - Neutropenia Model Visualisation
description: Oncology visualisation for Melhem 2017 - Neutropenia Model.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Melhem 2017 - Neutropenia Model
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model
      title: Melhem 2017 - Neutropenia Model
      state_observables:
      - Chm
      - Crt
      - Dt
      - Mt
      - Pm1
      - Pm2
      - Rb
      - Sc
      - Sm
      observables:
      - id: Chm
        port: chm
        label: Chm
        group: drug_response
      - id: Crt
        port: crt
        label: Crt
        group: drug_response
      - id: Dt
        port: model_state_3
        label: Dt
        group: drug_response
      - id: Mt
        port: model_state_4
        label: Mt
        group: drug_response
      - id: Pm1
        port: pm1
        label: Pm1
        group: drug_response
      - id: Pm2
        port: pm2
        label: Pm2
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model_state
    schema:
      Chm: float
      Crt: float
      Dt: float
      Mt: float
      Pm1: float
      Pm2: float
      Rb: float
      Sc: float
      Sm: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model_species_labels
    schema:
      Chm: str
      Crt: str
      Dt: str
      Mt: str
      Pm1: str
      Pm2: str
    description: Display labels for selected source states.
  outputs: []
