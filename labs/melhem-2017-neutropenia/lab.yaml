schema_version: '2.0'
title: Melhem 2017 - Neutropenia Model Lab
description: "The objective of the present study was to use pharmacokinetic\u2013\
  pharmacodynamic modelling to characterize the effects of chemotherapy on the granulopoietic\
  \ system and to predict the absolute neutrophil. It can be used to explore tumor-related\
  \ dynamics and compare treatment-response behavior across conditions."
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_chm
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.initial_chm
    label: Chm
    default: 0.0
    units: native SBML value
    description: Initial Chm. Sets the initial value of bundled SBML symbol `Chm`.
  - name: initial_crt
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.initial_crt
    label: Crt
    default: 0.0
    units: native SBML value
    description: Initial Crt. Sets the initial value of bundled SBML symbol `Crt`.
  outputs:
  - name: chm
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.chm
    description: Chm observable. Maps to SBML symbol `Chm`.
  - name: crt
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.crt
    description: Crt observable. Maps to SBML symbol `Crt`.
  - name: dt
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.dt
    description: Dt observable. Maps to SBML symbol `Dt`.
  - name: mt
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.mt
    description: Mt observable. Maps to SBML symbol `Mt`.
  - name: pm1
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.pm1
    description: Pm1 observable. Maps to SBML symbol `Pm1`.
  - name: pm2
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.pm2
    description: Pm2 observable. Maps to SBML symbol `Pm2`.
  - name: state
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.state
  to:
  - visualisation.oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model_state
- from: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.summary
  to:
  - visualisation.oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model_summary
- from: oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model.species_labels
  to:
  - visualisation.oncology_sbml_melhem_2017_neutropenia_model_model2211040001_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
