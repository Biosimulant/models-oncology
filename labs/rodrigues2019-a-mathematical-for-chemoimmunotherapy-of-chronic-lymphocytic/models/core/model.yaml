schema_version: '2.0'
title: Rodrigues2019 - A mathematical model for chemoimmunotherapy of chronic lymphocytic
  leukemia
description: THis is a simple ordinary differential equation model describing chemoimmunotherapy
  of chronic lymphocytic leukemia, including descriptions of the combinatorial effects
  of chemotherapy and adoptive ce. It can be used to explore tumor-related dynamics
  and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Rodrigues, D.S.
- Mancera, P.F.A.
- Carvalho, T.
- "Gon\xE7alves, L.F."
upstream:
  id: biomodels_ebi:BIOMD0000000879
  source_db: biomodels_ebi
  source_id: BIOMD0000000879
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000879
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000879?filename=Rodrigues2019.xml
  license: CC0
biosim:
  entrypoint: src.rodrigues2019_a_mathematical_model_for_chemoimmu_biomd0000000879_model:Rodrigues2019AMathematicalModelForChemoimmuBiomd0000000879Model
  init_kwargs:
    model_path: data/BIOMD0000000879.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000879.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: chemotherapy_input_source_parameter
    maps_to: Chemotherapy_Input
    label: Chemotherapy Input source parameter
    default: 8640.0
    units: native SBML value
    description: Chemotherapy Input source parameter. Maps to bundled SBML parameter
      `Chemotherapy_Input`.
  - name: immunotherapy_input_source_parameter
    maps_to: Immunotherapy_Input
    label: Immunotherapy Input source parameter
    default: 0.0
    units: native SBML value
    description: Immunotherapy Input source parameter. Maps to bundled SBML parameter
      `Immunotherapy_Input`.
  - name: infusion_dose_source_parameter
    maps_to: Infusion_Dose
    label: Infusion Dose source parameter
    default: 1080.0
    units: native SBML value
    description: Infusion Dose source parameter. Maps to bundled SBML parameter `Infusion_Dose`.
  outputs:
  - name: normal_cells
    maps_to: N
    label: N
    description: N observable. Maps to SBML symbol `N`.
  - name: infected_tumor_cells
    maps_to: I
    label: I
    description: I observable. Maps to SBML symbol `I`.
  - name: q
    maps_to: Q
    label: Q
    description: Q observable. Maps to SBML symbol `Q`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
