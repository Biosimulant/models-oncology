schema_version: '2.0'
title: Rodrigues2019 - A mathematical model for chemoimmunotherapy of chronic lymphocytic
  leukemia Visualisation
description: Oncology visualisation for Rodrigues2019 - A mathematical model for chemoimmunotherapy
  of chronic lymphocytic leukemia.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Rodrigues2019 - A mathematical model for chemoimmunotherapy of chronic
      lymphocytic leukemia
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_rodrigues2019_a_mathematical_model_for_chemoimmu_biomd0000000879_model
      title: Rodrigues2019 - A mathematical model for chemoimmunotherapy of chronic
        lymphocytic leukemia
      state_observables:
      - N
      - I
      - Q
      observables:
      - id: N
        port: normal_cells
        label: N
        group: drug_response
      - id: I
        port: infected_tumor_cells
        label: I
        group: drug_response
      - id: Q
        port: q
        label: Q
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_rodrigues2019_a_mathematical_model_for_chemoimmu_biomd0000000879_model_state
    schema:
      N: float
      I: float
      Q: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_rodrigues2019_a_mathematical_model_for_chemoimmu_biomd0000000879_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_rodrigues2019_a_mathematical_model_for_chemoimmu_biomd0000000879_model_species_labels
    schema:
      N: str
      I: str
      Q: str
    description: Display labels for selected source states.
  outputs: []
