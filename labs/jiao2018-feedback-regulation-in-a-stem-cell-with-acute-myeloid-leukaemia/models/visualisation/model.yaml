schema_version: '2.0'
title: Jiao2018 - Feedback regulation in a stem cell model with acute myeloid leukaemia Visualisation
description: Oncology visualisation for Jiao2018 - Feedback regulation in a stem cell model with acute myeloid leukaemia.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Jiao2018 - Feedback regulation in a stem cell model with acute myeloid leukaemia
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_jiao2018_feedback_regulation_in_a_stem_cell_mode_biomd0000000898_model
      title: Jiao2018 - Feedback regulation in a stem cell model with acute myeloid leukaemia
      state_observables:
      - S_HSC
      - A_PC
      - D_TDSC
      - L_LSC
      - T_TDLC
      observables:
      - id: S_HSC
        port: s_hsc
        label: S HSC
        group: drug_response
      - id: A_PC
        port: a_pc
        label: A PC
        group: drug_response
      - id: L_LSC
        port: l_lsc
        label: L LSC
        group: drug_response
      - id: D_TDSC
        port: d_tdsc
        label: D TDSC
        group: drug_response
      - id: T_TDLC
        port: t_tdlc
        label: T TDLC
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_jiao2018_feedback_regulation_in_a_stem_cell_mode_biomd0000000898_model_state
    schema:
      S_HSC: float
      A_PC: float
      D_TDSC: float
      L_LSC: float
      T_TDLC: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_jiao2018_feedback_regulation_in_a_stem_cell_mode_biomd0000000898_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_jiao2018_feedback_regulation_in_a_stem_cell_mode_biomd0000000898_model_species_labels
    schema:
      S_HSC: str
      A_PC: str
      L_LSC: str
      D_TDSC: str
      T_TDLC: str
    description: Display labels for selected source states.
  outputs: []
