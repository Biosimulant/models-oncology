schema_version: '2.0'
title: Chen2011/1 - bone marrow invasion absolute model Visualisation
description: Oncology visualisation for Chen2011/1 - bone marrow invasion absolute model.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Chen2011/1 - bone marrow invasion absolute model
    question: What oncology-relevant state dominates the bundled SBML simulation over the baseline run?
    answer_focus: Compares the largest-changing and peak observables with selected source states.
    visual_scope: Tumor-system state trajectories and dominant observable changes
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model
      title: Chen2011/1 - bone marrow invasion absolute model
      state_observables:
      - H
      - T
      observables:
      - id: H
        port: model_state_1
        label: H
        group: tumor_system
      - id: T
        port: model_state_2
        label: T
        group: tumor_system
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model_state
    schema:
      H: float
      T: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model_species_labels
    schema:
      H: str
      T: str
    description: Display labels for selected source states.
  outputs: []
