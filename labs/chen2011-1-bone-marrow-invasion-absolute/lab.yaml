schema_version: '2.0'
title: Chen2011/1 - bone marrow invasion absolute model Lab
description: 'The paper describes a model of tumor invasion to bone marrow. Created
  by COPASI 4.26 (Build 213) This model is described in the article: Modeling invasion
  of metastasizing cancer cells to bone marrow.'
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_healthy_bone_marrow
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.initial_healthy_bone_marrow
    label: Healthy Bone Marrow
    default: 0.6
    units: native SBML value
    description: Initial Healthy Bone Marrow. Sets the initial value of bundled SBML
      symbol `H`.
  - name: initial_tumor_burden
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.initial_tumor_burden
    label: Tumor Burden
    default: 0.0001
    units: native SBML value
    description: Initial Tumor Burden. Sets the initial value of bundled SBML symbol
      `T`.
  outputs:
  - name: healthy_bone_marrow
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.healthy_bone_marrow
    description: Healthy Bone Marrow observable. Maps to SBML symbol `H`.
  - name: tumor_burden
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.tumor_burden
    description: Tumor Burden observable. Maps to SBML symbol `T`.
  - name: state
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.state
  to:
  - visualisation.oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model_state
- from: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.summary
  to:
  - visualisation.oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model_summary
- from: oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model.species_labels
  to:
  - visualisation.oncology_sbml_chen2011_1_bone_marrow_invasion_absolute_model_biomd0000000793_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
