schema_version: '2.0'
title: Bayleyegn2016 - interactions of CycE/Cdk2, Cdc25A, and P27 Kip1 in a core cancer
  subnetwork
description: Mathematical description of the interactions of CycE/Cdk2, Cdc25A, and
  P27Kip1 in a core cancer subnetwork. Model is encoded by Matthieu Maire/partially
  by Krishna Kumar Tiwari and submitted to BioMod.
standard: other
tags:
- biomodels_ebi
- cellcycle
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Y.N.Bayleyegn
- K.S.Govinder
upstream:
  id: biomodels_ebi:MODEL2003180002
  source_db: biomodels_ebi
  source_id: MODEL2003180002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2003180002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2003180002?filename=Bayleyegn2016.xml
  license: CC0
biosim:
  entrypoint: src.bayleyegn2016_interactions_of_cyce_cdk2_cdc25a_a_model2003180002_model:Bayleyegn2016InteractionsOfCyceCdk2Cdc25aAModel2003180002Model
  init_kwargs:
    model_path: data/MODEL2003180002.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL2003180002.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_cyce_cdk2
    maps_to: CycE_CDK2
    label: CycE/CDK2
    default: 1.0
    units: native SBML value
    description: Initial CycE/CDK2. Sets the initial value of bundled SBML symbol
      `CycE_CDK2`.
  - name: initial_cdc25a
    maps_to: Cdc25A
    label: Cdc25A
    default: 1.0
    units: native SBML value
    description: Initial Cdc25A. Sets the initial value of bundled SBML symbol `Cdc25A`.
  - name: initial_p27_kip1
    maps_to: p27_kip1
    label: p27 Kip1
    default: 1.0
    units: native SBML value
    description: Initial p27 Kip1. Sets the initial value of bundled SBML symbol `p27_kip1`.
  outputs:
  - name: cyc_e_cdk2
    maps_to: CycE_CDK2
    label: CycE CDK2
    description: CycE CDK2 observable. Maps to SBML symbol `CycE_CDK2`.
  - name: p27_kip1
    maps_to: p27_kip1
    label: P27 kip1
    description: P27 kip1 observable. Maps to SBML symbol `p27_kip1`.
  - name: cdc25a
    maps_to: Cdc25A
    label: Cdc25A
    description: Cdc25A observable. Maps to SBML symbol `Cdc25A`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
