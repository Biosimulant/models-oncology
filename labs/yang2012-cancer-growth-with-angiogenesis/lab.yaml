schema_version: '2.0'
package: yang2012-cancer-growth-with-angiogenesis
version: 1.0.0
title: Yang2012 - cancer growth with angiogenesis Lab
description: 'The paper describes a model of tumor growth with angiogenesis. Created
  by COPASI 4.26 (Build 213) This model is described in the article: Mathematical
  modeling of solid cancer growth with angiogenesis.'
tags:
- angiogenesis
- biomodels_ebi
- curated
- faithful
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_cancer_cells
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.initial_cancer_cells
    label: Cancer Cells
    default: 9.0
    units: native SBML value
    description: Initial Cancer Cells. Sets the initial value of bundled SBML symbol
      `C`.
  - name: initial_endothelial_cells
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.initial_endothelial_cells
    label: Endothelial Cells
    default: 10.0
    units: native SBML value
    description: Initial Endothelial Cells. Sets the initial value of bundled SBML
      symbol `E`.
  outputs:
  - name: cancer_cells
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.cancer_cells
    description: Cancer Cells observable. Maps to SBML symbol `C`.
  - name: endothelial_cells
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.endothelial_cells
    description: Endothelial Cells observable. Maps to SBML symbol `E`.
  - name: state
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.state
  to:
  - visualisation.oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model_state
- from: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.summary
  to:
  - visualisation.oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model_summary
- from: oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model.species_labels
  to:
  - visualisation.oncology_sbml_yang2012_cancer_growth_with_angiogenesis_biomd0000000796_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
