  - name: model_state_3
    maps_to: T
    label: T
    description: T observable. Maps to SBML symbol `T`.
  - name: model_state_4
    maps_to: P
    label: P
    description: P observable. Maps to SBML symbol `P`.
  - name: model_state_5
    maps_to: A
    label: A
    description: A observable. Maps to SBML symbol `A`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
