schema_version: '2.0'
package: wodarz2001-viruses-as-antitumor-weapons
version: 1.0.0
title: Wodarz2001 - Viruses as antitumor weapons Lab
description: 'This mathematical model of the dynamics between tumor, virus and virus-specific CTL populations is described by the publication:Wodarz D. ''Viruses as antitumor weapons: defining conditions for tumor r.'
tags:
- biomodels_ebi
- curated
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
io:
  inputs:
  - name: initial_uninfected_tumor_cells
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.initial_uninfected_tumor_cells
    label: Uninfected tumor cells
    default: 0.01
    units: native SBML value
    description: Initial Uninfected tumor cells. Sets the initial value of bundled SBML symbol `uninfected_tumor_cells`.
  - name: initial_infected_tumor_cells
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.initial_infected_tumor_cells
    label: Infected tumor cells
    default: 0.0001
    units: native SBML value
    description: Initial Infected tumor cells. Sets the initial value of bundled SBML symbol `infected_tumor_cells`.
  - name: initial_virus_specific_ctls
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.initial_virus_specific_ctls
    label: Virus specific CTLs
    default: 0.0
    units: native SBML value
    description: Initial Virus specific CTLs. Sets the initial value of bundled SBML symbol `virus_specific_CTLs`.
  outputs:
  - name: uninfected_tumor_cells
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.uninfected_tumor_cells
    description: Uninfected tumor cells observable. Maps to SBML symbol `uninfected_tumor_cells`.
  - name: infected_tumor_cells
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.infected_tumor_cells
    description: Infected tumor cells observable. Maps to SBML symbol `infected_tumor_cells`.
  - name: virus_specific_ctls
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.virus_specific_ctls
    description: Virus specific CTLs observable. Maps to SBML symbol `virus_specific_CTLs`.
  - name: state
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.state
  to:
  - visualisation.oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model_state
- from: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.summary
  to:
  - visualisation.oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model_summary
- from: oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model.species_labels
  to:
  - visualisation.oncology_sbml_wodarz2001_viruses_as_antitumor_weapons_biomd0000001043_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
