schema_version: '2.0'
title: Palaniappan2021 - Cell free modelling of second generation Toehold switches
  Lab
description: Cervical cancer is a global public health subject as it affects women
  in the reproductive ages, and accounts for the second largest burden among cancer
  patients worldwide with an unforgiving 50% morta. It can be used to explore tumor-related
  dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_mi_r
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.initial_mi_r
    label: MiR
    default: 1.2e-07
    units: native SBML value
    description: Initial MiR. Sets the initial value of bundled SBML symbol `miR`.
  - name: initial_antimi_r
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.initial_antimi_r
    label: AntimiR
    default: 1.2e-07
    units: native SBML value
    description: Initial AntimiR. Sets the initial value of bundled SBML symbol `antimiR`.
  - name: initial_toehold_dna
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.initial_toehold_dna
    label: Toehold DNA
    default: 2.35e-07
    units: native SBML value
    description: Initial Toehold DNA. Sets the initial value of bundled SBML symbol
      `Toehold_DNA`.
  - name: initial_gfp
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.initial_gfp
    label: GFP
    default: 0.0
    units: native SBML value
    description: Initial GFP. Sets the initial value of bundled SBML symbol `GFP`.
  - name: initial_toehold_rna_cts
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.initial_toehold_rna_cts
    label: Toehold RNA CTS
    default: 0.0
    units: native SBML value
    description: Initial Toehold RNA CTS. Sets the initial value of bundled SBML symbol
      `Toehold_RNA_CTS`.
  - name: initial_mi_r_antimi_r
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.initial_mi_r_antimi_r
    label: MiR antimiR
    default: 0.0
    units: native SBML value
    description: Initial MiR antimiR. Sets the initial value of bundled SBML symbol
      `miR_antimiR`.
  outputs:
  - name: mi_r
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.mi_r
    description: MiR observable. Maps to SBML symbol `miR`.
  - name: antimi_r
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.antimi_r
    description: AntimiR observable. Maps to SBML symbol `antimiR`.
  - name: toehold_dna
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.toehold_dna
    description: Toehold DNA observable. Maps to SBML symbol `Toehold_DNA`.
  - name: gfp
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.gfp
    description: GFP observable. Maps to SBML symbol `GFP`.
  - name: toehold_rna_cts
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.toehold_rna_cts
    description: Toehold RNA CTS observable. Maps to SBML symbol `Toehold_RNA_CTS`.
  - name: mi_r_antimi_r
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.mi_r_antimi_r
    description: MiR antimiR observable. Maps to SBML symbol `miR_antimiR`.
  - name: state
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.state
  to:
  - visualisation.oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model_state
- from: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.summary
  to:
  - visualisation.oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model_summary
- from: oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model.species_labels
  to:
  - visualisation.oncology_sbml_palaniappan2021_cell_free_modelling_of_second_ge_biomd0000001103_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
