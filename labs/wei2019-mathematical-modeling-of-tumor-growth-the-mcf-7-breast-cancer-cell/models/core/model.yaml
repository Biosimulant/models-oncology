schema_version: '2.0'
title: Wei2019 - Mathematical modeling of tumor growth The MCF-7 breast cancer cell
  line
description: This is a mathematical model describing MCF-7 cancer cell growth with
  interaction between tumor cells, estradiol (hormone-dependent tumor growth), natural
  killer cells, cytotoxic T lymphocytes and whi. It can be used to explore tumor-related
  dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- radiotherapy
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Wei, H.C.
upstream:
  id: biomodels_ebi:MODEL1909090002
  source_db: biomodels_ebi
  source_id: MODEL1909090002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1909090002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1909090002?filename=Wei2019.xml
  license: CC0
biosim:
  entrypoint: src.wei2019_mathematical_modeling_of_tumor_growth_th_model1909090002_model:Wei2019MathematicalModelingOfTumorGrowthThModel1909090002Model
  init_kwargs:
    model_path: data/MODEL1909090002.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1909090002.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_breast_tumor_cells
    maps_to: T
    label: Breast Tumor Cells
    default: 1000000.0
    units: native SBML value
    description: Initial Breast Tumor Cells. Sets the initial value of bundled SBML
      symbol `T`.
  outputs:
  - name: breast_tumor_cells
    maps_to: T
    label: Breast Tumor Cells
    description: Breast Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
