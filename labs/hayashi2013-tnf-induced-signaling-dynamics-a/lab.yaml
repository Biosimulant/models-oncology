schema_version: '2.0'
title: Hayashi2013 - TNF-induced Signaling Dynamics (Model A) Lab
description: Hayashi2013 - TNF-induced Signaling Dynamics Model (Model A)Tumor necrosis
  factor (TNF) plays a crucial role in inflammation and is associated with diseases
  such as rheumatoid arthritis and cancer. It can be used to explore tumor-related
  dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_tnfr1
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.initial_tnfr1
    label: TNFR1
    default: 1.0
    units: native SBML value
    description: Initial TNFR1. Sets the initial value of bundled SBML symbol `species_3`.
  - name: initial_nfk_bc
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.initial_nfk_bc
    label: NFkBc
    default: 0.0
    units: native SBML value
    description: Initial NFkBc. Sets the initial value of bundled SBML symbol `species_2`.
  - name: initial_traf6
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.initial_traf6
    label: TRAF6
    default: 0.0
    units: native SBML value
    description: Initial TRAF6. Sets the initial value of bundled SBML symbol `species_6`.
  - name: initial_traf5
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.initial_traf5
    label: TRAF5
    default: 0.0
    units: native SBML value
    description: Initial TRAF5. Sets the initial value of bundled SBML symbol `species_7`.
  - name: initial_traf2
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.initial_traf2
    label: TRAF2
    default: 0.0
    units: native SBML value
    description: Initial TRAF2. Sets the initial value of bundled SBML symbol `species_9`.
  - name: initial_erkc
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.initial_erkc
    label: ERKc
    default: 0.0
    units: native SBML value
    description: Initial ERKc. Sets the initial value of bundled SBML symbol `species_16`.
  outputs:
  - name: tnfr1
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.tnfr1
    description: TNFR1 observable. Maps to SBML symbol `species_3`.
  - name: nfk_bc
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.nfk_bc
    description: NFkBc observable. Maps to SBML symbol `species_2`.
  - name: traf6
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.traf6
    description: TRAF6 observable. Maps to SBML symbol `species_6`.
  - name: traf5
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.traf5
    description: TRAF5 observable. Maps to SBML symbol `species_7`.
  - name: traf2
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.traf2
    description: TRAF2 observable. Maps to SBML symbol `species_9`.
  - name: erkc
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.erkc
    description: ERKc observable. Maps to SBML symbol `species_16`.
  - name: state
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.state
  to:
  - visualisation.oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model_state
- from: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.summary
  to:
  - visualisation.oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model_summary
- from: oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model.species_labels
  to:
  - visualisation.oncology_sbml_hayashi2013_tnf_induced_signaling_dynamics_model_model2502170001_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
