schema_version: '2.0'
title: Ribba2018 - Mathematical Model of Tumor Uptake for Immunocytokine-Based Cancer
  Immunotherapy Lab
description: This is a model developed to predict concentrations of cergutuzumab amunaleukin
  (CEA-IL2v) after various systemic dosing intensities. It can be used to explore
  tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: epsilon_source_parameter
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.epsilon_source_parameter
    label: Epsilon source parameter
    default: 0.25
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  - name: initial_for_epsilon_source_parameter
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.initial_for_epsilon_source_parameter
    label: for epsilon source parameter
    default: 0.25
    units: native SBML value
    description: Initial for epsilon source parameter. Maps to bundled SBML parameter
      `ModelValue_2`.
  - name: initial_a_1_b
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.initial_a_1_b
    label: A 1 b
    default: 8.0
    units: native SBML value
    description: Initial A 1 b. Sets the initial value of bundled SBML symbol `A_1_b`.
  - name: initial_c_4_t
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.initial_c_4_t
    label: C 4 T
    default: 0.0
    units: native SBML value
    description: Initial C 4 T. Sets the initial value of bundled SBML symbol `C_4_T`.
  outputs:
  - name: a_1_b
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.a_1_b
    description: A 1 b observable. Maps to SBML symbol `A_1_b`.
  - name: c_4_t
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.c_4_t
    description: C 4 T observable. Maps to SBML symbol `C_4_T`.
  - name: state
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.state
  to:
  - visualisation.oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model_state
- from: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.summary
  to:
  - visualisation.oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model_summary
- from: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model.species_labels
  to:
  - visualisation.oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
