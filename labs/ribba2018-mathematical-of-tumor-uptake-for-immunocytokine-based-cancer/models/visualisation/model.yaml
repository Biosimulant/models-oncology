schema_version: '2.0'
title: Ribba2018 - Mathematical Model of Tumor Uptake for Immunocytokine-Based Cancer
  Immunotherapy Visualisation
description: Oncology visualisation for Ribba2018 - Mathematical Model of Tumor Uptake
  for Immunocytokine-Based Cancer Immunotherapy.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Ribba2018 - Mathematical Model of Tumor Uptake for Immunocytokine-Based
      Cancer Immunotherapy
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model
      title: Ribba2018 - Mathematical Model of Tumor Uptake for Immunocytokine-Based
        Cancer Immunotherapy
      state_observables:
      - A_1_b
      - C_4_T
      observables:
      - id: A_1_b
        port: a_1_b
        label: A 1 b
        group: drug_response
      - id: C_4_T
        port: c_4_t
        label: C 4 T
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model_state
    schema:
      A_1_b: float
      C_4_T: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model_species_labels
    schema:
      A_1_b: str
      C_4_T: str
    description: Display labels for selected source states.
  outputs: []
