schema_version: '2.0'
title: Ribba2018 - Mathematical Model of Tumor Uptake for Immunocytokine-Based Cancer
  Immunotherapy
description: This is a model developed to predict concentrations of cergutuzumab amunaleukin
  (CEA-IL2v) after various systemic dosing intensities. It can be used to explore
  tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Benjamin Ribba
- Christophe Boetsch
- Tapan Nayak
- Hans Peter Grimm
- Jehad Charo
upstream:
  id: biomodels_ebi:MODEL1909050002
  source_db: biomodels_ebi
  source_id: MODEL1909050002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1909050002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1909050002?filename=Ribba2018
    Model 2.xml
  license: CC0
biosim:
  entrypoint: src.ribba2018_mathematical_model_of_tumor_uptake_for_model1909050002_model:Ribba2018MathematicalModelOfTumorUptakeForModel1909050002Model
  init_kwargs:
    model_path: data/MODEL1909050002.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1909050002.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: epsilon_source_parameter
    maps_to: epsilon
    label: Epsilon source parameter
    default: 0.25
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  - name: initial_for_epsilon_source_parameter
    maps_to: ModelValue_2
    label: for epsilon source parameter
    default: 0.25
    units: native SBML value
    description: Initial for epsilon source parameter. Maps to bundled SBML parameter
      `ModelValue_2`.
  - name: initial_a_1_b
    maps_to: A_1_b
    label: A 1 b
    default: 8.0
    units: native SBML value
    description: Initial A 1 b. Sets the initial value of bundled SBML symbol `A_1_b`.
  - name: initial_c_4_t
    maps_to: C_4_T
    label: C 4 T
    default: 0.0
    units: native SBML value
    description: Initial C 4 T. Sets the initial value of bundled SBML symbol `C_4_T`.
  outputs:
  - name: a_1_b
    maps_to: A_1_b
    label: A 1 b
    description: A 1 b observable. Maps to SBML symbol `A_1_b`.
  - name: c_4_t
    maps_to: C_4_T
    label: C 4 T
    description: C 4 T observable. Maps to SBML symbol `C_4_T`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
