schema_version: '2.0'
title: Monro2008 - chemotherapy resistance Visualisation
description: Oncology visualisation for Monro2008 - chemotherapy resistance.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Monro2008 - chemotherapy resistance
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_monro2008_chemotherapy_resistance_biomd0000000776_model
      title: Monro2008 - chemotherapy resistance
      state_observables:
      - S
      - R
      observables:
      - id: S
        port: model_state_1
        label: S
        group: drug_response
      - id: R
        port: model_state_2
        label: R
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_monro2008_chemotherapy_resistance_biomd0000000776_model_state
    schema:
      S: float
      R: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_monro2008_chemotherapy_resistance_biomd0000000776_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_monro2008_chemotherapy_resistance_biomd0000000776_model_species_labels
    schema:
      S: str
      R: str
    description: Display labels for selected source states.
  outputs: []
