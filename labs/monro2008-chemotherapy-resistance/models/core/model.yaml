schema_version: '2.0'
title: Monro2008 - chemotherapy resistance
description: 'The paper describes a model of resistance of cancer to chemotherapy.
  Created by COPASI 4.25 (Build 207) This model is described in the article: Modelling
  chemotherapy resistance in palliation and fail.'
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Helen C Monro
- Eamonn A Gaffney
upstream:
  id: biomodels_ebi:BIOMD0000000776
  source_db: biomodels_ebi
  source_id: BIOMD0000000776
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000776
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000776?filename=Monro2008.xml
  license: CC0
biosim:
  entrypoint: src.monro2008_chemotherapy_resistance_biomd0000000776_model:Monro2008ChemotherapyResistanceBiomd0000000776Model
  init_kwargs:
    model_path: data/BIOMD0000000776.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000776.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_chemo_sensitive_cells
    maps_to: S
    label: Chemo-Sensitive Cells
    default: 10000000000.0
    units: native SBML value
    description: Initial Chemo-Sensitive Cells. Sets the initial value of bundled
      SBML symbol `S`.
  - name: initial_chemo_resistant_cells
    maps_to: R
    label: Chemo-Resistant Cells
    default: 200000.0
    units: native SBML value
    description: Initial Chemo-Resistant Cells. Sets the initial value of bundled
      SBML symbol `R`.
  - name: chemotherapy_concentration
    maps_to: C0
    label: Chemotherapy Concentration
    default: 2.0
    units: native SBML value
    description: Chemotherapy Concentration. Overrides bundled SBML parameter `C0`.
  outputs:
  - name: chemo_sensitive_cells
    maps_to: S
    label: Chemo-Sensitive Cells
    description: Chemo-Sensitive Cells observable. Maps to SBML symbol `S`.
  - name: chemo_resistant_cells
    maps_to: R
    label: Chemo-Resistant Cells
    description: Chemo-Resistant Cells observable. Maps to SBML symbol `R`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
