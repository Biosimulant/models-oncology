schema_version: '2.0'
title: Abernathy2016 - glioblastoma treatment Visualisation
description: Oncology visualisation for Abernathy2016 - glioblastoma treatment.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Abernathy2016 - glioblastoma treatment
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model
      title: Abernathy2016 - glioblastoma treatment
      state_observables:
      - Tumor
      - CancerStemCell
      - CytotoxicTcell
      - TGFb
      - IFNy
      - MHC1
      - MHC2
      observables:
      - id: Tumor
        port: tumor
        label: Tumor
        group: drug_response
      - id: CancerStemCell
        port: cancerstemcell
        label: CancerStemCell
        group: drug_response
      - id: CytotoxicTcell
        port: cytotoxictcell
        label: CytotoxicTcell
        group: drug_response
      - id: TGFb
        port: tgfb
        label: TGFb
        group: drug_response
      - id: IFNy
        port: ifny
        label: IFNy
        group: drug_response
      - id: MHC1
        port: mhc1
        label: MHC1
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model_state
    schema:
      Tumor: float
      CancerStemCell: float
      CytotoxicTcell: float
      TGFb: float
      IFNy: float
      MHC1: float
      MHC2: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model_species_labels
    schema:
      Tumor: str
      CancerStemCell: str
      CytotoxicTcell: str
      TGFb: str
      IFNy: str
      MHC1: str
    description: Display labels for selected source states.
  outputs: []
