schema_version: '2.0'
title: Abernathy2016 - glioblastoma treatment
description: 'The paper describes a model of glioblastoma. Created by COPASI 4.25
  (Build 207) This model is described in the article: Modeling the Treatment of Glioblastoma
  Multiforme and Cancer Stem Cells with Ord.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Kristen Abernathy
- Jeremy Burke
upstream:
  id: biomodels_ebi:BIOMD0000000757
  source_db: biomodels_ebi
  source_id: BIOMD0000000757
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000757
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000757?filename=Abernathy2016.xml
  license: CC0
biosim:
  entrypoint: src.abernathy2016_glioblastoma_treatment_biomd0000000757_model:Abernathy2016GlioblastomaTreatmentBiomd0000000757Model
  init_kwargs:
    model_path: data/BIOMD0000000757.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000757.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: initial_tumor_burden
    maps_to: Tumor
    label: Tumor
    default: 70.0
    units: native SBML value
    description: Initial Tumor. Sets the initial value of bundled SBML symbol `Tumor`.
  - name: initial_cancer_stem_cells
    maps_to: CancerStemCell
    label: CancerStemCell
    default: 30.0
    units: native SBML value
    description: Initial CancerStemCell. Sets the initial value of bundled SBML symbol
      `CancerStemCell`.
  - name: initial_cytotoxic_t_cells
    maps_to: CytotoxicTcell
    label: CytotoxicTcell
    default: 250.0
    units: native SBML value
    description: Initial CytotoxicTcell. Sets the initial value of bundled SBML symbol
      `CytotoxicTcell`.
  - name: initial_tgf_beta
    maps_to: TGFb
    label: TGFb
    default: 50.0
    units: native SBML value
    description: Initial TGFb. Sets the initial value of bundled SBML symbol `TGFb`.
  - name: initial_ifn_gamma
    maps_to: IFNy
    label: IFNy
    default: 50.0
    units: native SBML value
    description: Initial IFNy. Sets the initial value of bundled SBML symbol `IFNy`.
  - name: initial_mhc_i
    maps_to: MHC1
    label: MHC1
    default: 50.0
    units: native SBML value
    description: Initial MHC1. Sets the initial value of bundled SBML symbol `MHC1`.
  outputs:
  - name: tumor_burden
    maps_to: Tumor
    label: Tumor
    description: Tumor observable. Maps to SBML symbol `Tumor`.
  - name: cancer_stem_cells
    maps_to: CancerStemCell
    label: CancerStemCell
    description: CancerStemCell observable. Maps to SBML symbol `CancerStemCell`.
  - name: cytotoxic_t_cells
    maps_to: CytotoxicTcell
    label: CytotoxicTcell
    description: CytotoxicTcell observable. Maps to SBML symbol `CytotoxicTcell`.
  - name: tgf_beta
    maps_to: TGFb
    label: TGFb
    description: TGFb observable. Maps to SBML symbol `TGFb`.
  - name: ifn_gamma
    maps_to: IFNy
    label: IFNy
    description: IFNy observable. Maps to SBML symbol `IFNy`.
  - name: mhc_i
    maps_to: MHC1
    label: MHC1
    description: MHC1 observable. Maps to SBML symbol `MHC1`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
