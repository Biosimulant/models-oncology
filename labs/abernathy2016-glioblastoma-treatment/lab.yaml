schema_version: '2.0'
package: abernathy2016-glioblastoma-treatment
version: 1.0.0
title: Abernathy2016 - glioblastoma treatment Lab
description: 'The paper describes a model of glioblastoma. Created by COPASI 4.25
  (Build 207) This model is described in the article: Modeling the Treatment of Glioblastoma
  Multiforme and Cancer Stem Cells with Ord.'
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_tumor_burden
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.initial_tumor_burden
    label: Tumor
    default: 70.0
    units: native SBML value
    description: Initial Tumor. Sets the initial value of bundled SBML symbol `Tumor`.
  - name: initial_cancer_stem_cells
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.initial_cancer_stem_cells
    label: CancerStemCell
    default: 30.0
    units: native SBML value
    description: Initial CancerStemCell. Sets the initial value of bundled SBML symbol
      `CancerStemCell`.
  - name: initial_cytotoxic_t_cells
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.initial_cytotoxic_t_cells
    label: CytotoxicTcell
    default: 250.0
    units: native SBML value
    description: Initial CytotoxicTcell. Sets the initial value of bundled SBML symbol
      `CytotoxicTcell`.
  - name: initial_tgf_beta
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.initial_tgf_beta
    label: TGFb
    default: 50.0
    units: native SBML value
    description: Initial TGFb. Sets the initial value of bundled SBML symbol `TGFb`.
  - name: initial_ifn_gamma
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.initial_ifn_gamma
    label: IFNy
    default: 50.0
    units: native SBML value
    description: Initial IFNy. Sets the initial value of bundled SBML symbol `IFNy`.
  - name: initial_mhc_i
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.initial_mhc_i
    label: MHC1
    default: 50.0
    units: native SBML value
    description: Initial MHC1. Sets the initial value of bundled SBML symbol `MHC1`.
  outputs:
  - name: tumor_burden
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.tumor_burden
    description: Tumor observable. Maps to SBML symbol `Tumor`.
  - name: cancer_stem_cells
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.cancer_stem_cells
    description: CancerStemCell observable. Maps to SBML symbol `CancerStemCell`.
  - name: cytotoxic_t_cells
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.cytotoxic_t_cells
    description: CytotoxicTcell observable. Maps to SBML symbol `CytotoxicTcell`.
  - name: tgf_beta
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.tgf_beta
    description: TGFb observable. Maps to SBML symbol `TGFb`.
  - name: ifn_gamma
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.ifn_gamma
    description: IFNy observable. Maps to SBML symbol `IFNy`.
  - name: mhc_i
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.mhc_i
    description: MHC1 observable. Maps to SBML symbol `MHC1`.
  - name: state
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.state
  to:
  - visualisation.oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model_state
- from: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.summary
  to:
  - visualisation.oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model_summary
- from: oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model.species_labels
  to:
  - visualisation.oncology_sbml_abernathy2016_glioblastoma_treatment_biomd0000000757_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
