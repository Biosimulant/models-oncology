schema_version: '2.0'
title: Zhu2015 - Combined gemcitabine and birinapant in pancreatic cancer cells -
  mechanistic PD model
description: Zhu2015 - combined gemcitabine and birinapantin pancreatic cancer cells
  - mechanistic PD model Mechanistic mathematical model toillustrate the effectiveness
  of combination chemotherapy involvinggemcit. It can be used to explore tumor-related
  dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Xu Zhu
- Robert M Straubinger
- William J Jusko
upstream:
  id: biomodels_ebi:BIOMD0000000669
  source_db: biomodels_ebi
  source_id: BIOMD0000000669
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000669
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000669?filename=BIOMD0000000669_url.xml
  license: CC0
biosim:
  entrypoint: src.zhu2015_combined_gemcitabine_and_birinapant_in_p_biomd0000000669_model:Zhu2015CombinedGemcitabineAndBirinapantInPBiomd0000000669Model
  init_kwargs:
    model_path: data/BIOMD0000000669.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000669.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: gemcitabine_concentration
    maps_to: C_g
    label: Gemcitabine Concentration
    default: 20.0
    units: native SBML value
    description: Gemcitabine Concentration. Overrides bundled SBML parameter `C_g`.
  - name: birinapant_concentration
    maps_to: C_b
    label: Birinapant Concentration
    default: 500.0
    units: native SBML value
    description: Birinapant Concentration. Overrides bundled SBML parameter `C_b`.
  - name: initial_g1_cells
    maps_to: G1
    label: G1 Cells
    default: 113516.0
    units: native SBML value
    description: Initial G1 Cells. Sets the initial value of bundled SBML symbol `G1`.
  - name: initial_g2_cells
    maps_to: G2
    label: G2 Cells
    default: 81656.0
    units: native SBML value
    description: Initial G2 Cells. Sets the initial value of bundled SBML symbol `G2`.
  outputs:
  - name: g1_cells
    maps_to: G1
    label: G1 Cells
    description: G1 Cells observable. Maps to SBML symbol `G1`.
  - name: s_phase_cells
    maps_to: S
    label: S-Phase Cells
    description: S-Phase Cells observable. Maps to SBML symbol `S`.
  - name: g2_cells
    maps_to: G2
    label: G2 Cells
    description: G2 Cells observable. Maps to SBML symbol `G2`.
  - name: apoptotic_response
    maps_to: R_apo
    label: Apoptotic Response
    description: Apoptotic Response observable. Maps to SBML symbol `R_apo`.
  - name: other_response
    maps_to: R_other
    label: Other Response
    description: Other Response observable. Maps to SBML symbol `R_other`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
