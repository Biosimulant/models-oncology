authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Zhu2015 - Combined gemcitabine and birinapant in pancreatic cancer cells - mechanistic PD model
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_zhu2015_combined_gemcitabine_and_birinapant_in_p_biomd0000000669_model
      title: Zhu2015 - Combined gemcitabine and birinapant in pancreatic cancer cells - mechanistic PD model
      state_observables:
      - G1
      - S
      - G2
      - R_apo
      - R_other
      observables:
      - id: G1
        port: g1
        label: G1
        group: drug_response
      - id: S
        port: model_state_2
        label: S
        group: drug_response
      - id: G2
        port: g2
        label: G2
        group: drug_response
      - id: R_apo
        port: r_apo
        label: R apo
        group: drug_response
      - id: R_other
        port: r_other
        label: R other
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_zhu2015_combined_gemcitabine_and_birinapant_in_p_biomd0000000669_model_state
    schema:
      G1: float
      S: float
      G2: float
      R_apo: float
      R_other: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_zhu2015_combined_gemcitabine_and_birinapant_in_p_biomd0000000669_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_zhu2015_combined_gemcitabine_and_birinapant_in_p_biomd0000000669_model_species_labels
    schema:
      G1: str
      S: str
      G2: str
      R_apo: str
      R_other: str
    description: Display labels for selected source states.
  outputs: []
