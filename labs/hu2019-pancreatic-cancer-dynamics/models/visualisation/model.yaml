schema_version: '2.0'
title: Hu2019 - Pancreatic cancer dynamics Visualisation
description: Oncology visualisation for Hu2019 - Pancreatic cancer dynamics.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Hu2019 - Pancreatic cancer dynamics
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_hu2019_pancreatic_cancer_dynamics_biomd0000000744_model
      title: Hu2019 - Pancreatic cancer dynamics
      state_observables:
      - x
      - y
      - z
      - w
      - v
      observables:
      - id: x
        port: model_state_1
        label: X
        group: drug_response
      - id: y
        port: model_state_2
        label: Y
        group: drug_response
      - id: z
        port: model_state_3
        label: Z
        group: drug_response
      - id: w
        port: model_state_4
        label: W
        group: drug_response
      - id: v
        port: model_state_5
        label: V
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_hu2019_pancreatic_cancer_dynamics_biomd0000000744_model_state
    schema:
      x: float
      y: float
      z: float
      w: float
      v: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_hu2019_pancreatic_cancer_dynamics_biomd0000000744_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_hu2019_pancreatic_cancer_dynamics_biomd0000000744_model_species_labels
    schema:
      x: str
      y: str
      z: str
      w: str
      v: str
    description: Display labels for selected source states.
  outputs: []
