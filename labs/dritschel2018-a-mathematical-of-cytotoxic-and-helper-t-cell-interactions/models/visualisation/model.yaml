schema_version: '2.0'
title: Dritschel2018 - A mathematical model of cytotoxic and helper T cell interactions in a tumour microenvironment Visualisation
description: Oncology visualisation for Dritschel2018 - A mathematical model of cytotoxic and helper T cell interactions in a tumour microenvironment.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Dritschel2018 - A mathematical model of cytotoxic and helper T cell interactions in a tumour microenvironment
    question: Does the baseline tumour-immune model favour immune control or tumour escape?
    answer_focus: Compares immune, tumour, and treatment-linked source observables.
    visual_scope: Tumour-immune interaction and immunotherapy response
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_dritschel2018_a_mathematical_model_of_cytotoxic_biomd0000000763_model
      title: Dritschel2018 - A mathematical model of cytotoxic and helper T cell interactions in a tumour microenvironment
      state_observables:
      - N_Tumour
      - T_H
      - T_C
      observables:
      - id: N_Tumour
        port: n_tumour
        label: N Tumour
        group: tumor_immune
      - id: T_H
        port: model_state_2
        label: T H
        group: tumor_immune
      - id: T_C
        port: model_state_3
        label: T C
        group: tumor_immune
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_dritschel2018_a_mathematical_model_of_cytotoxic_biomd0000000763_model_state
    schema:
      N_Tumour: float
      T_H: float
      T_C: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_dritschel2018_a_mathematical_model_of_cytotoxic_biomd0000000763_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_dritschel2018_a_mathematical_model_of_cytotoxic_biomd0000000763_model_species_labels
    schema:
      N_Tumour: str
      T_H: str
      T_C: str
    description: Display labels for selected source states.
  outputs: []
