schema_version: '2.0'
title: Gevertz2018 - Cancer Treatment with Oncolytic Viruses and Dendritic Cell injections
  original model
description: The model is based on 'Developing a Minimally Structured Mathematical
  Model of Cancer Treatment with Oncolytic Viruses and Dendritic Cell Injections',
  PMID:30510594. It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
authors:
- Biosimulant Team
- Jana L Gevertz
- Joanna R Wares
upstream:
  id: biomodels_ebi:BIOMD0000000816
  source_db: biomodels_ebi
  source_id: BIOMD0000000816
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000816
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000816?filename=model.xml
  license: CC0
biosim:
  entrypoint: src.gevertz2018_cancer_treatment_with_oncolytic_viru_biomd0000000816_model:Gevertz2018CancerTreatmentWithOncolyticViruBiomd0000000816Model
  init_kwargs:
    model_path: data/BIOMD0000000816.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000816.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: c_kill_source_parameter
    maps_to: c_kill
    label: C kill source parameter
    default: 0.595397
    units: native SBML value
    description: C kill source parameter. Maps to bundled SBML parameter `c_kill`.
  - name: ov_dose_source_parameter
    maps_to: OV_dose
    label: OV dose source parameter
    default: 2.5
    units: native SBML value
    description: OV dose source parameter. Maps to bundled SBML parameter `OV_dose`.
  - name: initial_uninfected_tumor_cell_u
    maps_to: Uninfected_Tumor_Cell_U
    label: Uninfected Tumor Cell U
    default: 58.020755
    units: native SBML value
    description: Initial Uninfected Tumor Cell U. Sets the initial value of bundled
      SBML symbol `Uninfected_Tumor_Cell_U`.
  - name: initial_tumor_targeting_t_cells_t
    maps_to: Tumor_targeting_T_cells_T
    label: Tumor targeting T cells T
    default: 0.0
    units: native SBML value
    description: Initial Tumor targeting T cells T. Sets the initial value of bundled
      SBML symbol `Tumor_targeting_T_cells_T`.
  - name: initial_infected_cancer_cell_i
    maps_to: Infected_Cancer_Cell_I
    label: Infected Cancer Cell I
    default: 0.0
    units: native SBML value
    description: Initial Infected Cancer Cell I. Sets the initial value of bundled
      SBML symbol `Infected_Cancer_Cell_I`.
  - name: initial_naive_t_cells_a
    maps_to: Naive_T_cells_A
    label: Naive T cells A
    default: 0.0
    units: native SBML value
    description: Initial Naive T cells A. Sets the initial value of bundled SBML symbol
      `Naive_T_cells_A`.
  outputs:
  - name: uninfected_tumor_cell_u
    maps_to: Uninfected_Tumor_Cell_U
    label: Uninfected Tumor Cell U
    description: Uninfected Tumor Cell U observable. Maps to SBML symbol `Uninfected_Tumor_Cell_U`.
  - name: tumor_targeting_t_cells_t
    maps_to: Tumor_targeting_T_cells_T
    label: Tumor targeting T cells T
    description: Tumor targeting T cells T observable. Maps to SBML symbol `Tumor_targeting_T_cells_T`.
  - name: infected_cancer_cell_i
    maps_to: Infected_Cancer_Cell_I
    label: Infected Cancer Cell I
    description: Infected Cancer Cell I observable. Maps to SBML symbol `Infected_Cancer_Cell_I`.
  - name: naive_t_cells_a
    maps_to: Naive_T_cells_A
    label: Naive T cells A
    description: Naive T cells A observable. Maps to SBML symbol `Naive_T_cells_A`.
  - name: dendritic_cells_d
    maps_to: Dendritic_Cells_D
    label: Dendritic Cells D
    description: Dendritic Cells D observable. Maps to SBML symbol `Dendritic_Cells_D`.
  - name: oncolytic_adenovirus_v
    maps_to: Oncolytic_Adenovirus_V
    label: Oncolytic Adenovirus V
    description: Oncolytic Adenovirus V observable. Maps to SBML symbol `Oncolytic_Adenovirus_V`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
