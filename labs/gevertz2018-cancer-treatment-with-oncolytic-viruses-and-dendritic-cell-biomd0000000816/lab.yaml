- from: oncology_sbml_gevertz2018_cancer_treatment_with_oncolytic_viru_biomd0000000816_model.summary
  to:
  - visualisation.oncology_sbml_gevertz2018_cancer_treatment_with_oncolytic_viru_biomd0000000816_model_summary
- from: oncology_sbml_gevertz2018_cancer_treatment_with_oncolytic_viru_biomd0000000816_model.species_labels
  to:
  - visualisation.oncology_sbml_gevertz2018_cancer_treatment_with_oncolytic_viru_biomd0000000816_model_species_labels
runtime:
