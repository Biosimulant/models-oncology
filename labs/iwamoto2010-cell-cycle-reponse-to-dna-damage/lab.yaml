schema_version: '2.0'
package: iwamoto2010-cell-cycle-reponse-to-dna-damage
version: 1.0.0
title: Iwamoto2010 - Cell cycle reponse to DNA damage Lab
description: After DNA damage, cells activate p53, a tumor suppressor gene, and select
  a cell fate (e.g., DNA repair, cell cycle arrest, or apoptosis). Recently, a p53
  oscillatory behavior was observed following D.
tags:
- biomodels_ebi
- cellcycle
- curated
- dna-damage
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: dna_damage_signal_source_parameter
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.dna_damage_signal_source_parameter
    label: DNA damage signal source parameter
    default: 0.0
    units: native SBML value
    description: DNA damage signal source parameter. Maps to bundled SBML parameter
      `DNA_damage_signal`.
  - name: initial_p27_cyclin_d_cdk4
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.initial_p27_cyclin_d_cdk4
    label: P27/CyclinD/Cdk4
    default: 0.001
    units: native SBML value
    description: Initial P27/CyclinD/Cdk4. Sets the initial value of bundled SBML
      symbol `p27_CyclinD_Cdk4`.
  - name: initial_p27_cyclin_e_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.initial_p27_cyclin_e_cdk2
    label: P27/CyclinE/Cdk2
    default: 1.0
    units: native SBML value
    description: Initial P27/CyclinE/Cdk2. Sets the initial value of bundled SBML
      symbol `p27_CyclinE_Cdk2`.
  - name: initial_p27_cyclin_a_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.initial_p27_cyclin_a_cdk2
    label: P27/CyclinA/Cdk2
    default: 0.0001
    units: native SBML value
    description: Initial P27/CyclinA/Cdk2. Sets the initial value of bundled SBML
      symbol `p27_CyclinA_Cdk2`.
  - name: initial_p21_cyclin_d_cdk4
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.initial_p21_cyclin_d_cdk4
    label: P21/CyclinD/Cdk4
    default: 0.0
    units: native SBML value
    description: Initial P21/CyclinD/Cdk4. Sets the initial value of bundled SBML
      symbol `p21_CyclinD_Cdk4`.
  - name: initial_p21_cyclin_e_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.initial_p21_cyclin_e_cdk2
    label: P21/CyclinE/Cdk2
    default: 0.0
    units: native SBML value
    description: Initial P21/CyclinE/Cdk2. Sets the initial value of bundled SBML
      symbol `p21_CyclinE_Cdk2`.
  outputs:
  - name: p27_cyclin_d_cdk4
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.p27_cyclin_d_cdk4
    description: P27/CyclinD/Cdk4 observable. Maps to SBML symbol `p27_CyclinD_Cdk4`.
  - name: p27_cyclin_e_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.p27_cyclin_e_cdk2
    description: P27/CyclinE/Cdk2 observable. Maps to SBML symbol `p27_CyclinE_Cdk2`.
  - name: p27_cyclin_a_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.p27_cyclin_a_cdk2
    description: P27/CyclinA/Cdk2 observable. Maps to SBML symbol `p27_CyclinA_Cdk2`.
  - name: p21_cyclin_d_cdk4
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.p21_cyclin_d_cdk4
    description: P21/CyclinD/Cdk4 observable. Maps to SBML symbol `p21_CyclinD_Cdk4`.
  - name: p21_cyclin_e_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.p21_cyclin_e_cdk2
    description: P21/CyclinE/Cdk2 observable. Maps to SBML symbol `p21_CyclinE_Cdk2`.
  - name: p21_cyclin_a_cdk2
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.p21_cyclin_a_cdk2
    description: P21/CyclinA/Cdk2 observable. Maps to SBML symbol `p21_CyclinA_Cdk2`.
  - name: state
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.state
  to:
  - visualisation.oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model_state
- from: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.summary
  to:
  - visualisation.oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model_summary
- from: oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model.species_labels
  to:
  - visualisation.oncology_sbml_iwamoto2010_cell_cycle_reponse_to_dna_damage_biomd0000000939_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
