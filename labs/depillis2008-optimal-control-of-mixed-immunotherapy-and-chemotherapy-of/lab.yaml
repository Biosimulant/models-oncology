schema_version: '2.0'
title: dePillis2008 - Optimal control of mixed immunotherapy and chemotherapy of tumors
  Lab
description: '&amp;lt;notes xmlns=&amp;quot;http://www.sbml.org/sbml/level2/version4&amp;quot;&amp;gt;
  &amp;lt;body xmlns=&amp;quot;http://www.w3.org/1999/xhtml&amp;quot;&amp;gt; &amp;lt;pre&amp;gt;Optimal
  control. It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.'
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.initial_tumor_cells
    label: Tumor Cells
    default: 10000000.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: chemotherapy_drug_level
    maps_to: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.chemotherapy_drug_level
    label: Chemotherapy Drug Level
    default: 6.6666657777779e-07
    units: native SBML value
    description: Chemotherapy Drug Level. Overrides bundled SBML parameter `D`.
  outputs:
  - name: tumor_cells
    maps_to: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.tumor_cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    maps_to: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.state
  to:
  - visualisation.oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model_state
- from: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.summary
  to:
  - visualisation.oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model_summary
- from: oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model.species_labels
  to:
  - visualisation.oncology_sbml_depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
