schema_version: '2.0'
title: dePillis2008 - Optimal control of mixed immunotherapy and chemotherapy of tumors
description: '&amp;lt;notes xmlns=&amp;quot;http://www.sbml.org/sbml/level2/version4&amp;quot;&amp;gt;
  &amp;lt;body xmlns=&amp;quot;http://www.w3.org/1999/xhtml&amp;quot;&amp;gt; &amp;lt;pre&amp;gt;Optimal
  control. It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.'
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Lisette Depillis, K. R. Fister , W. Gu, Tiffany Head, Kenny Maples, Todd Neal, Anand
  Murugan and Kenji Kozai
upstream:
  id: biomodels_ebi:BIOMD0000000913
  source_db: biomodels_ebi
  source_id: BIOMD0000000913
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000913
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000913?filename=dePillis2008.xml
  license: CC0
biosim:
  entrypoint: src.depillis2008_optimal_control_of_mixed_immunother_biomd0000000913_model:Depillis2008OptimalControlOfMixedImmunotherBiomd0000000913Model
  init_kwargs:
    model_path: data/BIOMD0000000913.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000913.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: T
    label: Tumor Cells
    default: 10000000.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: chemotherapy_drug_level
    maps_to: D
    label: Chemotherapy Drug Level
    default: 6.6666657777779e-07
    units: native SBML value
    description: Chemotherapy Drug Level. Overrides bundled SBML parameter `D`.
  outputs:
  - name: tumor_cells
    maps_to: T
    label: Tumor Cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
