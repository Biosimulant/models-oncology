schema_version: '2.0'
title: Jenner2018 - treatment of oncolytic virus
description: 'The paper describes a model of oncolytic virotherapy. Created by COPASI
  4.26 (Build 213) This model is described in the article: Mathematical Modelling
  of the Interaction Between Cancer Cells and an O.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
authors:
- Biosimulant Team
- Adrianne L Jenner
- Chae-Ok Yun
- Peter S Kim
- Adelle C F Coster
upstream:
  id: biomodels_ebi:BIOMD0000000789
  source_db: biomodels_ebi
  source_id: BIOMD0000000789
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000789
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000789?filename=Jenner2018.xml
  license: CC0
biosim:
  entrypoint: src.jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model:Jenner2018TreatmentOfOncolyticVirusBiomd0000000789Model
  init_kwargs:
    model_path: data/BIOMD0000000789.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000789.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_virus_load
    maps_to: V
    label: Virus Load
    default: 0.0
    units: native SBML value
    description: Initial Virus Load. Sets the initial value of bundled SBML symbol
      `V`.
  - name: initial_susceptible_tumor_cells
    maps_to: S
    label: Susceptible Tumor Cells
    default: 251000000.0
    units: native SBML value
    description: Initial Susceptible Tumor Cells. Sets the initial value of bundled
      SBML symbol `S`.
  - name: initial_infected_tumor_cells
    maps_to: I
    label: Infected Tumor Cells
    default: 0.0
    units: native SBML value
    description: Initial Infected Tumor Cells. Sets the initial value of bundled SBML
      symbol `I`.
  outputs:
  - name: virus_load
    maps_to: V
    label: Virus Load
    description: Virus Load observable. Maps to SBML symbol `V`.
  - name: susceptible_tumor_cells
    maps_to: S
    label: Susceptible Tumor Cells
    description: Susceptible Tumor Cells observable. Maps to SBML symbol `S`.
  - name: infected_tumor_cells
    maps_to: I
    label: Infected Tumor Cells
    description: Infected Tumor Cells observable. Maps to SBML symbol `I`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
