schema_version: '2.0'
package: jenner2018-treatment-of-oncolytic-virus
version: 1.0.0
title: Jenner2018 - treatment of oncolytic virus Lab
description: 'The paper describes a model of oncolytic virotherapy. Created by COPASI
  4.26 (Build 213) This model is described in the article: Mathematical Modelling
  of the Interaction Between Cancer Cells and an O.'
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
io:
  inputs:
  - name: initial_virus_load
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.initial_virus_load
    label: Virus Load
    default: 0.0
    units: native SBML value
    description: Initial Virus Load. Sets the initial value of bundled SBML symbol
      `V`.
  - name: initial_susceptible_tumor_cells
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.initial_susceptible_tumor_cells
    label: Susceptible Tumor Cells
    default: 251000000.0
    units: native SBML value
    description: Initial Susceptible Tumor Cells. Sets the initial value of bundled
      SBML symbol `S`.
  - name: initial_infected_tumor_cells
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.initial_infected_tumor_cells
    label: Infected Tumor Cells
    default: 0.0
    units: native SBML value
    description: Initial Infected Tumor Cells. Sets the initial value of bundled SBML
      symbol `I`.
  outputs:
  - name: virus_load
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.virus_load
    description: Virus Load observable. Maps to SBML symbol `V`.
  - name: susceptible_tumor_cells
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.susceptible_tumor_cells
    description: Susceptible Tumor Cells observable. Maps to SBML symbol `S`.
  - name: infected_tumor_cells
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.infected_tumor_cells
    description: Infected Tumor Cells observable. Maps to SBML symbol `I`.
  - name: state
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.state
  to:
  - visualisation.oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model_state
- from: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.summary
  to:
  - visualisation.oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model_summary
- from: oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model.species_labels
  to:
  - visualisation.oncology_sbml_jenner2018_treatment_of_oncolytic_virus_biomd0000000789_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
