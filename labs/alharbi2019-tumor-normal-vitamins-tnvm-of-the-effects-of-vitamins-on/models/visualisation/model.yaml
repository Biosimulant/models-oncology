biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Alharbi2019 - Tumor-normal-vitamins model (TNVM) of the effects of vitamins on delaying the growth of tumor cells
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_alharbi2019_tumor_normal_vitamins_model_tnvm_of_biomd0000001038_model
      title: Alharbi2019 - Tumor-normal-vitamins model (TNVM) of the effects of vitamins on delaying the growth of tumor cells
      state_observables:
      - Normal_cells
      - Tumor_cells
      - Vitamins
      observables:
      - id: Tumor_cells
        port: tumor_cells
        label: Tumor cells
        group: drug_response
      - id: Normal_cells
        port: normal_cells
        label: Normal cells
        group: drug_response
      - id: Vitamins
        port: vitamins
        label: Vitamins
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_alharbi2019_tumor_normal_vitamins_model_tnvm_of_biomd0000001038_model_state
    schema:
      Normal_cells: float
      Tumor_cells: float
      Vitamins: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_alharbi2019_tumor_normal_vitamins_model_tnvm_of_biomd0000001038_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_alharbi2019_tumor_normal_vitamins_model_tnvm_of_biomd0000001038_model_species_labels
    schema:
      Tumor_cells: str
      Normal_cells: str
      Vitamins: str
    description: Display labels for selected source states.
  outputs: []
