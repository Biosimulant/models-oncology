schema_version: '2.0'
title: Chaudhury2020 - Lotka-Volterra mathematical model of CAR-T cell and tumour kinetics
description: This ordinary differential equation model of the cellular kinetics and pharmacodynamics of CAR-T cell therapy is described in the publication:Chaudhury, A., Zhu, X., Chu, L., Goliaei, A., June, C., Ke. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- car-t
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Anwesha Chaudhury
- Xu Zhu
- Lulu Chu
- Ardeshir Goliaei
- Carl H June
upstream:
  id: biomodels_ebi:BIOMD0000001024
  source_db: biomodels_ebi
  source_id: BIOMD0000001024
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001024
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001024?filename=Chaudhury2020 Eq 4-5.xml
  license: CC0
biosim:
  entrypoint: src.chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model:Chaudhury2020LotkaVolterraMathematicalModelBiomd0000001024Model
  init_kwargs:
    model_path: data/BIOMD0000001024.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000001024.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: Tumor_cells
    label: Tumor cells
    default: 900.0
    units: native SBML value
    description: Initial Tumor cells. Sets the initial value of bundled SBML symbol `Tumor_cells`.
  - name: initial_expanding_car_t_cells
    maps_to: Expanding_CAR_T_cells
    label: Expanding CAR T cells
    default: 10.0
    units: native SBML value
    description: Initial Expanding CAR T cells. Sets the initial value of bundled SBML symbol `Expanding_CAR_T_cells`.
  outputs:
  - name: tumor_cells
    maps_to: Tumor_cells
    label: Tumor cells
    description: Tumor cells observable. Maps to SBML symbol `Tumor_cells`.
  - name: expanding_car_t_cells
    maps_to: Expanding_CAR_T_cells
    label: Expanding CAR T cells
    description: Expanding CAR T cells observable. Maps to SBML symbol `Expanding_CAR_T_cells`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
