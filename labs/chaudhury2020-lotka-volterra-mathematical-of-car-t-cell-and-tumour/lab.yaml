schema_version: '2.0'
title: Chaudhury2020 - Lotka-Volterra mathematical model of CAR-T cell and tumour kinetics Lab
description: This ordinary differential equation model of the cellular kinetics and pharmacodynamics of CAR-T cell therapy is described in the publication:Chaudhury, A., Zhu, X., Chu, L., Goliaei, A., June, C., Ke. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- car-t
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.initial_tumor_cells
    label: Tumor cells
    default: 900.0
    units: native SBML value
    description: Initial Tumor cells. Sets the initial value of bundled SBML symbol `Tumor_cells`.
  - name: initial_expanding_car_t_cells
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.initial_expanding_car_t_cells
    label: Expanding CAR T cells
    default: 10.0
    units: native SBML value
    description: Initial Expanding CAR T cells. Sets the initial value of bundled SBML symbol `Expanding_CAR_T_cells`.
  outputs:
  - name: tumor_cells
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.tumor_cells
    description: Tumor cells observable. Maps to SBML symbol `Tumor_cells`.
  - name: expanding_car_t_cells
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.expanding_car_t_cells
    description: Expanding CAR T cells observable. Maps to SBML symbol `Expanding_CAR_T_cells`.
  - name: state
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.state
  to:
  - visualisation.oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model_state
- from: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.summary
  to:
  - visualisation.oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model_summary
- from: oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model.species_labels
  to:
  - visualisation.oncology_sbml_chaudhury2020_lotka_volterra_mathematical_model_biomd0000001024_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
