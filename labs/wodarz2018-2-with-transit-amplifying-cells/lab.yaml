- from: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.summary
  to:
  - visualisation.oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model_summary
- from: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.species_labels
  to:
  - visualisation.oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model_species_labels
