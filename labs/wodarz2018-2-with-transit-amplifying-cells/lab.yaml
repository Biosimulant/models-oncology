schema_version: '2.0'
package: wodarz2018-2-with-transit-amplifying-cells
version: 1.0.0
title: Wodarz2018/2 - model with transit amplifying cells Lab
description: The paper describes a model of effect of cellular de-differentiation
  on the dynamics and evolution of tissue and tumor cells. Created by COPASI 4.25
  (Build 207) This model is described in the article:.
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_stem_like_cells
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.initial_stem_like_cells
    label: Stem-Like Cells
    default: 1.0
    units: native SBML value
    description: Initial Stem-Like Cells. Sets the initial value of bundled SBML symbol
      `S`.
  - name: initial_transit_amplifying_cells
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.initial_transit_amplifying_cells
    label: Transit-Amplifying Cells
    default: 0.0
    units: native SBML value
    description: Initial Transit-Amplifying Cells. Sets the initial value of bundled
      SBML symbol `T`.
  - name: initial_differentiated_cells
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.initial_differentiated_cells
    label: Differentiated Cells
    default: 0.0
    units: native SBML value
    description: Initial Differentiated Cells. Sets the initial value of bundled SBML
      symbol `D`.
  outputs:
  - name: stem_like_cells
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.stem_like_cells
    description: Stem-Like Cells observable. Maps to SBML symbol `S`.
  - name: transit_amplifying_cells
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.transit_amplifying_cells
    description: Transit-Amplifying Cells observable. Maps to SBML symbol `T`.
  - name: differentiated_cells
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.differentiated_cells
    description: Differentiated Cells observable. Maps to SBML symbol `D`.
  - name: state
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model
  path: models/core
- alias: visualisation
