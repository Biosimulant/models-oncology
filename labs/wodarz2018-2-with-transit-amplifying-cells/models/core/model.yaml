schema_version: '2.0'
title: Wodarz2018/2 - model with transit amplifying cells
description: The paper describes a model of effect of cellular de-differentiation
  on the dynamics and evolution of tissue and tumor cells. Created by COPASI 4.25
  (Build 207) This model is described in the article:.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Dominik Wodarz
upstream:
  id: biomodels_ebi:BIOMD0000000773
  source_db: biomodels_ebi
  source_id: BIOMD0000000773
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000773
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000773?filename=Wodarz2018_2.xml
  license: CC0
biosim:
  entrypoint: src.wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model:Wodarz20182ModelWithTransitAmplifyingCellsBiomd0000000773Model
  init_kwargs:
    model_path: data/BIOMD0000000773.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000773.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_stem_like_cells
    maps_to: S
    label: Stem-Like Cells
    default: 1.0
    units: native SBML value
    description: Initial Stem-Like Cells. Sets the initial value of bundled SBML symbol
      `S`.
  - name: initial_transit_amplifying_cells
    maps_to: T
    label: Transit-Amplifying Cells
    default: 0.0
    units: native SBML value
    description: Initial Transit-Amplifying Cells. Sets the initial value of bundled
      SBML symbol `T`.
  - name: initial_differentiated_cells
    maps_to: D
    label: Differentiated Cells
    default: 0.0
    units: native SBML value
    description: Initial Differentiated Cells. Sets the initial value of bundled SBML
      symbol `D`.
  outputs:
  - name: stem_like_cells
    maps_to: S
    label: Stem-Like Cells
    description: Stem-Like Cells observable. Maps to SBML symbol `S`.
  - name: transit_amplifying_cells
    maps_to: T
    label: Transit-Amplifying Cells
    description: Transit-Amplifying Cells observable. Maps to SBML symbol `T`.
  - name: differentiated_cells
    maps_to: D
    label: Differentiated Cells
    description: Differentiated Cells observable. Maps to SBML symbol `D`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
