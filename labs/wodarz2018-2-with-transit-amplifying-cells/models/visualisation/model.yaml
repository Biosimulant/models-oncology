schema_version: '2.0'
title: Wodarz2018/2 - model with transit amplifying cells Visualisation
description: Oncology visualisation for Wodarz2018/2 - model with transit amplifying
  cells.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Wodarz2018/2 - model with transit amplifying cells
    question: What oncology-relevant state dominates the bundled SBML simulation over
      the baseline run?
    answer_focus: Compares the largest-changing and peak observables with selected
      source states.
    visual_scope: Tumor-system state trajectories and dominant observable changes
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model
      title: Wodarz2018/2 - model with transit amplifying cells
      state_observables:
      - S
      - T
      - D
      observables:
      - id: S
        port: stem_like_cells
        label: Stem-Like Cells
        group: tumor_system
      - id: T
        port: transit_amplifying_cells
        label: Transit-Amplifying Cells
        group: tumor_system
      - id: D
        port: differentiated_cells
        label: Differentiated Cells
        group: tumor_system
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model_state
    schema:
      S: float
      T: float
      D: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_wodarz2018_2_model_with_transit_amplifying_cells_biomd0000000773_model_species_labels
    schema:
      S: str
      T: str
      D: str
    description: Display labels for selected source states.
  outputs: []
