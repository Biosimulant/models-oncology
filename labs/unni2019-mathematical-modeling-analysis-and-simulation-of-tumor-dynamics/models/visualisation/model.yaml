schema_version: '2.0'
title: Unni2019 - Mathematical Modeling, Analysis, and Simulation of Tumor Dynamics
  with Drug Interventions Visualisation
description: Oncology visualisation for Unni2019 - Mathematical Modeling, Analysis,
  and Simulation of Tumor Dynamics with Drug Interventions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Unni2019 - Mathematical Modeling, Analysis, and Simulation of Tumor
      Dynamics with Drug Interventions
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_unni2019_mathematical_modeling_analysis_and_simu_biomd0000000888_model
      title: Unni2019 - Mathematical Modeling, Analysis, and Simulation of Tumor Dynamics
        with Drug Interventions
      state_observables:
      - T
      - N
      - D
      - L
      observables:
      - id: T
        port: tumor_cells
        label: Tumor Cells
        group: drug_response
      - id: N
        label: N
        group: drug_response
      - id: D
        port: drug_level
        label: Drug Level
        group: drug_response
      - id: L
        label: L
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_unni2019_mathematical_modeling_analysis_and_simu_biomd0000000888_model_state
    schema:
      T: float
      N: float
      D: float
      L: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_unni2019_mathematical_modeling_analysis_and_simu_biomd0000000888_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_unni2019_mathematical_modeling_analysis_and_simu_biomd0000000888_model_species_labels
    schema:
      T: str
      N: str
      D: str
      L: str
    description: Display labels for selected source states.
  outputs: []
