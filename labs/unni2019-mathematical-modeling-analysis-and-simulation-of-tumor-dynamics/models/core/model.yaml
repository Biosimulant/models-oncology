schema_version: '2.0'
title: Unni2019 - Mathematical Modeling, Analysis, and Simulation of Tumor Dynamics
  with Drug Interventions
description: Mathematical Modeling, Analysis, and Simulation of Tumor Dynamics with
  Drug InterventionsPranav Unni 1 and Padmanabhan SeshaiyerAbstractOver the last few
  decades, there have been significant developme. It can be used to explore tumor-related
  dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Pranav Unni
- Padmanabhan Seshaiyer
upstream:
  id: biomodels_ebi:BIOMD0000000888
  source_db: biomodels_ebi
  source_id: BIOMD0000000888
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000888
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000888?filename=unni2019.xml
  license: CC0
biosim:
  entrypoint: src.unni2019_mathematical_modeling_analysis_and_simu_biomd0000000888_model:Unni2019MathematicalModelingAnalysisAndSimuBiomd0000000888Model
  init_kwargs:
    model_path: data/BIOMD0000000888.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000888.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: T
    label: Tumor Cells
    default: 100.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: initial_drug_level
    maps_to: D
    label: Drug Level
    default: 1.0
    units: native SBML value
    description: Initial Drug Level. Sets the initial value of bundled SBML symbol
      `D`.
  outputs:
  - name: tumor_cells
    maps_to: T
    label: Tumor Cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: drug_level
    maps_to: D
    label: Drug Level
    description: Drug Level observable. Maps to SBML symbol `D`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
