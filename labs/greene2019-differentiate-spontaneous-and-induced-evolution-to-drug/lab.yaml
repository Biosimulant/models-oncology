schema_version: '2.0'
package: greene2019-differentiate-spontaneous-and-induced-evolut-b3e467da
version: 1.0.0
title: Greene2019 - Differentiate Spontaneous and Induced Evolution to Drug Resistance
  During Cancer Treatment Lab
description: This model is built by COPASI 4.24(Build 197), based on paper:Mathematical
  Approach to Differentiate Spontaneous and Induced Evolution to Drug Resistance During
  Cancer Treatment.Author:James M. It can be used to explore tumor-related dynamics
  and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: epsilon_source_parameter
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.epsilon_source_parameter
    label: Epsilon source parameter
    default: 1.0e-06
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  - name: initial_sensitive_tumor_s
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.initial_sensitive_tumor_s
    label: Sensitive tumor S
    default: 0.01
    units: native SBML value
    description: Initial Sensitive tumor S. Sets the initial value of bundled SBML
      symbol `Sensitive_tumor_S`.
  - name: initial_resistant_tumor_r
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.initial_resistant_tumor_r
    label: Resistant tumor R
    default: 0.0
    units: native SBML value
    description: Initial Resistant tumor R. Sets the initial value of bundled SBML
      symbol `Resistant_tumor_R`.
  outputs:
  - name: sensitive_tumor_s
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.sensitive_tumor_s
    description: Sensitive tumor S observable. Maps to SBML symbol `Sensitive_tumor_S`.
  - name: resistant_tumor_r
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.resistant_tumor_r
    description: Resistant tumor R observable. Maps to SBML symbol `Resistant_tumor_R`.
  - name: state
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.state
  to:
  - visualisation.oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model_state
- from: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.summary
  to:
  - visualisation.oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model_summary
- from: oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model.species_labels
  to:
  - visualisation.oncology_sbml_greene2019_differentiate_spontaneous_and_induced_biomd0000000825_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
