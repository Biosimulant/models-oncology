schema_version: '2.0'
title: Hutchinson2016 - Vascular phenotype identification and anti-angiogenic treatment recommendation Lab
description: This is a spatially averaged multiscale mathematical model of tumor angiogenesis. The model describes the dynamics of VEGF, Ang1, Ang2, and PDGF, coupled with those of mature and immature endothelial.
tags:
- angiogenesis
- biomodels_ebi
- curated
- drug-response
- faithful
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: epsilon_level
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.epsilon_level
    label: Epsilon source parameter
    default: 0.04
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  outputs:
  - name: model_state_1
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.model_state_1
    description: V observable. Maps to SBML symbol `v`.
  - name: model_state_2
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.model_state_2
    description: Rv observable. Maps to SBML symbol `rv`.
  - name: model_state_3
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.model_state_3
    description: Bv observable. Maps to SBML symbol `bv`.
  - name: model_state_4
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.model_state_4
    description: A1 observable. Maps to SBML symbol `a1`.
  - name: model_state_5
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.model_state_5
    description: Aw observable. Maps to SBML symbol `aw`.
  - name: model_state_6
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.model_state_6
    description: A2 observable. Maps to SBML symbol `a2`.
  - name: state
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.state
  to:
  - visualisation.oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model_state
- from: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.summary
  to:
  - visualisation.oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model_summary
- from: oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model.species_labels
  to:
  - visualisation.oncology_sbml_hutchinson2016_vascular_phenotype_identification_model1911130007_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
