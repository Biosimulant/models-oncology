schema_version: '2.0'
title: Shin_2018_EGFR-PYK2-c-Met interaction network_model Lab
description: Systems modelling of the EGFR-PYK2-c-Met interaction network predicted
  and prioritized synergistic drug combinations for Triple-negative breast cancer.
  It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
io:
