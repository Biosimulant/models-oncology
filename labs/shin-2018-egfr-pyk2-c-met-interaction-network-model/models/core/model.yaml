schema_version: '2.0'
title: Shin_2018_EGFR-PYK2-c-Met interaction network_model
description: Systems modelling of the EGFR-PYK2-c-Met interaction network predicted and prioritized synergistic drug combinations for Triple-negative breast cancer. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Sung-Young Shin
- "Anna-Katharina M\xFCller"
- Nandini Verma
- Sima Lev
- Lan K Nguyen
upstream:
  id: biomodels_ebi:BIOMD0000000826
  source_db: biomodels_ebi
  source_id: BIOMD0000000826
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000826
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000826?filename=Shin2018.xml
  license: CC0
biosim:
  entrypoint: src.shin_2018_egfr_pyk2_c_met_interaction_network_mo_biomd0000000826_model:Shin2018EgfrPyk2CMetInteractionNetworkMoBiomd0000000826Model
  init_kwargs:
    model_path: data/BIOMD0000000826.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000826.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: egfrtot_level
    maps_to: EGFRtot
    label: EGFRtot source parameter
    default: 398.107
    units: native SBML value
    description: EGFRtot source parameter. Maps to bundled SBML parameter `EGFRtot`.
  - name: caegf_level
    maps_to: caEGF
    label: CaEGF source parameter
    default: 0.0891251
    units: native SBML value
    description: CaEGF source parameter. Maps to bundled SBML parameter `caEGF`.
  - name: egf_level
    maps_to: EGF
    label: EGF source parameter
    default: 10.0
    units: native SBML value
    description: EGF source parameter. Maps to bundled SBML parameter `EGF`.
  - name: initial_pegfr
    maps_to: pEGFR
    label: PEGFR
    default: 0.109014
    units: native SBML value
    description: Initial PEGFR. Sets the initial value of bundled SBML symbol `pEGFR`.
  - name: initial_egfrub
    maps_to: EGFRub
    label: EGFRub
    default: 6.93991
    units: native SBML value
    description: Initial EGFRub. Sets the initial value of bundled SBML symbol `EGFRub`.
  - name: initial_perk
    maps_to: pERK
    label: PERK
    default: 0.669043
    units: native SBML value
    description: Initial PERK. Sets the initial value of bundled SBML symbol `pERK`.
  outputs:
  - name: pegfr
    maps_to: pEGFR
    label: PEGFR
    description: PEGFR observable. Maps to SBML symbol `pEGFR`.
  - name: egfrub
    maps_to: EGFRub
    label: EGFRub
    description: EGFRub observable. Maps to SBML symbol `EGFRub`.
  - name: perk
    maps_to: pERK
    label: PERK
    description: PERK observable. Maps to SBML symbol `pERK`.
  - name: pstat3
    maps_to: pSTAT3
    label: PSTAT3
    description: PSTAT3 observable. Maps to SBML symbol `pSTAT3`.
  - name: stat3ustattic
    maps_to: STAT3uStattic
    label: STAT3uStattic
    description: STAT3uStattic observable. Maps to SBML symbol `STAT3uStattic`.
  - name: pyk2
    maps_to: PYK2
    label: PYK2
    description: PYK2 observable. Maps to SBML symbol `PYK2`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
