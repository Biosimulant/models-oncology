schema_version: '2.0'
title: Andersen2017 - Mathematical modelling as a proof of concept for MPNs as a human
  inflammation model for cancer development
description: This is a mathematical model investigating the role of chronic inflammation
  in the development and progression of myeloproliferative neoplasms (MPNs). The model
  describes the proliferation from stem c.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Morten Andersen
- Zamra Sajid
- Rasmus K Pedersen
- Johanne Gudmand-Hoeyer
- Christina Ellervik
upstream:
  id: biomodels_ebi:BIOMD0000000852
  source_db: biomodels_ebi
  source_id: BIOMD0000000852
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000852
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000852?filename=Andersen2017.xml
  license: CC0
biosim:
  entrypoint: src.andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model:Andersen2017MathematicalModellingAsAProofOBiomd0000000852Model
  init_kwargs:
    model_path: data/BIOMD0000000852.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000852.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: inflammation_level
    maps_to: inflammation
    label: Inflammation Level
    default: 7.0
    units: native SBML value
    description: Inflammation Level. Overrides bundled SBML parameter `inflammation`.
  outputs:
  - name: x0
    maps_to: x0
    label: X0
    description: X0 observable. Maps to SBML symbol `x0`.
  - name: x1
    maps_to: x1
    label: X1
    description: X1 observable. Maps to SBML symbol `x1`.
  - name: a
    maps_to: a
    label: A
    description: A observable. Maps to SBML symbol `a`.
  - name: s
    maps_to: s
    label: S
    description: S observable. Maps to SBML symbol `s`.
  - name: y0
    maps_to: y0
    label: Y0
    description: Y0 observable. Maps to SBML symbol `y0`.
  - name: y1
    maps_to: y1
    label: Y1
    description: Y1 observable. Maps to SBML symbol `y1`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
