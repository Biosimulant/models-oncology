schema_version: '2.0'
package: andersen2017-mathematical-modelling-as-a-proof-of-conce-182c1d3b
version: 1.0.0
title: Andersen2017 - Mathematical modelling as a proof of concept for MPNs as a human
  inflammation model for cancer development Lab
description: This is a mathematical model investigating the role of chronic inflammation
  in the development and progression of myeloproliferative neoplasms (MPNs). The model
  describes the proliferation from stem c.
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: inflammation_level
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.inflammation_level
    label: Inflammation Level
    default: 7.0
    units: native SBML value
    description: Inflammation Level. Overrides bundled SBML parameter `inflammation`.
  outputs:
  - name: x0
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.x0
    description: X0 observable. Maps to SBML symbol `x0`.
  - name: x1
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.x1
    description: X1 observable. Maps to SBML symbol `x1`.
  - name: a
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.a
    description: A observable. Maps to SBML symbol `a`.
  - name: s
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.s
    description: S observable. Maps to SBML symbol `s`.
  - name: y0
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.y0
    description: Y0 observable. Maps to SBML symbol `y0`.
  - name: y1
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.y1
    description: Y1 observable. Maps to SBML symbol `y1`.
  - name: state
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_andersen2017_mathematical_modelling_as_a_proof_o_biomd0000000852_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
