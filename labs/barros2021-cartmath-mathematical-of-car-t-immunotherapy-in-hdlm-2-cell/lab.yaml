schema_version: '2.0'
package: barros2021-cartmath-mathematical-of-car-t-immunotherapy-299df534
version: 1.0.0
title: Barros2021 - CARTmath, Mathematical Model of CAR-T Immunotherapy in HDLM-2
  cell line Lab
description: A mathematical model (CART-math) studying the impact of CAR-T cells therapy
  on haematological cancer cell line which in this case is HDLM-2. It can be used
  to explore tumor-related dynamics and compare treatment-response behavior across
  conditions.
tags:
- biomodels_ebi
- car-t
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- logical-model
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: epsilon_source_parameter
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.epsilon_source_parameter
    label: Epsilon source parameter
    default: 0.15
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  outputs:
  - name: tumor_cells
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.tumor_cells
    description: T observable. Maps to SBML symbol `T`.
  - name: cm
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.cm
    description: Cm observable. Maps to SBML symbol `Cm`.
  - name: ct
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.ct
    description: Ct observable. Maps to SBML symbol `Ct`.
  - name: state
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.state
  to:
  - visualisation.oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model_state
- from: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.summary
  to:
  - visualisation.oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model_summary
- from: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model.species_labels
  to:
  - visualisation.oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
