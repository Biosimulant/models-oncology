schema_version: '2.0'
title: Barros2021 - CARTmath, Mathematical Model of CAR-T Immunotherapy in HDLM-2 cell line Visualisation
description: Oncology visualisation for Barros2021 - CARTmath, Mathematical Model of CAR-T Immunotherapy in HDLM-2 cell line.
standard: other
tags:
- biomodels_ebi
- car-t
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- logical-model
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Barros2021 - CARTmath, Mathematical Model of CAR-T Immunotherapy in HDLM-2 cell line
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Logical/qualitative SBML semantics must be validated carefully; do not treat numeric trajectories as mechanistic ODEs without source support.
    sources:
    - alias: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model
      title: Barros2021 - CARTmath, Mathematical Model of CAR-T Immunotherapy in HDLM-2 cell line
      state_observables:
      - Cm
      - Ct
      - T
      observables:
      - id: T
        port: model_state_1
        label: T
        group: drug_response
      - id: Cm
        port: model_state_2
        label: Cm
        group: drug_response
      - id: Ct
        port: model_state_3
        label: Ct
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model_state
    schema:
      Cm: float
      Ct: float
      T: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_barros2021_cartmath_mathematical_model_of_car_t_biomd0000001019_model_species_labels
    schema:
      T: str
      Cm: str
      Ct: str
    description: Display labels for selected source states.
  outputs: []
