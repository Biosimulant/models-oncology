schema_version: '2.0'
title: Yazdjer2019 - reinforcement learning-based control of tumor growth under anti-angiogenic therapy Visualisation
description: Oncology visualisation for Yazdjer2019 - reinforcement learning-based control of tumor growth under anti-angiogenic therapy.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Yazdjer2019 - reinforcement learning-based control of tumor growth under anti-angiogenic therapy
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_yazdjer2019_reinforcement_learning_based_control_biomd0000000821_model
      title: Yazdjer2019 - reinforcement learning-based control of tumor growth under anti-angiogenic therapy
      state_observables:
      - tumor_volume_x_1
      - endothelial_volume_x_2
      - concentration_of_administrated_inhibitor_x_3
      observables:
      - id: tumor_volume_x_1
        port: tumor_volume_x_1
        label: Tumor volume x 1
        group: drug_response
      - id: endothelial_volume_x_2
        port: endothelial_volume_x_2
        label: Endothelial volume x 2
        group: drug_response
      - id: concentration_of_administrated_inhibitor_x_3
        port: concentration_of_administrated_inhibitor_x_3
        label: Concentration of administrated inhibitor x 3
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_yazdjer2019_reinforcement_learning_based_control_biomd0000000821_model_state
    schema:
      tumor_volume_x_1: float
      endothelial_volume_x_2: float
      concentration_of_administrated_inhibitor_x_3: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_yazdjer2019_reinforcement_learning_based_control_biomd0000000821_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_yazdjer2019_reinforcement_learning_based_control_biomd0000000821_model_species_labels
    schema:
      tumor_volume_x_1: str
      endothelial_volume_x_2: str
      concentration_of_administrated_inhibitor_x_3: str
    description: Display labels for selected source states.
  outputs: []
