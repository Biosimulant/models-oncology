schema_version: '2.0'
package: nikolaev2019-immunobiochemical-reconstruction-of-influe-df48d57f
version: 1.0.0
title: Nikolaev2019 - Immunobiochemical reconstruction of influenza lung infection-melanoma
  skin cancer interactions Lab
description: This is a mathematical mechanistic immunobiochemical model that incorporates
  T cell pathways that control programmed cell death protein 1 (PD-1) expression.
  A core component of the model is a kinetic.
tags:
- biomodels_ebi
- curated
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: sigma_p_tilde_source_parameter
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.sigma_p_tilde_source_parameter
    label: Sigma p tilde source parameter
    default: 0.1
    units: native SBML value
    description: Sigma p tilde source parameter. Maps to bundled SBML parameter `sigma_p_tilde`.
  outputs:
  - name: chemotherapy_level
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.chemotherapy_level
    description: C observable. Maps to SBML symbol `C`.
  - name: p
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.p
    description: P observable. Maps to SBML symbol `P`.
  - name: infected_tumor_cells
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.infected_tumor_cells
    description: I observable. Maps to SBML symbol `I`.
  - name: b
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.b
    description: B observable. Maps to SBML symbol `B`.
  - name: state
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.state
  to:
  - visualisation.oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model_state
- from: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.summary
  to:
  - visualisation.oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model_summary
- from: oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model.species_labels
  to:
  - visualisation.oncology_sbml_nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
