schema_version: '2.0'
title: Nikolaev2019 - Immunobiochemical reconstruction of influenza lung infection-melanoma skin cancer interactions
description: This is a mathematical mechanistic immunobiochemical model that incorporates T cell pathways that control programmed cell death protein 1 (PD-1) expression. A core component of the model is a kinetic.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Evgeni V Nikolaev
- Andrew Zloza
- Sontag ED
upstream:
  id: biomodels_ebi:BIOMD0000000865
  source_db: biomodels_ebi
  source_id: BIOMD0000000865
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000865
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000865?filename=Nikolaev2019.xml
  license: CC0
biosim:
  entrypoint: src.nikolaev2019_immunobiochemical_reconstruction_of_biomd0000000865_model:Nikolaev2019ImmunobiochemicalReconstructionOfBiomd0000000865Model
  init_kwargs:
    model_path: data/BIOMD0000000865.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000865.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: sigma_p_tilde_level
    maps_to: sigma_p_tilde
    label: Sigma p tilde source parameter
    default: 0.1
    units: native SBML value
    description: Sigma p tilde source parameter. Maps to bundled SBML parameter `sigma_p_tilde`.
  outputs:
  - name: model_state_1
    maps_to: C
    label: C
    description: C observable. Maps to SBML symbol `C`.
  - name: model_state_2
    maps_to: P
    label: P
    description: P observable. Maps to SBML symbol `P`.
  - name: model_state_3
    maps_to: I
    label: I
    description: I observable. Maps to SBML symbol `I`.
  - name: model_state_4
    maps_to: B
    label: B
    description: B observable. Maps to SBML symbol `B`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
