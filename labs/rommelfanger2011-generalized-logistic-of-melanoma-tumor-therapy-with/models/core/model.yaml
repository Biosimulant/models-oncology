schema_version: '2.0'
title: Rommelfanger2011 - Generalized logistic model of melanoma tumor therapy with
  vesicular stomatitis virus
description: 'This mathematical model is described by the publication:Rommelfanger
  DM, Offord CP, Dev J, Bajzer Z, Vile RG, Dingli D. ''Dynamics of melanoma tumor
  therapy with vesicular stomatitis virus: explaining.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
authors:
- Biosimulant Team
- D M Rommelfanger
- C P Offord
- J Dev
- Z Bajzer
- R G Vile
upstream:
  id: biomodels_ebi:MODEL2109110004
  source_db: biomodels_ebi
  source_id: MODEL2109110004
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2109110004
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2109110004?filename=Rommelfanger2011
    Generalized Logistic.xml
  license: CC0
biosim:
  entrypoint: src.rommelfanger2011_generalized_logistic_model_of_m_model2109110004_model:Rommelfanger2011GeneralizedLogisticModelOfMModel2109110004Model
  init_kwargs:
    model_path: data/MODEL2109110004.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL2109110004.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: epsilon_source_parameter
    maps_to: epsilon
    label: Epsilon source parameter
    default: 3.0
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  outputs:
  - name: y
    maps_to: y
    label: Y
    description: Y observable. Maps to SBML symbol `y`.
  - name: v
    maps_to: v
    label: V
    description: V observable. Maps to SBML symbol `v`.
  - name: injected_virus
    maps_to: v_i
    label: V i
    description: V i observable. Maps to SBML symbol `v_i`.
  - name: x
    maps_to: x
    label: X
    description: X observable. Maps to SBML symbol `x`.
  - name: z
    maps_to: z
    label: Z
    description: Z observable. Maps to SBML symbol `z`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
