- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: oncology_sbml_chaudhury2020_ec50_expansion_and_killing_mathema_biomd0000001025_model.initial_tumor_cells
    label: Tumor cells
    default: 900.0
    units: native SBML value
    description: Initial Tumor cells. Sets the initial value of bundled SBML symbol `Tumor_cells`.
  outputs:
  - name: tumor_cells
    maps_to: oncology_sbml_chaudhury2020_ec50_expansion_and_killing_mathema_biomd0000001025_model.tumor_cells
    description: Tumor cells observable. Maps to SBML symbol `Tumor_cells`.
  - name: state
    maps_to: oncology_sbml_chaudhury2020_ec50_expansion_and_killing_mathema_biomd0000001025_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_chaudhury2020_ec50_expansion_and_killing_mathema_biomd0000001025_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_chaudhury2020_ec50_expansion_and_killing_mathema_biomd0000001025_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
