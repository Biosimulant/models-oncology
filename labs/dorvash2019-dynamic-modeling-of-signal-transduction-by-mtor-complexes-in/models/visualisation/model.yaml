schema_version: '2.0'
title: Dorvash2019 - Dynamic modeling of signal transduction by mTOR complexes in cancer Visualisation
description: Oncology visualisation for Dorvash2019 - Dynamic modeling of signal transduction by mTOR complexes in cancer.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
