authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Dorvash2019 - Dynamic modeling of signal transduction by mTOR complexes in cancer
    question: Which signaling states carry the dominant response in the bundled cancer pathway model?
    answer_focus: Tracks selected pathway species and the largest-changing SBML observable.
    visual_scope: Cancer signaling pathway activity and dominant source states
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_dorvash2019_dynamic_modeling_of_signal_transduct_biomd0000000822_model
      title: Dorvash2019 - Dynamic modeling of signal transduction by mTOR complexes in cancer
      state_observables:
      - Cytosolic_Rapamycin
      - mTOR
      - Raptor
      - Rictor
      - mTORC1
      - mTORC2
      - mTOR_Rapamycin
      - mTORC1_Rapamycin
      observables:
      - id: mTOR
        port: mtor
        label: MTOR
        group: signaling
      - id: Raptor
        port: raptor
        label: Raptor
        group: signaling
      - id: Rictor
        port: rictor
        label: Rictor
        group: signaling
      - id: Cytosolic_Rapamycin
        port: cytosolic_rapamycin
        label: Cytosolic Rapamycin
        group: signaling
      - id: mTORC1
        port: mtorc1
        label: MTORC1
        group: signaling
      - id: mTORC2
        port: mtorc2
        label: MTORC2
        group: signaling
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_dorvash2019_dynamic_modeling_of_signal_transduct_biomd0000000822_model_state
    schema:
      Cytosolic_Rapamycin: float
      mTOR: float
      Raptor: float
      Rictor: float
      mTORC1: float
      mTORC2: float
      mTOR_Rapamycin: float
      mTORC1_Rapamycin: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_dorvash2019_dynamic_modeling_of_signal_transduct_biomd0000000822_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_dorvash2019_dynamic_modeling_of_signal_transduct_biomd0000000822_model_species_labels
    schema:
      mTOR: str
      Raptor: str
      Rictor: str
      Cytosolic_Rapamycin: str
      mTORC1: str
      mTORC2: str
    description: Display labels for selected source states.
  outputs: []
