schema_version: '2.0'
title: Nave2018 - prostate cancer model
description: This model is based on paper:Combination of singularly perturbed vector field method and method of directly defining the inverse mapping applied to complex ODE system prostate cancer modelAuthor:Ophir. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Ophir Nave
- Miriam Elbaz
upstream:
  id: biomodels_ebi:MODEL1910030001
  source_db: biomodels_ebi
  source_id: MODEL1910030001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1910030001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1910030001?filename=Nave2018 - prostate cancer model.xml
  license: CC0
biosim:
  entrypoint: src.nave2018_prostate_cancer_model_model1910030001_model:Nave2018ProstateCancerModelModel1910030001Model
  init_kwargs:
    model_path: data/MODEL1910030001.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1910030001.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations. No scientifically safe external input was exposed by the cleanup.
io:
  inputs: []
  outputs:
  - name: model_state_1
    maps_to: N_1
    label: N 1
    description: N 1 observable. Maps to SBML symbol `N_1`.
  - name: model_state_2
    maps_to: A
    label: A
    description: A observable. Maps to SBML symbol `A`.
  - name: model_state_3
    maps_to: N_2
    label: N 2
    description: N 2 observable. Maps to SBML symbol `N_2`.
  - name: model_state_4
    maps_to: D
    label: D
    description: D observable. Maps to SBML symbol `D`.
  - name: model_state_5
    maps_to: T
    label: T
    description: T observable. Maps to SBML symbol `T`.
  - name: model_state_6
    maps_to: I_L
    label: I L
    description: I L observable. Maps to SBML symbol `I_L`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
