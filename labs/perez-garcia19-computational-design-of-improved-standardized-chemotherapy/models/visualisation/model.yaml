schema_version: '2.0'
title: Perez-Garcia19 - Computational design of improved standardized chemotherapy
  protocols for grade 2 oligodendrogliomas Visualisation
description: Oncology visualisation for Perez-Garcia19 - Computational design of improved
  standardized chemotherapy protocols for grade 2 oligodendrogliomas.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Perez-Garcia19 - Computational design of improved standardized chemotherapy
      protocols for grade 2 oligodendrogliomas
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_perez_garcia19_computational_design_of_improved_biomd0000000814_model
      title: Perez-Garcia19 - Computational design of improved standardized chemotherapy
        protocols for grade 2 oligodendrogliomas
      state_observables:
      - Drug_Concentration_C
      - Tumor_Cell_Population_P
      - Damaged_Tumor_Cells_D
      observables:
      - id: Damaged_Tumor_Cells_D
        port: damaged_tumor_cells_d
        label: Damaged Tumor Cells D
        group: drug_response
      - id: Tumor_Cell_Population_P
        port: tumor_cell_population_p
        label: Tumor Cell Population P
        group: drug_response
      - id: Drug_Concentration_C
        port: drug_concentration_c
        label: Drug Concentration C
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_perez_garcia19_computational_design_of_improved_biomd0000000814_model_state
    schema:
      Drug_Concentration_C: float
      Tumor_Cell_Population_P: float
      Damaged_Tumor_Cells_D: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_perez_garcia19_computational_design_of_improved_biomd0000000814_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_perez_garcia19_computational_design_of_improved_biomd0000000814_model_species_labels
    schema:
      Damaged_Tumor_Cells_D: str
      Tumor_Cell_Population_P: str
      Drug_Concentration_C: str
    description: Display labels for selected source states.
  outputs: []
