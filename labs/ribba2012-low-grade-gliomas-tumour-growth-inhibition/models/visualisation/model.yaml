schema_version: '2.0'
title: Ribba2012 - Low-grade gliomas, tumour growth inhibition model Visualisation
description: Oncology visualisation for Ribba2012 - Low-grade gliomas, tumour growth inhibition model.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Ribba2012 - Low-grade gliomas, tumour growth inhibition model
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_ribba2012_low_grade_gliomas_tumour_growth_inhibi_biomd0000000521_model
      title: Ribba2012 - Low-grade gliomas, tumour growth inhibition model
      state_observables:
      - C
      - P
      - Q
      - Qp
      observables:
      - id: Qp
        port: damaged_quiescent_cells
        label: Damaged quiescent cells
        group: drug_response
      - id: C
        port: pcv_plasma
        label: PCV plasma
        group: drug_response
      - id: P
        port: proliferative_tissue
        label: Proliferative tissue
        group: drug_response
      - id: Q
        port: nonproliferative_quiescent_tissue
        label: Nonproliferative quiescent tissue
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_ribba2012_low_grade_gliomas_tumour_growth_inhibi_biomd0000000521_model_state
    schema:
      C: float
      P: float
      Q: float
      Qp: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_ribba2012_low_grade_gliomas_tumour_growth_inhibi_biomd0000000521_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_ribba2012_low_grade_gliomas_tumour_growth_inhibi_biomd0000000521_model_species_labels
    schema:
      Qp: str
      C: str
      P: str
      Q: str
    description: Display labels for selected source states.
  outputs: []
