schema_version: '2.0'
title: Chareyron2009 - Mixed immunotherapy and chemotherapy of tumors Feedback design
  and model updating schemes
description: 'Mixed immunotherapy and chemotherapy of tumors: feedback design and
  model updating schemes.Chareyron S1, Alamir M.Author informationAbstractIn this
  paper, a recently developed model governing the canc. It can be used to explore
  tumor-related dynamics and compare treatment-response behavior across conditions.'
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- S Chareyron
- M Alamir
upstream:
  id: biomodels_ebi:MODEL2001160002
  source_db: biomodels_ebi
  source_id: MODEL2001160002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL2001160002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL2001160002?filename=Chareyron2009.xml
  license: CC0
biosim:
  entrypoint: src.chareyron2009_mixed_immunotherapy_and_chemothera_model2001160002_model:Chareyron2009MixedImmunotherapyAndChemotheraModel2001160002Model
  init_kwargs:
    model_path: data/MODEL2001160002.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL2001160002.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: T
    label: Tumor Cells
    default: 50000000.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: chemotherapy_drug_level
    maps_to: D
    label: Chemotherapy Drug Level
    default: 2.34000000000344
    units: native SBML value
    description: Chemotherapy Drug Level. Overrides bundled SBML parameter `D`.
  outputs:
  - name: tumor_cells
    maps_to: T
    label: Tumor Cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
