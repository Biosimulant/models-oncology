schema_version: '2.0'
title: Alharbi2019 - Tumor-normal model (TNM) of the development of tumor cells and their impact on normal cell dynamics Visualisation
description: Oncology visualisation for Alharbi2019 - Tumor-normal model (TNM) of the development of tumor cells and their impact on normal cell dynamics.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Alharbi2019 - Tumor-normal model (TNM) of the development of tumor cells and their impact on normal cell dynamics
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_alharbi2019_tumor_normal_model_tnm_of_the_develo_biomd0000001037_model
      title: Alharbi2019 - Tumor-normal model (TNM) of the development of tumor cells and their impact on normal cell dynamics
      state_observables:
      - Normal_cells
      - Tumor_cells
      observables:
      - id: Tumor_cells
        port: tumor_cells
        label: Tumor cells
        group: drug_response
      - id: Normal_cells
        port: normal_cells
        label: Normal cells
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_alharbi2019_tumor_normal_model_tnm_of_the_develo_biomd0000001037_model_state
    schema:
      Normal_cells: float
      Tumor_cells: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_alharbi2019_tumor_normal_model_tnm_of_the_develo_biomd0000001037_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_alharbi2019_tumor_normal_model_tnm_of_the_develo_biomd0000001037_model_species_labels
    schema:
      Tumor_cells: str
      Normal_cells: str
    description: Display labels for selected source states.
  outputs: []
