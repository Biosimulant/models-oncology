schema_version: '2.0'
title: Siddhartha2002 - Kinetic modelling of cancer therapies
description: Siddhartha Jain. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Siddhartha Jain
upstream:
  id: biomodels_ebi:BIOMD0000001048
  source_db: biomodels_ebi
  source_id: BIOMD0000001048
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000001048
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000001048?filename=cancer_therapy.xml
  license: CC0
biosim:
  entrypoint: src.siddhartha2002_kinetic_modelling_of_cancer_thera_biomd0000001048_model:Siddhartha2002KineticModellingOfCancerTheraBiomd0000001048Model
  init_kwargs:
    model_path: data/BIOMD0000001048.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000001048.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: initial_ttum
    maps_to: Ttum
    label: Ttum
    default: 1000000.0
    units: native SBML value
    description: Initial Ttum. Sets the initial value of bundled SBML symbol `Ttum`.
  - name: initial_tplas
    maps_to: Tplas
    label: Tplas
    default: 4000000.0
    units: native SBML value
    description: Initial Tplas. Sets the initial value of bundled SBML symbol `Tplas`.
  - name: initial_tnew
    maps_to: Tnew
    label: Tnew
    default: 0.0
    units: native SBML value
    description: Initial Tnew. Sets the initial value of bundled SBML symbol `Tnew`.
  outputs:
  - name: ttum
    maps_to: Ttum
    label: Ttum
    description: Ttum observable. Maps to SBML symbol `Ttum`.
  - name: tplas
    maps_to: Tplas
    label: Tplas
    description: Tplas observable. Maps to SBML symbol `Tplas`.
  - name: tnew
    maps_to: Tnew
    label: Tnew
    description: Tnew observable. Maps to SBML symbol `Tnew`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
