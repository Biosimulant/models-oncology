schema_version: '2.0'
title: Orton2009 - Modelling cancerous mutations in the EGFR/ERK pathway - EGF Model
  Lab
description: Orton2009 - Modelling cancerous mutations inthe EGFR/ERK pathway - EGF
  Model This model studies the aberrations inERK signalling for different cancer mutations.
  It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
io:
