  - name: summary
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
