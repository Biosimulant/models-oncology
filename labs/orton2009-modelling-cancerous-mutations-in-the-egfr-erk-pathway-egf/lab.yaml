  - name: free_egfreceptor
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.free_egfreceptor
    description: FreeEGFReceptor observable. Maps to SBML symbol `species_1`.
  - name: bound_egfreceptor
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.bound_egfreceptor
    description: BoundEGFReceptor observable. Maps to SBML symbol `species_0`.
  - name: degraded_egfreceptor
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.degraded_egfreceptor
    description: DegradedEGFReceptor observable. Maps to SBML symbol `species_18`.
  - name: ras_inactive
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.ras_inactive
