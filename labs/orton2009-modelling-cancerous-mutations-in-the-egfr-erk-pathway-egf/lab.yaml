    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.initial_free_egfreceptor
    label: FreeEGFReceptor
    default: 80000.0
    units: native SBML value
    description: Initial FreeEGFReceptor. Sets the initial value of bundled SBML symbol
      `species_1`.
  - name: initial_bound_egfreceptor
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.initial_bound_egfreceptor
    label: BoundEGFReceptor
    default: 0.0
    units: native SBML value
    description: Initial BoundEGFReceptor. Sets the initial value of bundled SBML
      symbol `species_0`.
  - name: initial_degraded_egfreceptor
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.initial_degraded_egfreceptor
    label: DegradedEGFReceptor
    default: 0.0
    units: native SBML value
    description: Initial DegradedEGFReceptor. Sets the initial value of bundled SBML
      symbol `species_18`.
  - name: initial_ras_inactive
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.initial_ras_inactive
    label: RasInactive
    default: 120000.0
    units: native SBML value
    description: Initial RasInactive. Sets the initial value of bundled SBML symbol
      `species_5`.
  - name: initial_raf1_inactive
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.initial_raf1_inactive
    label: Raf1Inactive
    default: 120000.0
    units: native SBML value
    description: Initial Raf1Inactive. Sets the initial value of bundled SBML symbol
      `species_7`.
  - name: initial_erk_inactive
    maps_to: oncology_sbml_orton2009_modelling_cancerous_mutations_in_the_e_biomd0000000623_model.initial_erk_inactive
    label: ErkInactive
    default: 600000.0
    units: native SBML value
