schema_version: '2.0'
title: Babbs2012 - immunotherapy Visualisation
description: Oncology visualisation for Babbs2012 - immunotherapy.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Babbs2012 - immunotherapy
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_babbs2012_immunotherapy_biomd0000000758_model
      title: Babbs2012 - immunotherapy
      state_observables:
      - T
      - I
      observables:
      - id: T
        port: model_state_1
        label: T
        group: drug_response
      - id: I
        port: model_state_2
        label: I
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_babbs2012_immunotherapy_biomd0000000758_model_state
    schema:
      T: float
      I: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_babbs2012_immunotherapy_biomd0000000758_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_babbs2012_immunotherapy_biomd0000000758_model_species_labels
    schema:
      T: str
      I: str
    description: Display labels for selected source states.
  outputs: []
