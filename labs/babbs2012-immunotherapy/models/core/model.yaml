schema_version: '2.0'
title: Babbs2012 - immunotherapy
description: 'The paper describes a simple model of tumor immunotherapy. Created by
  COPASI 4.25 (Build 207) This model is described in the article: Predicting success
  or failure of immunotherapy for cancer: insight.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Charles F Babbs
upstream:
  id: biomodels_ebi:BIOMD0000000758
  source_db: biomodels_ebi
  source_id: BIOMD0000000758
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000758
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000758?filename=Babbs2012.xml
  license: CC0
biosim:
  entrypoint: src.babbs2012_immunotherapy_biomd0000000758_model:Babbs2012ImmunotherapyBiomd0000000758Model
  init_kwargs:
    model_path: data/BIOMD0000000758.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000758.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_tumor_burden
    maps_to: T
    label: Tumor Burden
    default: 1.0
    units: native SBML value
    description: Initial Tumor Burden. Sets the initial value of bundled SBML symbol
      `T`.
  - name: initial_immune_response
    maps_to: I
    label: Immune Response
    default: 0.001
    units: native SBML value
    description: Initial Immune Response. Sets the initial value of bundled SBML symbol
      `I`.
  outputs:
  - name: tumor_burden
    maps_to: T
    label: Tumor Burden
    description: Tumor Burden observable. Maps to SBML symbol `T`.
  - name: immune_response
    maps_to: I
    label: Immune Response
    description: Immune Response observable. Maps to SBML symbol `I`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
