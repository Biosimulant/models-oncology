schema_version: '2.0'
title: Claret2009 - Predicting phase III overall survival in colorectal cancer
description: 'Claret2009 - Predicting phase III overall survival in colorectal cancer This model is described in the article: Model-based prediction of phase III overall survival in colorectal cancer on the basis o. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Laurent Claret
- Pascal Girard
- Paulo M Hoff
- Eric Van Cutsem
- Klaas P Zuideveld
upstream:
  id: biomodels_ebi:MODEL1708310001
  source_db: biomodels_ebi
  source_id: MODEL1708310001
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1708310001
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1708310001?filename=MODEL1708310001_url.xml
  license: CC0
biosim:
  entrypoint: src.claret2009_predicting_phase_iii_overall_survival_model1708310001_model:Claret2009PredictingPhaseIiiOverallSurvivalModel1708310001Model
  init_kwargs:
    model_path: data/MODEL1708310001.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1708310001.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: treatment_int_level
    maps_to: treatment_int
    label: Treatment int source parameter
    default: 14.0
    units: native SBML value
    description: Treatment int source parameter. Maps to bundled SBML parameter `treatment_int`.
  - name: treatment_day_level
    maps_to: treatment_day
    label: Treatment day source parameter
    default: 1.0
    units: native SBML value
    description: Treatment day source parameter. Maps to bundled SBML parameter `treatment_day`.
  - name: dose_length
    maps_to: dose_length
    label: Dose length source parameter
    default: 0.0625
    units: native SBML value
    description: Dose length source parameter. Maps to bundled SBML parameter `dose_length`.
  - name: dose_int2
    maps_to: Dose_int2
    label: Dose int2 source parameter
    default: 0.5
    units: native SBML value
    description: Dose int2 source parameter. Maps to bundled SBML parameter `Dose_int2`.
  outputs:
  - name: model_state_1
    maps_to: y
    label: Y
    description: Y observable. Maps to SBML symbol `y`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
