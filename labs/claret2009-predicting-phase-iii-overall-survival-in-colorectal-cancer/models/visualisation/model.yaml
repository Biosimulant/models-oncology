  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_claret2009_predicting_phase_iii_overall_survival_model1708310001_model_state
    schema:
      y: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_claret2009_predicting_phase_iii_overall_survival_model1708310001_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_claret2009_predicting_phase_iii_overall_survival_model1708310001_model_species_labels
    schema:
      y: str
    description: Display labels for selected source states.
  outputs: []
