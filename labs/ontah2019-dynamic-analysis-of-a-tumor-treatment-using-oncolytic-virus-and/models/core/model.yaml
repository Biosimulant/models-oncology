schema_version: '2.0'
title: Ontah2019 - Dynamic analysis of a tumor treatment model using oncolytic virus
  and chemotherapy with saturated infection rate
description: This is a mathematical model describing the treatment of tumors using
  oncolytic virus and chemotherapy. The model is comprised of nonlinear ordinary differential
  equations describing the interactions.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
authors:
- Biosimulant Team
- Ontah, G.M.
- Trisilowati
- Darti, I.
upstream:
  id: biomodels_ebi:BIOMD0000000877
  source_db: biomodels_ebi
  source_id: BIOMD0000000877
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000877
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000877?filename=Ontah2019.xml
  license: CC0
biosim:
  entrypoint: src.ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model:Ontah2019DynamicAnalysisOfATumorTreatmentBiomd0000000877Model
  init_kwargs:
    model_path: data/BIOMD0000000877.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000877.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_uninfected_tumor_cells
    maps_to: U
    label: Uninfected Tumor Cells
    default: 100.0
    units: native SBML value
    description: Initial Uninfected Tumor Cells. Sets the initial value of bundled
      SBML symbol `U`.
  - name: initial_infected_tumor_cells
    maps_to: I
    label: Infected Tumor Cells
    default: 10.0
    units: native SBML value
    description: Initial Infected Tumor Cells. Sets the initial value of bundled SBML
      symbol `I`.
  - name: initial_virus_load
    maps_to: V
    label: Virus Load
    default: 10.0
    units: native SBML value
    description: Initial Virus Load. Sets the initial value of bundled SBML symbol
      `V`.
  - name: initial_chemotherapy_level
    maps_to: C
    label: Chemotherapy Level
    default: 30.0
    units: native SBML value
    description: Initial Chemotherapy Level. Sets the initial value of bundled SBML
      symbol `C`.
  outputs:
  - name: uninfected_tumor_cells
    maps_to: U
    label: Uninfected Tumor Cells
    description: Uninfected Tumor Cells observable. Maps to SBML symbol `U`.
  - name: infected_tumor_cells
    maps_to: I
    label: Infected Tumor Cells
    description: Infected Tumor Cells observable. Maps to SBML symbol `I`.
  - name: virus_load
    maps_to: V
    label: Virus Load
    description: Virus Load observable. Maps to SBML symbol `V`.
  - name: chemotherapy_level
    maps_to: C
    label: Chemotherapy Level
    description: Chemotherapy Level observable. Maps to SBML symbol `C`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
