title: Ontah2019 - Dynamic analysis of a tumor treatment model using oncolytic virus and chemotherapy with saturated infection rate Lab
description: This is a mathematical model describing the treatment of tumors using oncolytic virus and chemotherapy. The model is comprised of nonlinear ordinary differential equations describing the interactions.
