schema_version: '2.0'
package: ontah2019-dynamic-analysis-of-a-tumor-treatment-using-o-77d569a4
version: 1.0.0
title: Ontah2019 - Dynamic analysis of a tumor treatment model using oncolytic virus
  and chemotherapy with saturated infection rate Lab
description: This is a mathematical model describing the treatment of tumors using
  oncolytic virus and chemotherapy. The model is comprised of nonlinear ordinary differential
  equations describing the interactions.
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
io:
  inputs:
  - name: initial_uninfected_tumor_cells
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.initial_uninfected_tumor_cells
    label: Uninfected Tumor Cells
    default: 100.0
    units: native SBML value
    description: Initial Uninfected Tumor Cells. Sets the initial value of bundled
      SBML symbol `U`.
  - name: initial_infected_tumor_cells
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.initial_infected_tumor_cells
    label: Infected Tumor Cells
    default: 10.0
    units: native SBML value
    description: Initial Infected Tumor Cells. Sets the initial value of bundled SBML
      symbol `I`.
  - name: initial_virus_load
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.initial_virus_load
    label: Virus Load
    default: 10.0
    units: native SBML value
    description: Initial Virus Load. Sets the initial value of bundled SBML symbol
      `V`.
  - name: initial_chemotherapy_level
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.initial_chemotherapy_level
    label: Chemotherapy Level
    default: 30.0
    units: native SBML value
    description: Initial Chemotherapy Level. Sets the initial value of bundled SBML
      symbol `C`.
  outputs:
  - name: uninfected_tumor_cells
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.uninfected_tumor_cells
    description: Uninfected Tumor Cells observable. Maps to SBML symbol `U`.
  - name: infected_tumor_cells
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.infected_tumor_cells
    description: Infected Tumor Cells observable. Maps to SBML symbol `I`.
  - name: virus_load
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.virus_load
    description: Virus Load observable. Maps to SBML symbol `V`.
  - name: chemotherapy_level
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.chemotherapy_level
    description: Chemotherapy Level observable. Maps to SBML symbol `C`.
  - name: state
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.state
  to:
  - visualisation.oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model_state
- from: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.summary
  to:
  - visualisation.oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model_summary
- from: oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model.species_labels
  to:
  - visualisation.oncology_sbml_ontah2019_dynamic_analysis_of_a_tumor_treatment_biomd0000000877_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
