schema_version: '2.0'
title: Eftimie2010 - immunity to melanoma Lab
description: 'The paper describes a model of immunity to melanoma. Created by COPASI
  4.25 (Build 207) This model is described in the article: Modeling anti-tumor Th1
  and Th2 immunity in the rejection of melanoma Ra.'
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_melanoma_cells
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.initial_melanoma_cells
    label: Melanoma Cells
    default: 100000.0
    units: native SBML value
    description: Initial Melanoma Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: initial_helper_t_cells
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.initial_helper_t_cells
    label: Helper T Cells
    default: 0.0
    units: native SBML value
    description: Initial Helper T Cells. Sets the initial value of bundled SBML symbol
      `Th`.
  outputs:
  - name: melanoma_cells
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.melanoma_cells
    description: Melanoma Cells observable. Maps to SBML symbol `T`.
  - name: helper_t_cells
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.helper_t_cells
    description: Helper T Cells observable. Maps to SBML symbol `Th`.
  - name: state
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.state
  to:
  - visualisation.oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model_state
- from: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.summary
  to:
  - visualisation.oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model_summary
- from: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model.species_labels
  to:
  - visualisation.oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
