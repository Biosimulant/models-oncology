schema_version: '2.0'
title: Eftimie2010 - immunity to melanoma
description: 'The paper describes a model of immunity to melanoma. Created by COPASI
  4.25 (Build 207) This model is described in the article: Modeling anti-tumor Th1
  and Th2 immunity in the rejection of melanoma Ra.'
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Eftimie R
- Jonathan L Bramson
- David J D Earn
upstream:
  id: biomodels_ebi:BIOMD0000000768
  source_db: biomodels_ebi
  source_id: BIOMD0000000768
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000768
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000768?filename=Eftimie2010.xml
  license: CC0
biosim:
  entrypoint: src.eftimie2010_immunity_to_melanoma_biomd0000000768_model:Eftimie2010ImmunityToMelanomaBiomd0000000768Model
  init_kwargs:
    model_path: data/BIOMD0000000768.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000768.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_melanoma_cells
    maps_to: T
    label: Melanoma Cells
    default: 100000.0
    units: native SBML value
    description: Initial Melanoma Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: initial_helper_t_cells
    maps_to: Th
    label: Helper T Cells
    default: 0.0
    units: native SBML value
    description: Initial Helper T Cells. Sets the initial value of bundled SBML symbol
      `Th`.
  outputs:
  - name: melanoma_cells
    maps_to: T
    label: Melanoma Cells
    description: Melanoma Cells observable. Maps to SBML symbol `T`.
  - name: helper_t_cells
    maps_to: Th
    label: Helper T Cells
    description: Helper T Cells observable. Maps to SBML symbol `Th`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
