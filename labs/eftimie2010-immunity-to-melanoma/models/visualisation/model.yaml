schema_version: '2.0'
title: Eftimie2010 - immunity to melanoma Visualisation
description: Oncology visualisation for Eftimie2010 - immunity to melanoma.
standard: other
tags:
- biomodels_ebi
- curated
- faithful
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Eftimie2010 - immunity to melanoma
    question: What oncology-relevant state dominates the bundled SBML simulation over
      the baseline run?
    answer_focus: Compares the largest-changing and peak observables with selected
      source states.
    visual_scope: Tumor-system state trajectories and dominant observable changes
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model
      title: Eftimie2010 - immunity to melanoma
      state_observables:
      - Th
      - T
      - Cs
      - Cp
      - C
      observables:
      - id: T
        port: melanoma_cells
        label: Melanoma Cells
        group: tumor_system
      - id: Th
        port: helper_t_cells
        label: Helper T Cells
        group: tumor_system
      - id: Cs
        label: Cs
        group: tumor_system
      - id: Cp
        label: Cp
        group: tumor_system
      - id: C
        label: C
        group: tumor_system
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model_state
    schema:
      Th: float
      T: float
      Cs: float
      Cp: float
      C: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_eftimie2010_immunity_to_melanoma_biomd0000000768_model_species_labels
    schema:
      T: str
      Th: str
      Cs: str
      Cp: str
      C: str
    description: Display labels for selected source states.
  outputs: []
