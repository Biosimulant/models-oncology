schema_version: '2.0'
title: Owen1998 - tumour growth model
description: 'Owen1998 - tumour growth model Deterministic model for the early,avascular
  growth of a tumour, concentrating on the inhibitoryeffect of macrophages. This model
  is described in the article: Modelling t.'
standard: other
tags:
- angiogenesis
- biomodels_ebi
- curated
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- M R Owen
- J A Sherratt
upstream:
  id: biomodels_ebi:BIOMD0000000670
  source_db: biomodels_ebi
  source_id: BIOMD0000000670
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000670
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000670?filename=BIOMD0000000670_url.xml
  license: CC0
biosim:
  entrypoint: src.owen1998_tumour_growth_model_biomd0000000670_model:Owen1998TumourGrowthModelBiomd0000000670Model
  init_kwargs:
    model_path: data/BIOMD0000000670.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000670.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_macrophage
    maps_to: l
    label: Macrophage
    default: 0.0999999999999985
    units: native SBML value
    description: Initial Macrophage. Sets the initial value of bundled SBML symbol
      `l`.
  - name: initial_normal_cells
    maps_to: n
    label: Normal Cells
    default: 0.899999999999988
    units: native SBML value
    description: Initial Normal Cells. Sets the initial value of bundled SBML symbol
      `n`.
  - name: initial_mutated_cells
    maps_to: m
    label: Mutated Cells
    default: 0.899999999999988
    units: native SBML value
    description: Initial Mutated Cells. Sets the initial value of bundled SBML symbol
      `m`.
  outputs:
  - name: macrophage
    maps_to: l
    label: Macrophage
    description: Macrophage observable. Maps to SBML symbol `l`.
  - name: normal_cells
    maps_to: n
    label: Normal Cells
    description: Normal Cells observable. Maps to SBML symbol `n`.
  - name: mutated_cells
    maps_to: m
    label: Mutated Cells
    description: Mutated Cells observable. Maps to SBML symbol `m`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
