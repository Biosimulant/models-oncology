schema_version: '2.0'
title: Owen1998 - tumour growth model Lab
description: 'Owen1998 - tumour growth model Deterministic model for the early,avascular
  growth of a tumour, concentrating on the inhibitoryeffect of macrophages. This model
  is described in the article: Modelling t.'
tags:
- angiogenesis
- biomodels_ebi
- curated
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_macrophage
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.initial_macrophage
    label: Macrophage
    default: 0.0999999999999985
    units: native SBML value
    description: Initial Macrophage. Sets the initial value of bundled SBML symbol
      `l`.
  - name: initial_normal_cells
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.initial_normal_cells
    label: Normal Cells
    default: 0.899999999999988
    units: native SBML value
    description: Initial Normal Cells. Sets the initial value of bundled SBML symbol
      `n`.
  - name: initial_mutated_cells
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.initial_mutated_cells
    label: Mutated Cells
    default: 0.899999999999988
    units: native SBML value
    description: Initial Mutated Cells. Sets the initial value of bundled SBML symbol
      `m`.
  outputs:
  - name: macrophage
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.macrophage
    description: Macrophage observable. Maps to SBML symbol `l`.
  - name: normal_cells
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.normal_cells
    description: Normal Cells observable. Maps to SBML symbol `n`.
  - name: mutated_cells
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.mutated_cells
    description: Mutated Cells observable. Maps to SBML symbol `m`.
  - name: state
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.state
  to:
  - visualisation.oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model_state
- from: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.summary
  to:
  - visualisation.oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model_summary
- from: oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model.species_labels
  to:
  - visualisation.oncology_sbml_owen1998_tumour_growth_model_biomd0000000670_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
