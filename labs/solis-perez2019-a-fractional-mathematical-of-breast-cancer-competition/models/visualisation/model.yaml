schema_version: '2.0'
title: Solis-perez2019 - A fractional mathematical model of breast cancer competition model Visualisation
description: Oncology visualisation for Solis-perez2019 - A fractional mathematical model of breast cancer competition model.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Solis-perez2019 - A fractional mathematical model of breast cancer competition model
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_solis_perez2019_a_fractional_mathematical_model_biomd0000000903_model
      title: Solis-perez2019 - A fractional mathematical model of breast cancer competition model
      state_observables:
      - C
      - T
      - H
      - I
      - E
      observables:
      - id: C
        port: model_state_1
        label: C
        group: drug_response
      - id: T
        port: model_state_2
        label: T
        group: drug_response
      - id: H
        port: model_state_3
        label: H
        group: drug_response
      - id: I
        port: model_state_4
        label: I
        group: drug_response
      - id: E
        port: model_state_5
        label: E
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_solis_perez2019_a_fractional_mathematical_model_biomd0000000903_model_state
    schema:
      C: float
      T: float
      H: float
      I: float
      E: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_solis_perez2019_a_fractional_mathematical_model_biomd0000000903_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_solis_perez2019_a_fractional_mathematical_model_biomd0000000903_model_species_labels
    schema:
      C: str
      T: str
      H: str
      I: str
      E: str
    description: Display labels for selected source states.
  outputs: []
