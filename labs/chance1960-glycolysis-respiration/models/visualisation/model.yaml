authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Chance1960_Glycolysis_Respiration
    question: Which metabolic states dominate the baseline oncology-associated metabolic model?
    answer_focus: Compares selected metabolic observables and peak source states.
    visual_scope: Cancer metabolism and metabolic-state changes
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_chance1960_glycolysis_respiration_biomd0000000281_model
      title: Chance1960_Glycolysis_Respiration
      state_observables:
      - GLU
      - ENZ
      - ENG
      - TP1
      - ADP
      - GLP
      - ETZ
      - ETG
      - GPP
      - GAP
      - DHA
      - DPN
      - DPH
      - PID
      - DGA
      - PGA
      - PYR
      - LAC
      - DIN
      - DIH
      - XI
      - XSI
      - OXY
      - XSP
      - TP2
      - DBP
      - PUE
      - PPP
      - AGP
      - MOD
      - MOB
      - MOX
      observables:
      - id: LAC
        port: lac_lactate
        label: (LAC) lactate
        group: metabolism
      - id: PUE
        port: pue_enzyme_concerned_in_atp_utilization
        label: (PUE) enzyme concerned in ATP utilization
        group: metabolism
      - id: PPP
        port: ppp_enzyme_intermediate_concerned_in_atp_utilization
        label: (PPP) enzyme intermediate concerned in ATP utilization
        group: metabolism
      - id: GLU
        port: glu_glucose
        label: (GLU) glucose
        group: metabolism
      - id: ENG
        port: eng_hexokinase_glucose_intermediate
        label: (ENG) hexokinase glucose intermediate
        group: metabolism
      - id: GLP
        port: glp_glucose_6_phosphate
        label: (GLP) glucose 6 phosphate
        group: metabolism
