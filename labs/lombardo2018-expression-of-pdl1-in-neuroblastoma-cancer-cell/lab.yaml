schema_version: '2.0'
package: lombardo2018-expression-of-pdl1-in-neuroblastoma-cancer-cell
version: 1.0.0
title: Lombardo2018 - Expression of PDL1 in Neuroblastoma Cancer Cell Lab
description: 'The model reproduces the time profiles of PDL1 in a Neuroblastoma Cancer
  Cell, considering the activating mutation of ALK: ALKF1174L. We simulate the impact
  of two different therapy: Crizotinib and Ge.'
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: km_egf_source_parameter
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.km_egf_source_parameter
    label: KmEGF source parameter
    default: 6086070.0
    units: native SBML value
    description: KmEGF source parameter. Maps to bundled SBML parameter `KmEGF`.
  - name: kcat_egf_source_parameter
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.kcat_egf_source_parameter
    label: KcatEGF source parameter
    default: 694.731
    units: native SBML value
    description: KcatEGF source parameter. Maps to bundled SBML parameter `KcatEGF`.
  - name: initial_ngfr
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.initial_ngfr
    label: NGFR
    default: 14737.0
    units: native SBML value
    description: Initial NGFR. Sets the initial value of bundled SBML symbol `NGFR`.
  - name: initial_pip3
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.initial_pip3
    label: PIP3
    default: 100000.0
    units: native SBML value
    description: Initial PIP3. Sets the initial value of bundled SBML symbol `PIP3`.
  - name: initial_egfr_free
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.initial_egfr_free
    label: EGFR free
    default: 618.0
    units: native SBML value
    description: Initial EGFR free. Sets the initial value of bundled SBML symbol
      `EGFR_f`.
  - name: initial_sos_inactive
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.initial_sos_inactive
    label: SOS inactive
    default: 9456.0
    units: native SBML value
    description: Initial SOS inactive. Sets the initial value of bundled SBML symbol
      `SOS_inactive`.
  outputs:
  - name: ngfr
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.ngfr
    description: NGFR observable. Maps to SBML symbol `NGFR`.
  - name: pip3
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.pip3
    description: PIP3 observable. Maps to SBML symbol `PIP3`.
  - name: egfr_free
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.egfr_free
    description: EGFR free observable. Maps to SBML symbol `EGFR_f`.
  - name: sos_inactive
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.sos_inactive
    description: SOS inactive observable. Maps to SBML symbol `SOS_inactive`.
  - name: p90_rsk_inactive
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.p90_rsk_inactive
    description: P90Rsk inactive observable. Maps to SBML symbol `P90Rsk_inactive`.
  - name: ras_inactive
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.ras_inactive
    description: RAS inactive observable. Maps to SBML symbol `RAS_inactive`.
  - name: state
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
