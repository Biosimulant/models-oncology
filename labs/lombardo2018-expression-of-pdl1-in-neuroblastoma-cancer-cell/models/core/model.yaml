schema_version: '2.0'
title: Lombardo2018 - Expression of PDL1 in Neuroblastoma Cancer Cell
description: 'The model reproduces the time profiles of PDL1 in a Neuroblastoma Cancer
  Cell, considering the activating mutation of ALK: ALKF1174L. We simulate the impact
  of two different therapy: Crizotinib and Ge.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Salvo Danilo Lombardo (1)
- Mario Presti (1)
- Katia Mangano (1)
- Maria Cristina Petralia (2)
- Maria Sofia Basile (1)
upstream:
  id: biomodels_ebi:MODEL1812070002
  source_db: biomodels_ebi
  source_id: MODEL1812070002
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1812070002
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1812070002?filename=Lombardo2018
    - PDL1 Signaling Pathway in Neuroblastoma Cancer.xml
  license: CC0
biosim:
  entrypoint: src.lombardo2018_expression_of_pdl1_in_neuroblastoma_model1812070002_model:Lombardo2018ExpressionOfPdl1InNeuroblastomaModel1812070002Model
  init_kwargs:
    model_path: data/MODEL1812070002.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1812070002.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: km_egf_source_parameter
    maps_to: KmEGF
    label: KmEGF source parameter
    default: 6086070.0
    units: native SBML value
    description: KmEGF source parameter. Maps to bundled SBML parameter `KmEGF`.
  - name: kcat_egf_source_parameter
    maps_to: KcatEGF
    label: KcatEGF source parameter
    default: 694.731
    units: native SBML value
    description: KcatEGF source parameter. Maps to bundled SBML parameter `KcatEGF`.
  - name: initial_ngfr
    maps_to: NGFR
    label: NGFR
    default: 14737.0
    units: native SBML value
    description: Initial NGFR. Sets the initial value of bundled SBML symbol `NGFR`.
  - name: initial_pip3
    maps_to: PIP3
    label: PIP3
    default: 100000.0
    units: native SBML value
    description: Initial PIP3. Sets the initial value of bundled SBML symbol `PIP3`.
  - name: initial_egfr_free
    maps_to: EGFR_f
    label: EGFR free
    default: 618.0
    units: native SBML value
    description: Initial EGFR free. Sets the initial value of bundled SBML symbol
      `EGFR_f`.
  - name: initial_sos_inactive
    maps_to: SOS_inactive
    label: SOS inactive
    default: 9456.0
    units: native SBML value
    description: Initial SOS inactive. Sets the initial value of bundled SBML symbol
      `SOS_inactive`.
  outputs:
  - name: ngfr
    maps_to: NGFR
    label: NGFR
    description: NGFR observable. Maps to SBML symbol `NGFR`.
  - name: pip3
    maps_to: PIP3
    label: PIP3
    description: PIP3 observable. Maps to SBML symbol `PIP3`.
  - name: egfr_free
    maps_to: EGFR_f
    label: EGFR free
    description: EGFR free observable. Maps to SBML symbol `EGFR_f`.
  - name: sos_inactive
    maps_to: SOS_inactive
    label: SOS inactive
    description: SOS inactive observable. Maps to SBML symbol `SOS_inactive`.
  - name: p90_rsk_inactive
    maps_to: P90Rsk_inactive
    label: P90Rsk inactive
    description: P90Rsk inactive observable. Maps to SBML symbol `P90Rsk_inactive`.
  - name: ras_inactive
    maps_to: RAS_inactive
    label: RAS inactive
    description: RAS inactive observable. Maps to SBML symbol `RAS_inactive`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
