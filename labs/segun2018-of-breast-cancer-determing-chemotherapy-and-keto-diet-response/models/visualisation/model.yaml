schema_version: '2.0'
title: Segun2018 - model of breast cancer determing Chemotherapy and Keto diet response
  Visualisation
description: Oncology visualisation for Segun2018 - model of breast cancer determing
  Chemotherapy and Keto diet response.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Segun2018 - model of breast cancer determing Chemotherapy and Keto
      diet response
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_segun2018_model_of_breast_cancer_determing_chemo_model2003050001_model
      title: Segun2018 - model of breast cancer determing Chemotherapy and Keto diet
        response
      state_observables:
      - N
      - T
      - M
      - E
      observables:
      - id: N
        port: normal_cells
        label: Normal Cells
        group: drug_response
      - id: T
        port: breast_tumor_cells
        label: Breast Tumor Cells
        group: drug_response
      - id: M
        label: M
        group: drug_response
      - id: E
        label: E
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_segun2018_model_of_breast_cancer_determing_chemo_model2003050001_model_state
    schema:
      N: float
      T: float
      M: float
      E: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_segun2018_model_of_breast_cancer_determing_chemo_model2003050001_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_segun2018_model_of_breast_cancer_determing_chemo_model2003050001_model_species_labels
    schema:
      N: str
      T: str
      M: str
      E: str
    description: Display labels for selected source states.
  outputs: []
