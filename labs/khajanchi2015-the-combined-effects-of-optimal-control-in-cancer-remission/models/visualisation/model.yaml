schema_version: '2.0'
title: Khajanchi2015 - The combined effects of optimal control in cancer remission
  Visualisation
description: Oncology visualisation for Khajanchi2015 - The combined effects of optimal
  control in cancer remission.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Khajanchi2015 - The combined effects of optimal control in cancer remission
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_khajanchi2015_the_combined_effects_of_optimal_co_biomd0000000897_model
      title: Khajanchi2015 - The combined effects of optimal control in cancer remission
      state_observables:
      - E
      - T
      observables:
      - id: E
        port: effector_cells
        label: Effector Cells
        group: drug_response
      - id: T
        port: tumor_cells
        label: Tumor Cells
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_khajanchi2015_the_combined_effects_of_optimal_co_biomd0000000897_model_state
    schema:
      E: float
      T: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_khajanchi2015_the_combined_effects_of_optimal_co_biomd0000000897_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_khajanchi2015_the_combined_effects_of_optimal_co_biomd0000000897_model_species_labels
    schema:
      E: str
      T: str
    description: Display labels for selected source states.
  outputs: []
