  - name: model_state_3
    maps_to: Ni
    label: Ni
    description: Ni observable. Maps to SBML symbol `Ni`.
  - name: model_state_4
    maps_to: Di
    label: Di
    description: Di observable. Maps to SBML symbol `Di`.
  - name: model_state_5
    maps_to: Ai
    label: Ai
    description: Ai observable. Maps to SBML symbol `Ai`.
  - name: model_state_6
    maps_to: Gf
