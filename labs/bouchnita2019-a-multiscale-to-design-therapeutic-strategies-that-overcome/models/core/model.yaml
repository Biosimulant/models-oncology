title: Bouchnita2019 - A multiscale model to design therapeutic strategies that overcome drug resistance to tyrosine kinase inhibitors in multiple myeloma
description: Drug resistance (DR) is a phenomenon characterized by the tolerance of a disease to pharmaceutical treatment. In cancer patients, DR is one of the main challenges that limit the therapeutic potential.
