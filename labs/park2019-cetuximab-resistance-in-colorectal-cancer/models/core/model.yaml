schema_version: '2.0'
title: Park2019 - Cetuximab resistance in colorectal cancer
description: It's an experimental + mathematical paper explaining probable targets for Cetixumab resistance in colorectal cancer. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Sang-Min Park
- Chae Young Hwang
- Sung-Hwan Cho
- Daewon Lee
- Jeong-Ryeol Gong
upstream:
  id: biomodels_ebi:MODEL1909300004
  source_db: biomodels_ebi
  source_id: MODEL1909300004
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1909300004
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1909300004?filename=Park2019.xml
  license: CC0
biosim:
  entrypoint: src.park2019_cetuximab_resistance_in_colorectal_canc_model1909300004_model:Park2019CetuximabResistanceInColorectalCancModel1909300004Model
  init_kwargs:
    model_path: data/MODEL1909300004.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1909300004.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: initial_egf
    maps_to: EGF
    label: EGF
    default: 1.0
    units: native SBML value
    description: Initial EGF. Sets the initial value of bundled SBML symbol `EGF`.
  - name: initial_gnb5
    maps_to: GNB5
    label: GNB5
    default: 0.5
    units: native SBML value
    description: Initial GNB5. Sets the initial value of bundled SBML symbol `GNB5`.
  - name: initial_meki
    maps_to: MEKi
    label: MEKi
    default: 1.0
    units: native SBML value
    description: Initial MEKi. Sets the initial value of bundled SBML symbol `MEKi`.
  - name: initial_erki
    maps_to: ERKi
    label: ERKi
    default: 1.0
    units: native SBML value
    description: Initial ERKi. Sets the initial value of bundled SBML symbol `ERKi`.
  - name: initial_akti
    maps_to: AKTi
    label: AKTi
    default: 1.0
    units: native SBML value
    description: Initial AKTi. Sets the initial value of bundled SBML symbol `AKTi`.
  - name: initial_egfri
    maps_to: EGFRi
    label: EGFRi
    default: 1.0
    units: native SBML value
    description: Initial EGFRi. Sets the initial value of bundled SBML symbol `EGFRi`.
  outputs:
  - name: egf
    maps_to: EGF
    label: EGF
    description: EGF observable. Maps to SBML symbol `EGF`.
  - name: gnb5
    maps_to: GNB5
    label: GNB5
    description: GNB5 observable. Maps to SBML symbol `GNB5`.
  - name: meki
    maps_to: MEKi
    label: MEKi
    description: MEKi observable. Maps to SBML symbol `MEKi`.
  - name: erki
    maps_to: ERKi
    label: ERKi
    description: ERKi observable. Maps to SBML symbol `ERKi`.
  - name: akti
    maps_to: AKTi
    label: AKTi
    description: AKTi observable. Maps to SBML symbol `AKTi`.
  - name: egfri
    maps_to: EGFRi
    label: EGFRi
    description: EGFRi observable. Maps to SBML symbol `EGFRi`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
