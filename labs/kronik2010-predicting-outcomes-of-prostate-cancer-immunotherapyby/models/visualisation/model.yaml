  - name: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model_species_labels
    schema:
      V: str
      Dm: str
      Dc: str
      Dr: str
      C: str
      R: str
