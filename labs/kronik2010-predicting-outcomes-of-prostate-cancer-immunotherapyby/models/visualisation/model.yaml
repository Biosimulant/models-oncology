      state_observables:
      - V
      - Dm
      - Dc
      - Dr
      - C
      - R
      - P
      observables:
      - id: V
        port: model_state_1
        label: V
        group: signaling
      - id: Dm
        port: model_state_2
        label: Dm
        group: signaling
      - id: Dc
        port: model_state_3
        label: Dc
        group: signaling
      - id: Dr
        port: model_state_4
        label: Dr
        group: signaling
      - id: C
        port: model_state_5
        label: C
        group: signaling
      - id: R
        port: model_state_6
        label: R
        group: signaling
runtime:
