io:
  inputs:
  - name: initial_tumor_volume
    maps_to: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model.initial_tumor_volume
    label: Tumor Volume
    default: 1000000.0
    units: native SBML value
    description: Initial Tumor Volume. Sets the initial value of bundled SBML symbol
      `V`.
  outputs:
  - name: tumor_volume
    maps_to: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model.tumor_volume
    description: Tumor Volume observable. Maps to SBML symbol `V`.
  - name: state
    maps_to: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_kronik2010_predicting_outcomes_of_prostate_cance_model2001130003_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
