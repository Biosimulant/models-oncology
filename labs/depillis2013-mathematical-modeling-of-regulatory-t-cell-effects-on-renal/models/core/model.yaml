schema_version: '2.0'
title: dePillis2013 - Mathematical modeling of regulatory T cell effects on renal
  cell carcinoma treatment
description: Mathematical modeling of regulatory T cell effects on renal cell carcinoma
  treatmentLisette dePillis 1, , Trevor Caldwell 2, , Elizabeth Sarapata 2, and Heather
  Williams 2,1. It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Lisette de Pillis
- Trevor Caldwell, Elizabeth Sarapata and Heather Williams
upstream:
  id: biomodels_ebi:BIOMD0000000908
  source_db: biomodels_ebi
  source_id: BIOMD0000000908
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000908
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000908?filename=dePillis2013.xml
  license: CC0
biosim:
  entrypoint: src.depillis2013_mathematical_modeling_of_regulatory_biomd0000000908_model:Depillis2013MathematicalModelingOfRegulatoryBiomd0000000908Model
  init_kwargs:
    model_path: data/BIOMD0000000908.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000908.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: T
    label: Tumor Cells
    default: 4662000000.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol
      `T`.
  - name: drug_treatment_level
    maps_to: D
    label: Drug Treatment Level
    default: 9.47552761007735e-06
    units: native SBML value
    description: Drug Treatment Level. Overrides bundled SBML parameter `D`.
  outputs:
  - name: tumor_cells
    maps_to: T
    label: Tumor Cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
