schema_version: '2.0'
title: Nazari2018 - IL6 mediated stem cell driven tumor growth and targeted treatment
description: 'This a model from the article: A mathematical model for IL-6-mediated, stem cell driven tumor growth and targeted treatmentFereshteh Nazari, Alexander T. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Fereshteh Nazari
- Alexander T Pearson
- "Jacques Eduardo N\xF6r"
- Trachette L Jackson
upstream:
  id: biomodels_ebi:BIOMD0000000819
  source_db: biomodels_ebi
  source_id: BIOMD0000000819
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000819
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000819?filename=Nazari2018 - IL6 mediated stem cell driven tumor growth and targeted treatment.xml
  license: CC0
biosim:
  entrypoint: src.nazari2018_il6_mediated_stem_cell_driven_tumor_g_biomd0000000819_model:Nazari2018Il6MediatedStemCellDrivenTumorGBiomd0000000819Model
  init_kwargs:
    model_path: data/BIOMD0000000819.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000819.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: initial_progenitor_tumor_cell_e
    maps_to: Progenitor_tumor_cell_E
    label: Progenitor tumor cell E
    default: 0.01
    units: native SBML value
    description: Initial Progenitor tumor cell E. Sets the initial value of bundled SBML symbol `Progenitor_tumor_cell_E`.
  - name: initial_differentiated_tumor_cell_d
    maps_to: Differentiated_tumor_cell_D
    label: Differentiated tumor cell D
    default: 0.01
    units: native SBML value
    description: Initial Differentiated tumor cell D. Sets the initial value of bundled SBML symbol `Differentiated_tumor_cell_D`.
  - name: initial_cancer_stem_cell_s
    maps_to: Cancer_Stem_Cell_S
    label: Cancer Stem Cell S
    default: 1000.0
    units: native SBML value
    description: Initial Cancer Stem Cell S. Sets the initial value of bundled SBML symbol `Cancer_Stem_Cell_S`.
  - name: initial_il_6_cell_bound_il_6r_complex_on_s
    maps_to: IL_6__Cell_bound_IL_6R_complex_on_S
    label: IL 6, Cell bound IL 6R complex on S
    default: 0.0
    units: native SBML value
    description: Initial IL 6, Cell bound IL 6R complex on S. Sets the initial value of bundled SBML symbol `IL_6__Cell_bound_IL_6R_complex_on_S`.
  - name: initial_il_6_cell_bound_il_6r_complex_on_e
    maps_to: IL_6__Cell_bound_IL_6R_complex_on_E
    label: IL 6, Cell bound IL 6R complex on E
    default: 0.0
    units: native SBML value
    description: Initial IL 6, Cell bound IL 6R complex on E. Sets the initial value of bundled SBML symbol `IL_6__Cell_bound_IL_6R_complex_on_E`.
  - name: initial_il_6_cell_bound_il_6r_complex_on_d
    maps_to: IL_6__Cell_bound_IL_6R_complex_on_D
    label: IL 6, Cell bound IL 6R complex on D
    default: 0.0
    units: native SBML value
    description: Initial IL 6, Cell bound IL 6R complex on D. Sets the initial value of bundled SBML symbol `IL_6__Cell_bound_IL_6R_complex_on_D`.
  outputs:
  - name: progenitor_tumor_cell_e
    maps_to: Progenitor_tumor_cell_E
    label: Progenitor tumor cell E
    description: Progenitor tumor cell E observable. Maps to SBML symbol `Progenitor_tumor_cell_E`.
  - name: differentiated_tumor_cell_d
    maps_to: Differentiated_tumor_cell_D
    label: Differentiated tumor cell D
    description: Differentiated tumor cell D observable. Maps to SBML symbol `Differentiated_tumor_cell_D`.
  - name: cancer_stem_cell_s
    maps_to: Cancer_Stem_Cell_S
    label: Cancer Stem Cell S
    description: Cancer Stem Cell S observable. Maps to SBML symbol `Cancer_Stem_Cell_S`.
  - name: il_6_cell_bound_il_6r_complex_on_s
    maps_to: IL_6__Cell_bound_IL_6R_complex_on_S
    label: IL 6, Cell bound IL 6R complex on S
    description: IL 6, Cell bound IL 6R complex on S observable. Maps to SBML symbol `IL_6__Cell_bound_IL_6R_complex_on_S`.
  - name: il_6_cell_bound_il_6r_complex_on_e
    maps_to: IL_6__Cell_bound_IL_6R_complex_on_E
    label: IL 6, Cell bound IL 6R complex on E
    description: IL 6, Cell bound IL 6R complex on E observable. Maps to SBML symbol `IL_6__Cell_bound_IL_6R_complex_on_E`.
  - name: il_6_cell_bound_il_6r_complex_on_d
    maps_to: IL_6__Cell_bound_IL_6R_complex_on_D
    label: IL 6, Cell bound IL 6R complex on D
    description: IL 6, Cell bound IL 6R complex on D observable. Maps to SBML symbol `IL_6__Cell_bound_IL_6R_complex_on_D`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
