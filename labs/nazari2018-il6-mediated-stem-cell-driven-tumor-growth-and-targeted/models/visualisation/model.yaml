schema_version: '2.0'
title: Nazari2018 - IL6 mediated stem cell driven tumor growth and targeted treatment
  Visualisation
description: Oncology visualisation for Nazari2018 - IL6 mediated stem cell driven
  tumor growth and targeted treatment.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Nazari2018 - IL6 mediated stem cell driven tumor growth and targeted
      treatment
    question: How does the bundled treatment-response model evolve under its baseline
      source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant
      response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_nazari2018_il6_mediated_stem_cell_driven_tumor_g_biomd0000000819_model
      title: Nazari2018 - IL6 mediated stem cell driven tumor growth and targeted
        treatment
      state_observables:
      - Cancer_Stem_Cell_S
      - IL_6__Cell_bound_IL_6R_complex_on_S
      - Progenitor_tumor_cell_E
      - Differentiated_tumor_cell_D
      - IL_6__Cell_bound_IL_6R_complex_on_E
      - IL_6__Cell_bound_IL_6R_complex_on_D
      - IL_6__L
      - IL_6R_on_S
      - IL_6R_on_E
      - IL_6R_on_D
      observables:
      - id: Progenitor_tumor_cell_E
        port: progenitor_tumor_cell_e
        label: Progenitor tumor cell E
        group: drug_response
      - id: Differentiated_tumor_cell_D
        port: differentiated_tumor_cell_d
        label: Differentiated tumor cell D
        group: drug_response
      - id: Cancer_Stem_Cell_S
        port: cancer_stem_cells_s
        label: Cancer Stem Cell S
        group: drug_response
      - id: IL_6__Cell_bound_IL_6R_complex_on_S
        port: il_6_cell_bound_il_6_r_complex_on_s
        label: IL 6, Cell bound IL 6R complex on S
        group: drug_response
      - id: IL_6__Cell_bound_IL_6R_complex_on_E
        port: il_6_cell_bound_il_6_r_complex_on_e
        label: IL 6, Cell bound IL 6R complex on E
        group: drug_response
      - id: IL_6__Cell_bound_IL_6R_complex_on_D
        port: il_6_cell_bound_il_6_r_complex_on_d
        label: IL 6, Cell bound IL 6R complex on D
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_nazari2018_il6_mediated_stem_cell_driven_tumor_g_biomd0000000819_model_state
    schema:
      Cancer_Stem_Cell_S: float
      IL_6__Cell_bound_IL_6R_complex_on_S: float
      Progenitor_tumor_cell_E: float
      Differentiated_tumor_cell_D: float
      IL_6__Cell_bound_IL_6R_complex_on_E: float
      IL_6__Cell_bound_IL_6R_complex_on_D: float
      IL_6__L: float
      IL_6R_on_S: float
      IL_6R_on_E: float
      IL_6R_on_D: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_nazari2018_il6_mediated_stem_cell_driven_tumor_g_biomd0000000819_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_nazari2018_il6_mediated_stem_cell_driven_tumor_g_biomd0000000819_model_species_labels
    schema:
      Progenitor_tumor_cell_E: str
      Differentiated_tumor_cell_D: str
      Cancer_Stem_Cell_S: str
      IL_6__Cell_bound_IL_6R_complex_on_S: str
      IL_6__Cell_bound_IL_6R_complex_on_E: str
      IL_6__Cell_bound_IL_6R_complex_on_D: str
    description: Display labels for selected source states.
  outputs: []
