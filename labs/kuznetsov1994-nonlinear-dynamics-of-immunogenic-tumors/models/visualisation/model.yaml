schema_version: '2.0'
title: Kuznetsov1994 - Nonlinear dynamics of immunogenic tumors Visualisation
description: Oncology visualisation for Kuznetsov1994 - Nonlinear dynamics of immunogenic tumors.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Kuznetsov1994 - Nonlinear dynamics of immunogenic tumors
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model
      title: Kuznetsov1994 - Nonlinear dynamics of immunogenic tumors
      state_observables:
      - E
      - T
      observables:
      - id: T
        port: tumor_cells
        label: Tumor Cells
        group: drug_response
      - id: E
        port: effector_cells
        label: Effector Cells
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model_state
    schema:
      E: float
      T: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model_species_labels
    schema:
      T: str
      E: str
    description: Display labels for selected source states.
  outputs: []
