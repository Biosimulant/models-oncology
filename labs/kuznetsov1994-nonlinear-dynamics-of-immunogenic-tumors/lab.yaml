schema_version: '2.0'
title: Kuznetsov1994 - Nonlinear dynamics of immunogenic tumors Lab
description: This mathematical model describes the response of cytotoxic T lymphocytes to the growth of an immunogenic tumor, with the inclusion on a number of in vivo phenomena, such as the immunostimulation of t. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.initial_tumor_cells
    label: Tumor Cells
    default: 5000000.0
    units: native SBML value
    description: Initial Tumor Cells. Sets the initial value of bundled SBML symbol `T`.
  - name: initial_effector_cells
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.initial_effector_cells
    label: Effector Cells
    default: 320000.0
    units: native SBML value
    description: Initial Effector Cells. Sets the initial value of bundled SBML symbol `E`.
  outputs:
  - name: tumor_cells
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.tumor_cells
    description: Tumor Cells observable. Maps to SBML symbol `T`.
  - name: effector_cells
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.effector_cells
    description: Effector Cells observable. Maps to SBML symbol `E`.
  - name: state
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.state
  to:
  - visualisation.oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model_state
- from: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.summary
  to:
  - visualisation.oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model_summary
- from: oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model.species_labels
  to:
  - visualisation.oncology_sbml_kuznetsov1994_nonlinear_dynamics_of_immunogenic_biomd0000000762_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
