    maps_to: oncology_sbml_pappalardo2016_pi3k_akt_and_mapk_signaling_pathw_biomd0000000666_model.ras_inactive
    description: RasInactive observable. Maps to SBML symbol `species_5`.
  - name: raf1_inactive
    maps_to: oncology_sbml_pappalardo2016_pi3k_akt_and_mapk_signaling_pathw_biomd0000000666_model.raf1_inactive
    description: Raf1Inactive observable. Maps to SBML symbol `species_7`.
