    maps_to: oncology_sbml_pappalardo2016_pi3k_akt_and_mapk_signaling_pathw_biomd0000000666_model.initial_ras_inactive
    label: RasInactive
    default: 120000.0
    units: native SBML value
    description: Initial RasInactive. Sets the initial value of bundled SBML symbol
