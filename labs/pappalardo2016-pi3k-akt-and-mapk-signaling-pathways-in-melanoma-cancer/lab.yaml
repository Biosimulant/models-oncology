schema_version: '2.0'
title: Pappalardo2016 - PI3K/AKT and MAPK Signaling Pathways in Melanoma Cancer Lab
description: 'Pappalardo2016 - PI3K/AKT and MAPK SignalingPathways in Melanoma Cancer
  This model is described in the article: Computational Modeling of PI3K/AKT and MAPK
  Signaling Pathways in Melanoma Cancer. It can be used to explore tumor-related dynamics
  and compare treatment-response behavior across conditions.'
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
io:
