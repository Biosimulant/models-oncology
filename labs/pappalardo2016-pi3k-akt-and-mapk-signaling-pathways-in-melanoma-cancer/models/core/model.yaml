schema_version: '2.0'
title: Pappalardo2016 - PI3K/AKT and MAPK Signaling Pathways in Melanoma Cancer
description: 'Pappalardo2016 - PI3K/AKT and MAPK SignalingPathways in Melanoma Cancer
  This model is described in the article: Computational Modeling of PI3K/AKT and MAPK
  Signaling Pathways in Melanoma Cancer. It can be used to explore tumor-related dynamics
  and compare treatment-response behavior across conditions.'
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- sbml
- signal-transduction
- signaling
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Francesco Pappalardo
- Giulia Russo
- Saverio Candido
- Marzio Pennisi
- Salvatore Cavalieri
upstream:
  id: biomodels_ebi:BIOMD0000000666
  source_db: biomodels_ebi
  source_id: BIOMD0000000666
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000666
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000666?filename=BIOMD0000000666_url.xml
  license: CC0
biosim:
  entrypoint: src.pappalardo2016_pi3k_akt_and_mapk_signaling_pathw_biomd0000000666_model:Pappalardo2016Pi3kAktAndMapkSignalingPathwBiomd0000000666Model
  init_kwargs:
    model_path: data/BIOMD0000000666.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000666.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: initial_ras_inactive
    maps_to: species_5
    label: RasInactive
    default: 120000.0
    units: native SBML value
    description: Initial RasInactive. Sets the initial value of bundled SBML symbol
      `species_5`.
  - name: initial_raf1_inactive
    maps_to: species_7
    label: Raf1Inactive
    default: 120000.0
    units: native SBML value
    description: Initial Raf1Inactive. Sets the initial value of bundled SBML symbol
      `species_7`.
  - name: initial_erk_inactive
    maps_to: species_11
    label: ErkInactive
    default: 600000.0
    units: native SBML value
    description: Initial ErkInactive. Sets the initial value of bundled SBML symbol
      `species_11`.
  - name: initial_pi3_kinactive
    maps_to: species_15
    label: PI3KInactive
    default: 120000.0
    units: native SBML value
    description: Initial PI3KInactive. Sets the initial value of bundled SBML symbol
      `species_15`.
  - name: initial_akt_inactive
    maps_to: species_17
    label: AktInactive
    default: 120000.0
    units: native SBML value
    description: Initial AktInactive. Sets the initial value of bundled SBML symbol
      `species_17`.
  - name: initial_braf_mutated
    maps_to: bRafMutated
    label: BRafMutated
    default: 120000.0
    units: native SBML value
    description: Initial BRafMutated. Sets the initial value of bundled SBML symbol
      `bRafMutated`.
  outputs:
  - name: ras_inactive
    maps_to: species_5
    label: RasInactive
    description: RasInactive observable. Maps to SBML symbol `species_5`.
  - name: raf1_inactive
    maps_to: species_7
    label: Raf1Inactive
    description: Raf1Inactive observable. Maps to SBML symbol `species_7`.
  - name: erk_inactive
    maps_to: species_11
    label: ErkInactive
    description: ErkInactive observable. Maps to SBML symbol `species_11`.
  - name: pi3_kinactive
    maps_to: species_15
    label: PI3KInactive
    description: PI3KInactive observable. Maps to SBML symbol `species_15`.
  - name: akt_inactive
    maps_to: species_17
    label: AktInactive
    description: AktInactive observable. Maps to SBML symbol `species_17`.
  - name: braf_mutated
    maps_to: bRafMutated
    label: BRafMutated
    description: BRafMutated observable. Maps to SBML symbol `bRafMutated`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
