schema_version: '2.0'
title: Bajzer2008 - Modeling of cancer virotherapy with recombinant measles viruses Lab
description: This model describes the interactions between tumor cells and virus particles, with particular reference to virus-induced syncytium formation and ultimately death of tumor cells. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
io:
  inputs:
  - name: epsilon_level
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.epsilon_level
    label: Epsilon source parameter
    default: 1.648773
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  - name: initial_y_tumor_cell
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.initial_y_tumor_cell
    label: Y Tumor Cell
    default: 126.237
    units: native SBML value
    description: Initial Y Tumor Cell. Sets the initial value of bundled SBML symbol `y_Tumor_Cell`.
  - name: initial_x_infected_cell
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.initial_x_infected_cell
    label: X Infected Cell
    default: 0.0
    units: native SBML value
    description: Initial X Infected Cell. Sets the initial value of bundled SBML symbol `x_Infected_Cell`.
  - name: initial_v_virus
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.initial_v_virus
    label: V Virus
    default: 2.0
    units: native SBML value
    description: Initial V Virus. Sets the initial value of bundled SBML symbol `v_Virus`.
  outputs:
  - name: y_tumor_cell
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.y_tumor_cell
    description: Y Tumor Cell observable. Maps to SBML symbol `y_Tumor_Cell`.
  - name: x_infected_cell
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.x_infected_cell
    description: X Infected Cell observable. Maps to SBML symbol `x_Infected_Cell`.
  - name: v_virus
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.v_virus
    description: V Virus observable. Maps to SBML symbol `v_Virus`.
  - name: state
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.state
  to:
  - visualisation.oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model_state
- from: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.summary
  to:
  - visualisation.oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model_summary
- from: oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model.species_labels
  to:
  - visualisation.oncology_sbml_bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
