schema_version: '2.0'
title: Bajzer2008 - Modeling of cancer virotherapy with recombinant measles viruses
description: This model describes the interactions between tumor cells and virus particles,
  with particular reference to virus-induced syncytium formation and ultimately death
  of tumor cells. It can be used to explore tumor-related dynamics and compare treatment-response
  behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunotherapy
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- virotherapy
authors:
- Biosimulant Team
- Zeljko Bajzer
- Thomas Carr
- "Kresimir Josi\u0107"
- Stephen J Russell
- David Dingli
upstream:
  id: biomodels_ebi:BIOMD0000000771
  source_db: biomodels_ebi
  source_id: BIOMD0000000771
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000771
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000771?filename=Bazjer2008.xml
  license: CC0
biosim:
  entrypoint: src.bajzer2008_modeling_of_cancer_virotherapy_with_r_biomd0000000771_model:Bajzer2008ModelingOfCancerVirotherapyWithRBiomd0000000771Model
  init_kwargs:
    model_path: data/BIOMD0000000771.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000771.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations.
io:
  inputs:
  - name: epsilon_source_parameter
    maps_to: epsilon
    label: Epsilon source parameter
    default: 1.648773
    units: native SBML value
    description: Epsilon source parameter. Maps to bundled SBML parameter `epsilon`.
  - name: initial_y_tumor_cell
    maps_to: y_Tumor_Cell
    label: Y Tumor Cell
    default: 126.237
    units: native SBML value
    description: Initial Y Tumor Cell. Sets the initial value of bundled SBML symbol
      `y_Tumor_Cell`.
  - name: initial_x_infected_cell
    maps_to: x_Infected_Cell
    label: X Infected Cell
    default: 0.0
    units: native SBML value
    description: Initial X Infected Cell. Sets the initial value of bundled SBML symbol
      `x_Infected_Cell`.
  - name: initial_v_virus
    maps_to: v_Virus
    label: V Virus
    default: 2.0
    units: native SBML value
    description: Initial V Virus. Sets the initial value of bundled SBML symbol `v_Virus`.
  outputs:
  - name: y_tumor_cell
    maps_to: y_Tumor_Cell
    label: Y Tumor Cell
    description: Y Tumor Cell observable. Maps to SBML symbol `y_Tumor_Cell`.
  - name: x_infected_cell
    maps_to: x_Infected_Cell
    label: X Infected Cell
    description: X Infected Cell observable. Maps to SBML symbol `x_Infected_Cell`.
  - name: v_virus
    maps_to: v_Virus
    label: V Virus
    description: V Virus observable. Maps to SBML symbol `v_Virus`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
