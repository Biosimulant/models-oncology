schema_version: '2.0'
title: Gulhane2022 - Sphingolipid metabolism and PI3K-AKT axis in NSCLC
description: In this model, we demonstrated that the increased expression of sphingolipids
  enzyme affects PI3K-AKT signaling axis and its downstream signaling mediators resulting
  in cancer progression. It can be used to explore tumor-related dynamics and compare
  treatment-response behavior across conditions.
