      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_sun2018_instantaneous_mutation_rate_in_cancer_in_biomd0000000915_model_species_labels
