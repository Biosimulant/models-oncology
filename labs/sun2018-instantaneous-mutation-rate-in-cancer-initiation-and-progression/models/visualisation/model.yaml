        port: patient_0
        label: Patient 0
        group: drug_response
      - id: p_1
        port: patient_1
        label: Patient 1
        group: drug_response
      - id: p_2
        port: patient_2
        label: Patient 2
        group: drug_response
      - id: p_3
        port: patient_3
        label: Patient 3
        group: drug_response
      - id: p_4
        port: patient_4
        label: Patient 4
        group: drug_response
      - id: p_5
        port: patient_5
        label: Patient 5
        group: drug_response
