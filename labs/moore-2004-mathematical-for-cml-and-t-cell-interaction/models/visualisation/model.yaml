schema_version: '2.0'
title: Moore_2004_Mathematical model for CML and T cell interaction Visualisation
description: Oncology visualisation for Moore_2004_Mathematical model for CML and T cell interaction.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Moore_2004_Mathematical model for CML and T cell interaction
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_moore_2004_mathematical_model_for_cml_and_t_cell_biomd0000000733_model
      title: Moore_2004_Mathematical model for CML and T cell interaction
      state_observables:
      - naive_Tcells
      - eff_Tcells
      - tumor_cells
      observables:
      - id: tumor_cells
        port: tumor_cells
        label: Tumor cells
        group: drug_response
      - id: naive_Tcells
        port: naive_tcells
        label: Naive Tcells
        group: drug_response
      - id: eff_Tcells
        port: eff_tcells
        label: Eff Tcells
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_moore_2004_mathematical_model_for_cml_and_t_cell_biomd0000000733_model_state
    schema:
      naive_Tcells: float
      eff_Tcells: float
      tumor_cells: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_moore_2004_mathematical_model_for_cml_and_t_cell_biomd0000000733_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_moore_2004_mathematical_model_for_cml_and_t_cell_biomd0000000733_model_species_labels
    schema:
      tumor_cells: str
      naive_Tcells: str
      eff_Tcells: str
    description: Display labels for selected source states.
  outputs: []
