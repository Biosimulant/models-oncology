schema_version: '2.0'
title: Moore_2004_Mathematical model for CML and T cell interaction
description: Its a mathematical model depicting CML (chronic myelogenous leukemia) interaction with T cells and impact of T cell activations on CML progression over time. It can be used to explore tumor-related dynamics and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Helen Moore
- Natasha K Li
upstream:
  id: biomodels_ebi:BIOMD0000000733
  source_db: biomodels_ebi
  source_id: BIOMD0000000733
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/BIOMD0000000733
  download_url: https://www.ebi.ac.uk/biomodels/model/download/BIOMD0000000733?filename=Moore_2004_fig6.xml
  license: CC0
biosim:
  entrypoint: src.moore_2004_mathematical_model_for_cml_and_t_cell_biomd0000000733_model:Moore2004MathematicalModelForCmlAndTCellBiomd0000000733Model
  init_kwargs:
    model_path: data/BIOMD0000000733.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/BIOMD0000000733.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source equations.
io:
  inputs:
  - name: initial_tumor_cells
    maps_to: tumor_cells
    label: Tumor cells
    default: 10000.0
    units: native SBML value
    description: Initial Tumor cells. Sets the initial value of bundled SBML symbol `tumor_cells`.
  - name: initial_naive_tcells
    maps_to: naive_Tcells
    label: Naive Tcells
    default: 1510.0
    units: native SBML value
    description: Initial Naive Tcells. Sets the initial value of bundled SBML symbol `naive_Tcells`.
  - name: initial_eff_tcells
    maps_to: eff_Tcells
    label: Eff Tcells
    default: 20.0
    units: native SBML value
    description: Initial Eff Tcells. Sets the initial value of bundled SBML symbol `eff_Tcells`.
  outputs:
  - name: tumor_cells
    maps_to: tumor_cells
    label: Tumor cells
    description: Tumor cells observable. Maps to SBML symbol `tumor_cells`.
  - name: naive_tcells
    maps_to: naive_Tcells
    label: Naive Tcells
    description: Naive Tcells observable. Maps to SBML symbol `naive_Tcells`.
  - name: eff_tcells
    maps_to: eff_Tcells
    label: Eff Tcells
    description: Eff Tcells observable. Maps to SBML symbol `eff_Tcells`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
