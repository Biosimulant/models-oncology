schema_version: '2.0'
title: Mkango2019 - Dynamics of Breast Cancer under DifferentRates of Chemoradiotherapy
description: Dynamics of Breast Cancer under Different Rates of Chemoradiotherapy.Mkango
  SB1, Shaban N1, Mureithi E1, Ngoma T2.Author information1 Department of Mathematics,
  University of Dar es Salaam, P.O. It can be used to explore tumor-related dynamics
  and compare treatment-response behavior across conditions.
standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- radiotherapy
- sbml
- systemsbiology
- tumor-growth
authors:
- Biosimulant Team
- Sara B Mkango
- Nyimvua Shaban
- Eunice Mureithi
- Twalib Ngoma
upstream:
  id: biomodels_ebi:MODEL1912120005
  source_db: biomodels_ebi
  source_id: MODEL1912120005
  standard: sbml
  original_url: https://www.ebi.ac.uk/biomodels/MODEL1912120005
  download_url: https://www.ebi.ac.uk/biomodels/model/download/MODEL1912120005?filename=Mkango2019.xml
  license: CC0
biosim:
  entrypoint: src.mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model:Mkango2019DynamicsOfBreastCancerUnderDiffeModel1912120005Model
  init_kwargs:
    model_path: data/MODEL1912120005.xml
    integration_step: 0.1
  communication_step: 1.0
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - tellurium==2.2.11.2
    - PyYAML==6.0.3
parameters:
- name: model_path
  value: data/MODEL1912120005.xml
  description: Relative path to the curated SBML source file.
- name: integration_step
  value: 0.1
  min: 0.0
  units: model_time
  description: Output sampling step for the Tellurium simulator.
caveats: Values are native SBML quantities; the cleanup does not reinterpret source
  equations. Exposed inputs are traceable to bundled SBML parameters or initial conditions.
io:
  inputs:
  - name: initial_breast_tumor_cells
    maps_to: T
    label: Breast Tumor Cells
    default: 3500000.0
    units: native SBML value
    description: Initial Breast Tumor Cells. Sets the initial value of bundled SBML
      symbol `T`.
  outputs:
  - name: breast_tumor_cells
    maps_to: T
    label: Breast Tumor Cells
    description: Breast Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
