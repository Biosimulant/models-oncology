standard: other
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- radiotherapy
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  communication_step: 1.0
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Mkango2019 - Dynamics of Breast Cancer under DifferentRates of Chemoradiotherapy
    question: Does the radiotherapy-linked model show tumour response under baseline
      source conditions?
    answer_focus: Compares radiation/treatment and tumour observables where present.
    visual_scope: Radiotherapy-linked tumour response
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source
      equations.
    sources:
    - alias: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model
      title: Mkango2019 - Dynamics of Breast Cancer under DifferentRates of Chemoradiotherapy
      state_observables:
      - T
      - TR
      - N
      - I
      - M
      - R
      observables:
      - id: T
        port: breast_tumor_cells
        label: Breast Tumor Cells
        group: radiotherapy
      - id: TR
        label: TR
        group: radiotherapy
      - id: N
        label: N
        group: radiotherapy
      - id: I
        label: I
        group: radiotherapy
      - id: M
        label: M
        group: radiotherapy
      - id: R
        label: R
        group: radiotherapy
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model_state
    schema:
      T: float
      TR: float
      N: float
      I: float
      M: float
      R: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model_species_labels
    schema:
      T: str
      TR: str
      N: str
      I: str
      M: str
      R: str
    description: Display labels for selected source states.
  outputs: []
