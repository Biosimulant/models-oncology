schema_version: '2.0'
title: Mkango2019 - Dynamics of Breast Cancer under DifferentRates of Chemoradiotherapy
  Lab
description: Dynamics of Breast Cancer under Different Rates of Chemoradiotherapy.Mkango
  SB1, Shaban N1, Mureithi E1, Ngoma T2.Author information1 Department of Mathematics,
  University of Dar es Salaam, P.O. It can be used to explore tumor-related dynamics
  and compare treatment-response behavior across conditions.
tags:
- biomodels_ebi
- chemotherapy
- curated
- drug-response
- faithful
- oncology
- pharmacology
- physiology
- radiotherapy
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_breast_tumor_cells
    maps_to: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.initial_breast_tumor_cells
    label: Breast Tumor Cells
    default: 3500000.0
    units: native SBML value
    description: Initial Breast Tumor Cells. Sets the initial value of bundled SBML
      symbol `T`.
  outputs:
  - name: breast_tumor_cells
    maps_to: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.breast_tumor_cells
    description: Breast Tumor Cells observable. Maps to SBML symbol `T`.
  - name: state
    maps_to: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.state
  to:
  - visualisation.oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model_state
- from: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.summary
  to:
  - visualisation.oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model_summary
- from: oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model.species_labels
  to:
  - visualisation.oncology_sbml_mkango2019_dynamics_of_breast_cancer_under_diffe_model1912120005_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
