schema_version: '2.0'
title: Li2016 - Model for pancreatic cancer patients receiving immunotherapy Visualisation
description: Oncology visualisation for Li2016 - Model for pancreatic cancer patients receiving immunotherapy.
standard: other
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
- visualisation
authors:
- Biosimulant Team
biosim:
  entrypoint: src.oncology_visualisation:OncologyVisualisationModel
  init_kwargs:
    integration_step: 1.0
    lab_title: Li2016 - Model for pancreatic cancer patients receiving immunotherapy
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model
      title: Li2016 - Model for pancreatic cancer patients receiving immunotherapy
      state_observables:
      - Pancreatic_cancer_cells__C
      - Pancreatic_stellate_cells__P
      - CD8__T_cells__T
      - NK_cells__N
      - helper_T_cells__H
      observables:
      - id: Pancreatic_cancer_cells__C
        port: pancreatic_cancer_cells_c
        label: Pancreatic cancer cells (C)
        group: drug_response
      - id: Pancreatic_stellate_cells__P
        port: pancreatic_stellate_cells_p
        label: Pancreatic stellate cells (P)
        group: drug_response
      - id: CD8__T_cells__T
        port: cd8_positive_t_cells_t
        label: CD8+ T cells (T)
        group: drug_response
      - id: NK_cells__N
        port: nk_cells_n
        label: NK cells (N)
        group: drug_response
      - id: helper_T_cells__H
        port: helper_t_cells_h
        label: Helper T cells (H)
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model_state
    schema:
      Pancreatic_cancer_cells__C: float
      Pancreatic_stellate_cells__P: float
      CD8__T_cells__T: float
      NK_cells__N: float
      helper_T_cells__H: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model_species_labels
    schema:
      Pancreatic_cancer_cells__C: str
      Pancreatic_stellate_cells__P: str
      CD8__T_cells__T: str
      NK_cells__N: str
      helper_T_cells__H: str
    description: Display labels for selected source states.
  outputs: []
