schema_version: '2.0'
title: Li2016 - Model for pancreatic cancer patients receiving immunotherapy Lab
description: immunotherapy offers a better prognosis for pancreatic cancer patients.
  As a direct extension of this work, various new therapy methods that are under exploration
  and clinical trials could be assessed.
tags:
- biomodels_ebi
- curated
- drug-response
- faithful
- immunology
- immunotherapy
- microenvironment
- oncology
- pharmacology
- physiology
- sbml
- systemsbiology
- tumor-growth
io:
  inputs:
  - name: initial_pancreatic_cancer_cells_c
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.initial_pancreatic_cancer_cells_c
    label: Pancreatic cancer cells (C)
    default: 1000000000.0
    units: native SBML value
    description: Initial Pancreatic cancer cells (C). Sets the initial value of bundled
      SBML symbol `Pancreatic_cancer_cells__C`.
  - name: initial_pancreatic_stellate_cells_p
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.initial_pancreatic_stellate_cells_p
    label: Pancreatic stellate cells (P)
    default: 5600000.0
    units: native SBML value
    description: Initial Pancreatic stellate cells (P). Sets the initial value of
      bundled SBML symbol `Pancreatic_stellate_cells__P`.
  - name: initial_cd8_t_cells_t
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.initial_cd8_t_cells_t
    label: CD8+ T cells (T)
    default: 700000000.0
    units: native SBML value
    description: Initial CD8+ T cells (T). Sets the initial value of bundled SBML
      symbol `CD8__T_cells__T`.
  - name: initial_nk_cells_n
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.initial_nk_cells_n
    label: NK cells (N)
    default: 352800000.0
    units: native SBML value
    description: Initial NK cells (N). Sets the initial value of bundled SBML symbol
      `NK_cells__N`.
  - name: initial_helper_t_cells_h
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.initial_helper_t_cells_h
    label: Helper T cells (H)
    default: 1881600000.0
    units: native SBML value
    description: Initial Helper T cells (H). Sets the initial value of bundled SBML
      symbol `helper_T_cells__H`.
  outputs:
  - name: pancreatic_cancer_cells_c
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.pancreatic_cancer_cells_c
    description: Pancreatic cancer cells (C) observable. Maps to SBML symbol `Pancreatic_cancer_cells__C`.
  - name: pancreatic_stellate_cells_p
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.pancreatic_stellate_cells_p
    description: Pancreatic stellate cells (P) observable. Maps to SBML symbol `Pancreatic_stellate_cells__P`.
  - name: cd8_t_cells_t
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.cd8_t_cells_t
    description: CD8+ T cells (T) observable. Maps to SBML symbol `CD8__T_cells__T`.
  - name: nk_cells_n
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.nk_cells_n
    description: NK cells (N) observable. Maps to SBML symbol `NK_cells__N`.
  - name: helper_t_cells_h
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.helper_t_cells_h
    description: Helper T cells (H) observable. Maps to SBML symbol `helper_T_cells__H`.
  - name: state
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.state
    description: Full raw SBML observable record for reproducibility and downstream
      visualisation.
  - name: summary
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    maps_to: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
models:
- alias: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model
  path: models/core
- alias: visualisation
  path: models/visualisation
wiring:
- from: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.state
  to:
  - visualisation.oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model_state
- from: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.summary
  to:
  - visualisation.oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model_summary
- from: oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model.species_labels
  to:
  - visualisation.oncology_sbml_li2016_model_for_pancreatic_cancer_patients_rece_biomd0000000929_model_species_labels
runtime:
  duration: 10.0
  communication_step: 1.0
  initial_inputs: {}
