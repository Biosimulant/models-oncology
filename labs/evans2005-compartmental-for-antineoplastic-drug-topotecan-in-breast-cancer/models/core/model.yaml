  - name: model_state_3
    maps_to: L_e
    label: L e
    description: L e observable. Maps to SBML symbol `L_e`.
  - name: model_state_4
    maps_to: H_e
    label: H e
    description: H e observable. Maps to SBML symbol `H_e`.
  - name: model_state_5
    maps_to: L_c
    label: L c
    description: L c observable. Maps to SBML symbol `L_c`.
  - name: model_state_6
    maps_to: H_c
    label: H c
    description: H c observable. Maps to SBML symbol `H_c`.
  - name: state
    description: Full raw SBML observable record for reproducibility and downstream visualisation.
  - name: summary
    description: Change and peak summary across the simulated SBML observables.
  - name: species_labels
    description: Mapping from selected raw SBML observable symbols to display labels.
