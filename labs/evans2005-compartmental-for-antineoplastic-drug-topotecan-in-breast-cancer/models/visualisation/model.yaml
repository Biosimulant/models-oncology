  init_kwargs:
    integration_step: 1.0
    lab_title: Evans2005 - Compartmental model for antineoplastic drug topotecan in breast cancer cells
    question: How does the bundled treatment-response model evolve under its baseline source conditions?
    answer_focus: Summarizes treatment-linked states, tumour burden, and dominant response variables.
    visual_scope: Drug/treatment response and tumour-state change
    caveat: Values are native SBML quantities; the cleanup does not reinterpret source equations.
    sources:
    - alias: oncology_sbml_evans2005_compartmental_model_for_antineoplastic_biomd0000000946_model
      title: Evans2005 - Compartmental model for antineoplastic drug topotecan in breast cancer cells
      state_observables:
      - L_m
      - H_m
      - L_e
      - H_e
      - L_c
      - H_c
      - L_n
      observables:
      - id: L_m
        port: model_state_1
        label: L m
        group: drug_response
      - id: H_m
        port: model_state_2
        label: H m
        group: drug_response
      - id: L_e
        port: model_state_3
        label: L e
        group: drug_response
      - id: H_e
        port: model_state_4
        label: H e
        group: drug_response
      - id: L_c
        port: model_state_5
        label: L c
        group: drug_response
      - id: H_c
        port: model_state_6
        label: H c
        group: drug_response
runtime:
  python_version: '3.12'
  dependencies:
    packages:
    - PyYAML==6.0.3
io:
  inputs:
  - name: oncology_sbml_evans2005_compartmental_model_for_antineoplastic_biomd0000000946_model_state
    schema:
      L_m: float
      H_m: float
      L_e: float
      H_e: float
      L_c: float
      H_c: float
      L_n: float
    description: Selected source state values from the core model.
  - name: oncology_sbml_evans2005_compartmental_model_for_antineoplastic_biomd0000000946_model_summary
    schema:
      duration_simulated: float
      observable_count: int
      largest_change_observable: str
      largest_change_magnitude: float
      peak_observable: str
      peak_value: float
    description: Core model summary output.
  - name: oncology_sbml_evans2005_compartmental_model_for_antineoplastic_biomd0000000946_model_species_labels
    schema:
      L_m: str
      H_m: str
      L_e: str
